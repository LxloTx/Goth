        body {
            margin: 0;
            background-color: #050a06;
            color: #d4e0d0;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        #hud {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            width: 800px;
            background: #111a12;
            padding: 14px 24px;
            border: 3px solid #000;
            box-shadow: 4px 4px 0px #030503;
            box-sizing: border-box;
            position: relative;
        }

        .hud-section {
            display: flex;
            flex-direction: column;
            margin-top: 4px;
        }

        .hud-label {
            font-size: 11px;
            font-weight: bold;
            color: #5c755e;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .hud-value {
            font-size: 18px;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 2px 2px 0px #000;
        }

        .hp-container {
            width: 240px;
            display: flex;
            flex-direction: column;
            margin-top: 0;
        }

        .bar-bg {
            width: 100%;
            height: 14px;
            background-color: #241414;
            border: 2px solid #000;
            box-shadow: inset 2px 2px 0px rgba(0, 0, 0, 0.6);
            overflow: hidden;
            position: relative;
        }

        #shield-bar-box {
            height: 8px;
            background-color: #101f2b;
            margin-bottom: 4px;
            display: none;
        }

        #shield-bar-fill {
            width: 0%;
            height: 100%;
            background-color: #3498db;
        }

        #hp-bar-fill {
            width: 100%;
            height: 100%;
            background-color: #c0392b;
            transition: width 0.1s steps(10);
        }

        #loot-inventory {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-top: 8px;
            justify-content: center;
            width: 100%;
            min-height: 24px;
        }

        .loot-icon-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 22px;
            height: 22px;
            background-color: #161c16;
            border: 1px solid #333;
            box-shadow: 2px 2px 0 rgba(0, 0, 0, 0.8);
            position: relative;
        }

        .loot-icon-box .icon {
            font-size: 12px;
            line-height: 1;
        }

        .loot-icon-box .count {
            font-size: 9px;
            font-weight: bold;
            color: #ffffff;
            position: absolute;
            bottom: -4px;
            right: -4px;
            text-shadow: 1px 1px 0 #000;
            background: rgba(0, 0, 0, 0.75);
            padding: 0 2px;
            border-radius: 2px;
            font-family: 'Courier New', monospace;
        }

        #loot-progress-container {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background-color: #000;
        }

        #loot-progress-fill {
            width: 0%;
            height: 100%;
            background-color: #2ecc71;
            transition: width 0.2s ease;
        }

        canvas {
            border: 3px solid #000;
            border-top: none;
            box-shadow: 0 0 40px rgba(46, 204, 113, 0.15), 6px 6px 0px rgba(0, 0, 0, 0.6);
            image-rendering: pixelated;
            cursor: pointer;
        }

        #hud {
            animation: hud-pulse 4s ease-in-out infinite;
        }

        @keyframes hud-pulse {

            0%,
            100% {
                box-shadow: 4px 4px 0px #030503, 0 0 20px rgba(46, 204, 113, 0.05);
            }

            50% {
                box-shadow: 4px 4px 0px #030503, 0 0 30px rgba(46, 204, 113, 0.15);
            }
        }

        #hp-bar-fill {
            background: linear-gradient(90deg, #8b0000, #c0392b, #e74c3c);
            box-shadow: 0 0 8px rgba(231, 76, 60, 0.6);
        }

        #shield-bar-fill {
            background: linear-gradient(90deg, #1a6ea0, #3498db, #5dade2);
            box-shadow: 0 0 8px rgba(52, 152, 219, 0.7);
        }

        #loot-progress-fill {
            background: linear-gradient(90deg, #1a8a4a, #2ecc71, #58d68d);
            box-shadow: 0 0 6px rgba(46, 204, 113, 0.8);
        }
    </style>
</head>

<body>

    <div id="hud">
        <div class="hud-section">
            <span class="hud-label">SURVIVED</span>
            <span id="timerText" class="hud-value">00:00</span>
        </div>
        <div class="hud-section hp-container">
            <span id="stageFloorLabel" class="hud-label" style="text-align: center; margin-bottom: 2px;">STAGE 1: WOODS</span>
            <div id="shield-bar-box" class="bar-bg">
                <div id="shield-bar-fill"></div>
            </div>
            <div class="bar-bg">
                <div id="hp-bar-fill"></div>
            </div>
            <div id="loot-inventory"></div>
        </div>
        <div class="hud-section" style="align-items: flex-end; margin-right: 60px;">
            <span class="hud-label">LVL <span id="lvlText">1</span> PURGED</span>
            <span id="scoreText" class="hud-value" style="color: #2ecc71;">0</span>
        </div>

        <div style="position: absolute; right: 20px; top: 10px; display: flex; flex-direction: column; align-items: flex-end; gap: 4px;">
            <div style="display: flex; align-items: center; gap: 6px;">
                <span style="font-size: 16px;">🪙</span><span id="coinText" style="color: #f1c40f; font-weight: bold; font-size: 14px;">0</span>
            </div>
            <div style="display: flex; align-items: center; gap: 6px;">
                <span style="font-size: 16px;">🎲</span><span id="diceText" style="color: #ecf0f1; font-weight: bold; font-size: 14px;">0</span>
            </div>
        </div>

        <div id="loot-progress-container">
            <div id="loot-progress-fill"></div>
        </div>
    </div>

    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const hpFill = document.getElementById('hp-bar-fill');
        const shieldBox = document.getElementById('shield-bar-box');
        const shieldFill = document.getElementById('shield-bar-fill');
        const lootFill = document.getElementById('loot-progress-fill');
        const scoreEl = document.getElementById('scoreText');
        const timerEl = document.getElementById('timerText');
        const lvlEl = document.getElementById('lvlText');
        const coinEl = document.getElementById('coinText');
        const diceEl = document.getElementById('diceText');
        const floorLabelEl = document.getElementById('stageFloorLabel');

        // --- TITLE FONT LOADING (gothic display font for menu screens) ---
        let titleFontReady = false;
        let titleFontName = '"Courier New", monospace'; // fallback until loaded
        if (document.fonts && document.fonts.load) {
            document.fonts.load('40px PirataOne').then(() => {
                titleFontReady = true;
                titleFontName = '"PirataOne", "Courier New", monospace';
            }).catch(() => {
                // If the embedded font ever fails to load, the game still renders fine with the fallback.
                titleFontReady = false;
            });
        }

        let mouseX = 0,
            mouseY = 0;
        let hoveredCardIndex = -1;

        const distSq = (x1, y1, x2, y2) => (x2 - x1) * (x2 - x1) + (y2 - y1) * (y2 - y1);

        // --- PARTICLE SYSTEM ---
        let particles = [];

        function spawnParticles(x, y, count, color, speed, life, size) {
            for (let i = 0; i < count; i++) {
                let angle = Math.random() * Math.PI * 2;
                let spd = speed * (0.5 + Math.random() * 0.8);
                particles.push({
                    x,
                    y,
                    vx: Math.cos(angle) * spd,
                    vy: Math.sin(angle) * spd - 0.5,
                    color,
                    life,
                    maxLife: life,
                    size: size * (0.5 + Math.random()),
                    alpha: 1
                });
            }
        }

        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.06;
                p.vx *= 0.96;
                p.vy *= 0.96;
                p.life--;
                p.alpha = p.life / p.maxLife;
                if (p.life <= 0) particles.splice(i, 1);
            }
        }

        function drawParticles() {
            particles.forEach(p => {
                let sx = p.x - camera.x,
                    sy = p.y - camera.y;
                if (sx < -20 || sx > canvas.width + 20 || sy < -20 || sy > canvas.height + 20) return;
                ctx.save();
                ctx.globalAlpha = p.alpha;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(sx, sy, p.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            });
        }

        let screenShake = {
            x: 0,
            y: 0,
            intensity: 0
        };

        function triggerShake(intensity) {
            screenShake.intensity = Math.max(screenShake.intensity, intensity);
        }

        function updateScreenShake() {
            if (screenShake.intensity > 0.2) {
                screenShake.x = (Math.random() - 0.5) * screenShake.intensity;
                screenShake.y = (Math.random() - 0.5) * screenShake.intensity;
                screenShake.intensity *= 0.75;
            } else {
                screenShake.x = 0;
                screenShake.y = 0;
                screenShake.intensity = 0;
            }
        }

        let hitFlashAlpha = 0;

        // --- MAP & CAMERA ENGINE ---
        let worldWidth = 3200;
        let worldHeight = 2400;
        let camera = {
            x: 0,
            y: 0
        };
        let level3CameraY = 0;

        // --- ADVANCED AUDIO ENGINE ---
        let audioCtx = null;
        let masterGain = null;
        let masterVolume = 0.5;
        let musicInterval = null;
        let musicStep = 0;
        let currentTheme = 'MAIN_MENU';
        let isAudioInitialized = false;

        const TRACKS = {
            'MAIN_MENU': {
                // REVAMPED: Slow, ominous gothic theme (D minor -> A minor -> Bb major -> C major -> resolve)
                // Sine sub-drone bass + triangle bell-like lead for a haunting title-screen atmosphere
                tempo: 0.22,
                leadType: 'triangle',
                bassType: 'sine',
                filterFreq: 700,
                seq: [0, 1, 2, 3],
                patterns: [{
                    b: [38, 0, 0, 0, 38, 0, 0, 0, 38, 0, 0, 0, 38, 0, 0, 0],

        function midiToFreq(note) {
            return 440 * Math.pow(2, (note - 69) / 12);
        }

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                masterGain = audioCtx.createGain();
                masterGain.gain.value = masterVolume;
                masterGain.connect(audioCtx.destination);
                isAudioInitialized = true;
                startSequencer();
            } else if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function startSequencer() {
            if (musicInterval) clearInterval(musicInterval);
            let trackData = TRACKS[currentTheme];
            musicInterval = setInterval(() => {
                trackData = TRACKS[currentTheme];
                if (gameState === 'GAMEOVER' || gameState === 'PRE_START' || gameState === 'PAUSED') return;

                const now = audioCtx.currentTime;
                let totalSteps = trackData.seq.length * 16;
                let currentStepInSong = musicStep % totalSteps;
                let currentPatternIndex = Math.floor(currentStepInSong / 16);
                let currentStepInPattern = currentStepInSong % 16;
                let activePatternId = trackData.seq[currentPatternIndex];
                let activePattern = trackData.patterns[activePatternId];

                let bassNote = activePattern.b[currentStepInPattern];
                let leadNote = activePattern.l[currentStepInPattern];

                if (bassNote > 0) {
                    let oscB = audioCtx.createOscillator();
                    let gainB = audioCtx.createGain();
                    oscB.type = trackData.bassType;
                    oscB.frequency.setValueAtTime(midiToFreq(bassNote - 12), now);
                    let filterB = audioCtx.createBiquadFilter();
                    filterB.type = 'lowpass';
                    filterB.frequency.setValueAtTime(trackData.filterFreq, now);
                    gainB.gain.setValueAtTime(currentTheme === 'BOSS' || currentTheme === 'MINI_BOSS' || currentTheme === 'LEVEL_4' || currentTheme === 'LEVEL_4_INTENSE' ? 0.12 : 0.08, now);
                    gainB.gain.exponentialRampToValueAtTime(0.001, now + trackData.tempo * 0.9);
                    oscB.connect(filterB);
                    filterB.connect(gainB);
                    gainB.connect(masterGain);
                    oscB.start(now);
                    oscB.stop(now + trackData.tempo);
                }

                if (leadNote > 0) {
                    let oscL = audioCtx.createOscillator();
                    let gainL = audioCtx.createGain();
                    oscL.type = trackData.leadType;
                    oscL.frequency.setValueAtTime(midiToFreq(leadNote + 12), now);
                    let filterL = audioCtx.createBiquadFilter();
                    filterL.type = (currentTheme === 'LEVEL_2') ? 'bandpass' : 'lowpass';
                    filterL.frequency.setValueAtTime(trackData.filterFreq * 1.5, now);
                    gainL.gain.setValueAtTime((currentTheme === 'LEVEL_2') ? 0.02 : 0.04, now);
                    gainL.gain.exponentialRampToValueAtTime(0.001, now + (trackData.tempo * 1.5));
                    oscL.connect(filterL);
                    filterL.connect(gainL);
                    gainL.connect(masterGain);
                    oscL.start(now);
                    oscL.stop(now + (trackData.tempo * 2));
                }
                musicStep++;
            }, trackData.tempo * 1000);
        }

        function playLxlowareIntroSound() {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;

            // 1. The Deep Bass Swell (The classic low hum)
            const bassOsc = audioCtx.createOscillator();
            const bassGain = audioCtx.createGain();
            bassOsc.type = 'sine';
            bassOsc.frequency.setValueAtTime(55.00, now); // Low A
            bassOsc.frequency.exponentialRampToValueAtTime(40.00, now + 4);

            bassGain.gain.setValueAtTime(0, now);
            bassGain.gain.linearRampToValueAtTime(0.5, now + 1.5);
            bassGain.gain.exponentialRampToValueAtTime(0.01, now + 4.5);

            bassOsc.connect(bassGain);
            bassGain.connect(masterGain);
            bassOsc.start(now);
            bassOsc.stop(now + 4.5);

            // 2. The Shimmering Synth Chords (E Major 7th chord)
            // This gives it that mystical, 90s corporate tech vibe
            const chordFreqs = [164.81, 207.65, 246.94, 329.63, 415.30];
            chordFreqs.forEach((freq) => {
                const chordOsc = audioCtx.createOscillator();
                const chordGain = audioCtx.createGain();
                chordOsc.type = 'sawtooth';
                chordOsc.frequency.setValueAtTime(freq, now + 0.5); // Slight delay for impact

                chordGain.gain.setValueAtTime(0, now + 0.5);
                chordGain.gain.linearRampToValueAtTime(0.12 / chordFreqs.length, now + 1.2);
                chordGain.gain.exponentialRampToValueAtTime(0.01, now + 5.0);

                // Lowpass filter for the sweeping "wow" synth effect
                const filter = audioCtx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(300, now + 0.5);
                filter.frequency.exponentialRampToValueAtTime(3000, now + 1.5);
                filter.frequency.exponentialRampToValueAtTime(200, now + 5.0);

                chordOsc.connect(filter);
                filter.connect(chordGain);
                chordGain.connect(masterGain);

                chordOsc.start(now + 0.5);
                chordOsc.stop(now + 5.0);
            });

            // 3. The High Crystal Chime / Bell
            const bellOsc = audioCtx.createOscillator();
            const bellGain = audioCtx.createGain();
            bellOsc.type = 'sine';
            bellOsc.frequency.setValueAtTime(1318.51, now + 0.8); // High E

            bellGain.gain.setValueAtTime(0, now + 0.8);
            bellGain.gain.linearRampToValueAtTime(0.15, now + 0.9);
            bellGain.gain.exponentialRampToValueAtTime(0.001, now + 3.5);

            bellOsc.connect(bellGain);
            bellGain.connect(masterGain);
            bellOsc.start(now + 0.8);
            bellOsc.stop(now + 3.5);
        }

        let lowFx = false; // set true when many entities on screen -> skip expensive shadowBlur
        // Cheap glowing dot: uses shadowBlur only when FX budget allows, else a translucent halo.
        function snkGlowDot(x, y, r, color, haloColor) {
            if (lowFx) {
                ctx.fillStyle = haloColor || color;
                ctx.globalAlpha = 0.4;
                ctx.beginPath(); ctx.arc(x, y, r * 2.2, 0, Math.PI * 2); ctx.fill();
                ctx.globalAlpha = 1;
                ctx.fillStyle = color;
                ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
            } else {
                ctx.fillStyle = color;
                ctx.shadowColor = color;
                ctx.shadowBlur = r * 2.5;
                ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        // --- NEO-GEO / SNK STYLE RENDERING TOOLKIT (Metal Slug / KOF) ---
        // Bold black ink outlines, hard 3-tone cel shading, saturated palette.
        function snkShade(hex, amt) {
            // lighten(+)/darken(-) a hex color by amt (-1..1) for cel bands
            let n = parseInt(hex.slice(1), 16);
            let r = (n >> 16) & 255,
                g = (n >> 8) & 255,
                b = n & 255;
            if (amt >= 0) {
                r = Math.round(r + (255 - r) * amt);
                g = Math.round(g + (255 - g) * amt);
                b = Math.round(b + (255 - b) * amt);
            } else {
                r = Math.round(r * (1 + amt));
                g = Math.round(g * (1 + amt));
                b = Math.round(b * (1 + amt));
            }
            return `rgb(${r},${g},${b})`;
        }

        // Filled circle with ink outline + top-left cel highlight + bottom-right shadow
        function snkCircle(cx, cy, r, baseHex, outline = 2) {
            ctx.lineJoin = 'round';
            // shadow band
            ctx.fillStyle = snkShade(baseHex, -0.32);
            ctx.beginPath();
            ctx.arc(cx, cy, r, 0, Math.PI * 2);
            ctx.fill();
            // mid band (offset toward light)
            ctx.fillStyle = baseHex;
            ctx.beginPath();
            ctx.arc(cx - r * 0.12, cy - r * 0.12, r * 0.9, 0, Math.PI * 2);
            ctx.fill();
            // highlight band
            ctx.fillStyle = snkShade(baseHex, 0.4);
            ctx.beginPath();
            ctx.arc(cx - r * 0.32, cy - r * 0.32, r * 0.45, 0, Math.PI * 2);
            ctx.fill();
            // ink outline
            if (outline > 0) {
                ctx.strokeStyle = '#16121f';
                ctx.lineWidth = outline;
                ctx.beginPath();
                ctx.arc(cx, cy, r, 0, Math.PI * 2);
                ctx.stroke();
            }
        }

        // Cel-shaded rounded rectangle (body/armor blocks) with ink outline
        function snkRect(x, y, w, h, baseHex, outline = 2, rad = 3) {
            ctx.lineJoin = 'round';
            let r = Math.min(rad, w / 2, h / 2);
            function rr(xx, yy, ww, hh, rrad) {
                ctx.beginPath();
                ctx.moveTo(xx + rrad, yy);
                ctx.arcTo(xx + ww, yy, xx + ww, yy + hh, rrad);
                ctx.arcTo(xx + ww, yy + hh, xx, yy + hh, rrad);
                ctx.arcTo(xx, yy + hh, xx, yy, rrad);
                ctx.arcTo(xx, yy, xx + ww, yy, rrad);
                ctx.closePath();
            }
            // base
            ctx.fillStyle = baseHex;
            rr(x, y, w, h, r);
            ctx.fill();
            // top highlight strip
            ctx.fillStyle = snkShade(baseHex, 0.38);
            rr(x, y, w, h * 0.32, r);
            ctx.fill();
            // bottom shadow strip
            ctx.fillStyle = snkShade(baseHex, -0.3);
            rr(x, y + h * 0.66, w, h * 0.34, r);
            ctx.fill();
            // outline
            if (outline > 0) {
                ctx.strokeStyle = '#16121f';
                ctx.lineWidth = outline;
                rr(x, y, w, h, r);
                ctx.stroke();
            }
        }

        // Ink-outlined polygon with flat cel fill (for blades, spikes, wings)
        function snkPoly(pts, baseHex, outline = 2) {
            ctx.lineJoin = 'round';
            ctx.beginPath();
            ctx.moveTo(pts[0][0], pts[0][1]);
            for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i][0], pts[i][1]);
            ctx.closePath();
            ctx.fillStyle = baseHex;
            ctx.fill();
            if (outline > 0) {
                ctx.strokeStyle = '#16121f';
                ctx.lineWidth = outline;
                ctx.stroke();
            }
        }

        // --- WEAPON RENDERING HELPERS ---
        function getWeaponType(isHero) {
            if (isHero) {
                if (player.monkeyVirusLevel > 0) return 'banana_held'; // ULTRA RARE monkey banana
                if (player.hasStormcaller || player.hasApollosWrath) return 'bow';
                if (player.hasWindrunner || player.hasGodspeed) return 'shuriken';
                if (player.hasMeteorStorm || player.hasArmageddon) return 'staff';
                if (player.hasDivineBarrier || player.hasIronFortress) return 'shield';
                if (player.hasExecutioner || player.hasWorldbreaker) return 'axe';
                if (player.hasHomingFury || player.hasLancestrike || player.hasHolyLance || player.hasDivineJudgement) return 'lance';
                if (player.hasPrismStorm || player.hasBladeCommando) return 'prism_blade';
                // Base class weapons (evolutions above take priority)
                if (playerClass === 'mage') return 'staff';
                if (playerClass === 'archer') return 'bow';
            }
            return 'sword';
        }

        function drawFlyingWeapon(x, y, angle, isHero, projType) {
            let sx = x - camera.x,
                sy = y - camera.y;
            // Tier factor: projectiles visibly upgrade (grow + glow) as the hero powers up.
            // Driven by multiplierLevel + the relevant weapon level so tier-ups read on screen.
            let tier = 1;
            if (isHero) {
                let lv = (player.multiplierLevel - 1) + player.holyBladeLevel + Math.floor(player.bowLevel / 2);
                tier = 1 + Math.min(1.0, lv * 0.10); // up to +100% size/glow
            }
            ctx.save();
            ctx.translate(sx, sy);
            ctx.rotate(angle);

            // ULTRA RARE PROJECTILES
            if (projType === 'dagger' || projType === 'poison_dagger') {
                ctx.rotate(Math.PI / 2);
                let col = projType === 'poison_dagger' ? '#33ff44' : '#aaddff';
                // Dagger blade
                ctx.fillStyle = col;
                ctx.fillRect(-2, -14, 4, 14);
                ctx.fillStyle = projType === 'poison_dagger' ? '#00cc33' : '#bdc3c7';
                ctx.beginPath();
                ctx.moveTo(-2, -14);
                ctx.lineTo(0, -20);
                ctx.lineTo(2, -14);
                ctx.fill();
                // Guard
                ctx.fillStyle = '#f1c40f';
                ctx.fillRect(-5, -2, 10, 2);
                // Handle
                ctx.fillStyle = '#7f4a18';
                ctx.fillRect(-2, 0, 4, 6);
                if (projType === 'poison_dagger') {
                    ctx.shadowColor = '#33ff44';
                    ctx.shadowBlur = 8;
                    ctx.fillStyle = 'rgba(51,255,68,0.4)';
                    ctx.beginPath();
                    ctx.arc(0, -10, 5, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.restore();
                return;
            }

            if (projType === 'banana') {
                ctx.rotate(Math.PI / 2);
                let bSize = player.hasPrimeMonkey ? 1.8 : 1.0;
                ctx.scale(bSize, bSize);
                // Banana curve
                ctx.strokeStyle = '#f1c40f';
                ctx.lineWidth = 5;
                ctx.lineCap = 'round';
                ctx.beginPath();
                ctx.arc(0, 0, 12, 0.2, Math.PI - 0.2);
                ctx.stroke();
                ctx.strokeStyle = '#e5b400';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(0, 0, 12, 0.2, Math.PI - 0.2);
                ctx.stroke();
                ctx.fillStyle = '#f1c40f';
                ctx.beginPath();
                ctx.arc(-11, 1, 3, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(11, 1, 3, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
                return;
            }

            if (projType === 'arrow' || projType === 'lightning_arrow') {
                ctx.fillStyle = '#bdc3c7';
                ctx.fillRect(-8, -1, 16, 2);
                if (projType === 'lightning_arrow') {
                    ctx.fillStyle = '#00ffff';
                    ctx.shadowColor = '#00ffff';
                    ctx.shadowBlur = 8;
                    ctx.beginPath();
                    ctx.moveTo(8, -3);
                    ctx.lineTo(14, 0);
                    ctx.lineTo(8, 3);
                    ctx.fill();
                    ctx.fillRect(-10, -2, 4, 4);
                } else {
                    ctx.fillStyle = '#7f8c8d';
                    ctx.beginPath();
                    ctx.moveTo(8, -2);
                    ctx.lineTo(12, 0);
                    ctx.lineTo(8, 2);
                    ctx.fill();
                    ctx.fillStyle = '#c0392b';
                    ctx.beginPath();
                    ctx.moveTo(-8, -3);
                    ctx.lineTo(-12, -4);
                    ctx.lineTo(-10, 0);
                    ctx.lineTo(-12, 4);
                    ctx.lineTo(-8, 3);
                    ctx.fill();
                }
                ctx.restore();
                return;
            }

            if (projType === 'blood_spike') {
                // HEART OF THRONE: jagged crimson bone spike
                ctx.fillStyle = '#8b0000';
                ctx.shadowColor = '#c0392b';
                ctx.shadowBlur = 6;
                ctx.beginPath();
                ctx.moveTo(10, 0);
                ctx.lineTo(-4, -4);
                ctx.lineTo(-2, 0);
                ctx.lineTo(-4, 4);
                ctx.closePath();
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#e74c3c';
                ctx.beginPath();
                ctx.moveTo(8, 0);
                ctx.lineTo(-1, -2);
                ctx.lineTo(-1, 2);
                ctx.closePath();
                ctx.fill();
                ctx.restore();
                return;
            }

            if (projType === 'holy_bolt') {
                // SAINT SWORD: radiant animated cross-bolt
                let pulse = 0.7 + 0.3 * Math.sin(Date.now() * 0.025);
                let r = 9 * pulse;
                let gr = ctx.createRadialGradient(0, 0, 0, 0, 0, r * 2.4);
                gr.addColorStop(0, 'rgba(255, 250, 210, 0.95)');
                gr.addColorStop(0.5, 'rgba(255, 224, 120, 0.55)');
                gr.addColorStop(1, 'rgba(255, 210, 80, 0)');
                ctx.fillStyle = gr;
                ctx.beginPath();
                ctx.arc(0, 0, r * 2.4, 0, Math.PI * 2);
                ctx.fill();
                // rotating cross of light
                ctx.save();
                ctx.rotate(Date.now() * 0.01);
                ctx.fillStyle = '#fff7d6';
                ctx.shadowColor = '#fff2b0';
                ctx.shadowBlur = 10;
                ctx.fillRect(-1.5, -r, 3, r * 2);
                ctx.fillRect(-r, -1.5, r * 2, 3);
                ctx.restore();
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.arc(0, 0, r * 0.4, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
                return;
            }

            if (projType === 'blue_fireball') {
                // MAGE: small animated blue fireball; grows + glows brighter as it tiers up
                let pulse = 0.7 + 0.3 * Math.sin(Date.now() * 0.02 + x * 0.05);
                let r = (6 * pulse + 4) * tier;
                // outer glow (whiter/hotter core at higher tier)
                let gr = ctx.createRadialGradient(0, 0, 0, 0, 0, r * 2.2);
                gr.addColorStop(0, tier > 1.5 ? 'rgba(200, 235, 255, 0.95)' : 'rgba(120, 200, 255, 0.9)');
                gr.addColorStop(0.5, 'rgba(40, 120, 230, 0.5)');
                gr.addColorStop(1, 'rgba(20, 60, 160, 0)');
                ctx.fillStyle = gr;
                ctx.beginPath();
                ctx.arc(0, 0, r * 2.2, 0, Math.PI * 2);
                ctx.fill();
                // trailing tail (points opposite travel; we're rotated to travel +x)
                ctx.fillStyle = 'rgba(90, 170, 255, 0.45)';
                ctx.beginPath();
                ctx.moveTo(-r * 2.4, 0);
                ctx.lineTo(0, -r * 0.7);
                ctx.lineTo(0, r * 0.7);
                ctx.closePath();
                ctx.fill();
                // core
                ctx.fillStyle = '#bfe6ff';
                ctx.beginPath();
                ctx.arc(0, 0, r * 0.65, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.arc(-1, -1, r * 0.3, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
                return;
            }

            if (projType === 'class_arrow') {
                // ARCHER: sleek wooden arrow; lengthens + gains a glowing tip as it tiers up
                ctx.scale(tier, tier);
                if (tier > 1.5) {
                    ctx.shadowColor = '#7CFC00';
                    ctx.shadowBlur = 8;
                }
                ctx.fillStyle = '#8b5a2b';
                ctx.fillRect(-9, -1, 16, 2);
                ctx.fillStyle = tier > 1.5 ? '#d4ffcc' : '#cfd8dc';
                ctx.beginPath();
                ctx.moveTo(9, -3);
                ctx.lineTo(14, 0);
                ctx.lineTo(9, 3);
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#27ae60';
                ctx.beginPath();
                ctx.moveTo(-9, -3);
                ctx.lineTo(-13, -4);
                ctx.lineTo(-11, 0);
                ctx.lineTo(-13, 4);
                ctx.lineTo(-9, 3);
                ctx.fill();
                ctx.restore();
                return;
            }

            let len = (shopInventory.longswordPurchased || shopInventory.holyBladePurchased || player.hasTitanBlade || player.hasWarbringer ? 35 : 20) * (player.holyBladeLevel > 0 ? 1.5 : 1.0);
            let w = (shopInventory.longswordPurchased || shopInventory.holyBladePurchased || player.hasTitanBlade ? 6 : 4);
            let wType = getWeaponType(isHero);

            let swordColor = '#bdc3c7';
            if (isHero) {
                if (player.hasBloodGod || player.hasLordOfBlood) swordColor = '#e74c3c';
                else if (player.hasDivineJudgement || player.hasHolyLance || shopInventory.holyBladePurchased) swordColor = '#ffd700';
                else if (player.hasWorldbreaker || player.hasIronFortress) swordColor = '#455a64';
                else if (player.hasAbsoluteZero) swordColor = '#84ffff';
                else if (shopInventory.longswordPurchased) swordColor = '#bddcfa';
            }

            let localSpin = isHero ? globalAnimateClock : 0;
            ctx.rotate(Math.PI / 2);
            if ((player.holyBladeLevel > 0 || player.hasDivineJudgement) && isHero) {
                ctx.shadowColor = '#f1e080';
                ctx.shadowBlur = 14;
            }

            drawWeaponShape(ctx, wType, len, w, swordColor, localSpin);
            ctx.restore();
        }

        function drawWeaponShape(ctx, wType, len, w, color, spinAngle) {
            if (wType === 'banana_held') {
                // Banana held in hand - yellow curved shape
                ctx.strokeStyle = '#f1c40f';
                ctx.lineWidth = 4;
                ctx.lineCap = 'round';
                ctx.beginPath();
                ctx.arc(0, 0, 14, 0, Math.PI - 0.1);
                ctx.stroke();
                ctx.strokeStyle = '#e5b400';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(0, 0, 14, 0, Math.PI - 0.1);
                ctx.stroke();
                ctx.fillStyle = '#f1c40f';
                ctx.beginPath();
                ctx.arc(-14, 0, 3, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(14, 0, 3, 0, Math.PI * 2);
                ctx.fill();
                return;
            }
            if (wType === 'shuriken') {
                ctx.rotate(spinAngle * 15);
                ctx.fillStyle = '#7f8c8d';
                ctx.beginPath();
                ctx.moveTo(0, -14);
                ctx.lineTo(4, -4);
                ctx.lineTo(14, 0);
                ctx.lineTo(4, 4);
                ctx.lineTo(0, 14);
                ctx.lineTo(-4, 4);
                ctx.lineTo(-14, 0);
                ctx.lineTo(-4, -4);
                ctx.fill();
                ctx.fillStyle = '#bdc3c7';
                ctx.beginPath();
                ctx.arc(0, 0, 4, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#2c3e50';
                ctx.beginPath();
                ctx.arc(0, 0, 2, 0, Math.PI * 2);
                ctx.fill();
            } else if (wType === 'axe') {
                ctx.rotate(spinAngle * 12);
                ctx.fillStyle = '#7f8c8d';
                ctx.fillRect(-2, -len / 2, 4, len);
                ctx.fillStyle = color;
                ctx.beginPath();
                ctx.moveTo(2, -len / 4);
                ctx.lineTo(16, -len / 2);
                ctx.lineTo(16, 0);
                ctx.fill();
                ctx.beginPath();
                ctx.moveTo(-2, -len / 4);
                ctx.lineTo(-16, -len / 2);
                ctx.lineTo(-16, 0);
                ctx.fill();
            } else if (wType === 'staff') {
                ctx.fillStyle = '#8e44ad';
                ctx.fillRect(-2, -len, 4, len);
                ctx.fillStyle = '#f39c12';
                ctx.beginPath();
                ctx.arc(0, -len, 8, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#e74c3c';
                ctx.beginPath();
                ctx.arc(0, -len, 4, 0, Math.PI * 2);
                ctx.fill();
            } else if (wType === 'shield') {
                ctx.rotate(spinAngle * 8);
                ctx.fillStyle = color;
                ctx.fillRect(-10, -12, 20, 24);
                ctx.fillStyle = '#ecf0f1';
                ctx.fillRect(-6, -8, 12, 16);
                ctx.fillStyle = '#f1c40f';
                ctx.fillRect(-2, -4, 4, 8);
            } else if (wType === 'lance') {
                ctx.fillStyle = color;
                ctx.fillRect(-2, -len * 1.2, 4, len * 1.5);
                ctx.fillStyle = '#e0f8f3';
                ctx.beginPath();
                ctx.moveTo(-6, -len * 1.2);
                ctx.lineTo(0, -len * 1.6);
                ctx.lineTo(6, -len * 1.2);
                ctx.fill();
            } else if (wType === 'prism_blade') {
                let t = Date.now() * 0.005;
                let r = Math.floor(127 + 128 * Math.sin(t));
                let g = Math.floor(127 + 128 * Math.sin(t + 2));
                let b = Math.floor(127 + 128 * Math.sin(t + 4));
                ctx.fillStyle = `rgb(${r},${g},${b})`;
                ctx.fillRect(-w / 2, -len, w, len);
                ctx.fillStyle = '#fff';
                ctx.fillRect(-w / 2 + 1, -len + 1, w - 2, len - 4);
                ctx.fillStyle = '#cc9e24';
                ctx.fillRect(-w * 1.5, -len * 0.1, w * 3, w);
            } else if (wType === 'bow') {
                ctx.strokeStyle = color;
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.arc(0, 0, 15, -Math.PI / 2, Math.PI / 2);
                ctx.stroke();
                ctx.strokeStyle = 'rgba(255,255,255,0.5)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(0, -15);
                ctx.lineTo(0, 15);
                ctx.stroke();
            } else {
                for (let t = 1; t <= 3; t++) {
                    ctx.save();
                    ctx.globalAlpha = 0.12 * (4 - t);
                    ctx.translate(0, t * 4);
                    ctx.fillStyle = color;
                    ctx.fillRect(-w / 2, -len, w, len);
                    ctx.restore();
                }
                ctx.fillStyle = color;
                ctx.fillRect(-w / 2, -len, w, len);
                ctx.fillStyle = 'rgba(255,255,255,0.5)';
                ctx.fillRect(-w / 2 + 1, -len + 1, w - 2, len - 4);
                ctx.fillStyle = '#cc9e24';
                ctx.fillRect(-w * 1.5, -len * 0.1, w * 3, w);
            }
        }

        function updateLootHUD() {
            const inventoryDiv = document.getElementById('loot-inventory');
            if (!inventoryDiv) return;
            inventoryDiv.innerHTML = '';

            function getLootData(id) {
                const allArrays = [standardLootOptions, rareLootOptions, level2LootOptions, level2RareLootOptions, level3LootOptions, level3RareLootOptions, level4LootOptions];
                for (let arr of allArrays) {
                    let found = arr.find(l => l.id === id);
                    if (found) return found;
                }
                if (id === 'saint_sword') return saintSwordLoot;
                if (id === 'heart_of_throne') return heartOfThroneLoot;
                for (let key in evolvedLootOptions) {
                    if (evolvedLootOptions[key].id === id) return evolvedLootOptions[key];
                }
                for (let key in legendaryLootOptions) {
                    if (legendaryLootOptions[key].id === id) return legendaryLootOptions[key];
                }
                return null;
            }

            let displayItems = [];
            for (let baseId in lootCounts) {
                let currentId = baseId;
                let displayCount = lootCounts[baseId];

                if (unlockedEvolutions[baseId]) {
                    let evData = evolvedLootOptions[baseId];
                    if (evData) {
                        currentId = evData.id;
                        displayCount = evolvedCounts[currentId] || 1;
                        if (unlockedLegendaries[currentId]) {
                            let lgData = legendaryLootOptions[currentId];
                            if (lgData) {
                                currentId = lgData.id;
                                displayCount = "★";
                            }
                        }
                    }
                }

                let data = getLootData(currentId);
                if (data) {
                    let icon = data.title.split(' ')[0];
                    displayItems.push({
                        icon,
                        count: displayCount,
                        color: data.iconColor
                    });
                }
            }

            displayItems.forEach(item => {
                let box = document.createElement('div');
                box.className = 'loot-icon-box';
                box.style.borderColor = item.color;

                let iconEl = document.createElement('span');
                iconEl.className = 'icon';
                iconEl.innerText = item.icon;

                let countEl = document.createElement('span');
                countEl.className = 'count';
                countEl.innerText = item.count;
                if (item.count === "★") countEl.style.color = "#f1c40f";

                box.appendChild(iconEl);
                box.appendChild(countEl);
                inventoryDiv.appendChild(box);
            });
        }

        function initEnvironmentMaps() {
            forestBeds = [];
            forestTrees = [];
            castlePillars = [];
            fireflyPoints = [];
            fogPatches = [];
            brokenPillars = [];
            level2FloorTiles = [];

            if (currentLevel === 2) {
                for (let i = 0; i < 20; i++) {

                        py = Math.random() * worldHeight;
                    } while (distSq(px, py, worldWidth / 2, worldHeight / 2) < 40000);

                    brokenPillars.push({
                        x: px,
                        y: py,
                        radius: 20 + Math.random() * 15,
                        type: Math.floor(Math.random() * 3)
                    });
                }
                for (let i = 0; i < 150; i++) {
                    level2FloorTiles.push({
                        x: Math.random() * worldWidth,
                        y: Math.random() * worldHeight,
                        type: Math.random() > 0.6 ? 'grass' : 'broken',
                        size: 15 + Math.random() * 25
                    });
                }
                for (let i = 0; i < 70; i++) {
                    castlePillars.push({
                        x: Math.random() * worldWidth,
                        y: Math.random() * worldHeight,
                        w: 35 + Math.random() * 20,
                        h: 70 + Math.random() * 40,
                        glow: Math.random() < 0.3,
                        seed: Math.random() * Math.PI * 2
                    });
                }
                castlePillars.sort((a, b) => a.y - b.y);
            }

            if (currentLevel === 1) {
                for (let i = 0; i < 140; i++) {
                    forestBeds.push({
                        x: Math.random() * worldWidth,
                        y: Math.random() * worldHeight,
                        w: 50 + Math.random() * 80,
                        h: 25 + Math.random() * 40,
                        color: Math.random() > 0.5 ? '#0e1c0f' : '#142616'
                    });
                }
                for (let i = 0; i < 130; i++) {
                    forestTrees.push({
                        x: Math.random() * worldWidth,
                        y: Math.random() * worldHeight,
                        scale: 0.75 + Math.random() * 0.65
                    });
                }
                forestTrees.sort((a, b) => a.y - b.y);
                for (let i = 0; i < 80; i++) {
                    fireflyPoints.push({
                        x: Math.random() * worldWidth,
                        y: Math.random() * worldHeight,
                        seed: Math.random() * Math.PI * 2
                    });
                }
            }

            if (currentLevel === 4) {
                // Sand arena: scattered pixel sand patches + perimeter banner posts
                for (let i = 0; i < 220; i++) {
                    level2FloorTiles.push({
                        x: Math.random() * worldWidth,
                        y: Math.random() * worldHeight,
                        type: Math.random() > 0.5 ? 'sand_light' : 'sand_dark',
                        size: 16 + Math.random() * 28
                    });
                }
                // Blood/scorch stains on the arena sand
                for (let i = 0; i < 40; i++) {
                    level2FloorTiles.push({
                        x: Math.random() * worldWidth,
                        y: Math.random() * worldHeight,
                        type: 'stain',
                        size: 20 + Math.random() * 30
                    });
                }
                // Banner posts around the arena perimeter (visual flavor in fogPatches-like list)
                for (let i = 0; i < 24; i++) {
                    let t = i / 24;
                    castlePillars.push({
                        x: 120 + t * (worldWidth - 240),
                        y: (i % 2 === 0) ? 70 : worldHeight - 70,
                        w: 18,
                        h: 90,
                        glow: false,
                        seed: Math.random() * Math.PI * 2,
                        banner: ['#c0392b', '#27ae60', '#2980b9', '#f1c40f'][i % 4]
                    });
                }
                // Helper: keep arena features away from the central spawn point
                let centerClear = (px, py) => distSq(px, py, worldWidth / 2, worldHeight / 2) > 200 * 200;
                // Explosive barrels scattered across the arena
                for (let i = 0; i < 22; i++) {
                    let px, py, tries = 0;
                    do {
                        px = 120 + Math.random() * (worldWidth - 240);
                        py = 120 + Math.random() * (worldHeight - 240);
                        tries++;
                    } while (!centerClear(px, py) && tries < 10);
                    barrels.push({
                        x: px,
                        y: py,
                        radius: 16,
                        hp: 1,
                        exploding: false,
                        boomTimer: 0,
                        seed: Math.random() * Math.PI * 2
                    });
                }
                // Solid obstacles: rocks + logs (block movement)
                for (let i = 0; i < 26; i++) {
                    let px, py, tries = 0;
                    do {
                        px = 120 + Math.random() * (worldWidth - 240);
                        py = 120 + Math.random() * (worldHeight - 240);
                        tries++;
                    } while (!centerClear(px, py) && tries < 10);
                    let isLog = Math.random() < 0.45;
                    arenaObstacles.push({
                        x: px,
                        y: py,
                        type: isLog ? 'log' : 'rock',
                        radius: isLog ? 26 : 20 + Math.random() * 8,
                        rot: Math.random() * Math.PI,
                        seed: Math.random() * Math.PI * 2
                    });
                }
                // Puddles: walkable but slow the hero
                for (let i = 0; i < 14; i++) {
                    let px = 120 + Math.random() * (worldWidth - 240);
                    let py = 120 + Math.random() * (worldHeight - 240);
                    arenaObstacles.push({
                        x: px,
                        y: py,
                        type: 'puddle',
                        radius: 34 + Math.random() * 22,
                        seed: Math.random() * Math.PI * 2
                    });
                }
                // Decorative pebbles + weeds
                for (let i = 0; i < 120; i++) {
                    arenaDecor.push({
                        x: Math.random() * worldWidth,
                        y: Math.random() * worldHeight,
                        type: Math.random() < 0.55 ? 'pebble' : 'weed',
                        size: 3 + Math.random() * 5,
                        seed: Math.random() * Math.PI * 2
                    });
                }
            }

            for (let i = 0; i < 30; i++) {
                fogPatches.push({
                    x: Math.random() * worldWidth,
                    y: Math.random() * worldHeight,
                    r: 120 + Math.random() * 180,
                    seed: Math.random() * Math.PI * 2
                });
            }
        }

                        else if (card.lootData.isRare || card.lootData._legendaryFromId || card.lootData._evolvedFromId) playRareLootSFX();

                        let pickedId = card.lootData.id;

                        } else if (card.lootData._evolvedFromId) {

        });

        function movePlayer() {
            if (Date.now() < player.stunnedTimer) return;

            let dx = 0,
                dy = 0;
            if (keys['w'] || keys['arrowup']) dy -= 1;
            if (keys['s'] || keys['arrowdown']) dy += 1;
            if (keys['a'] || keys['arrowleft']) dx -= 1;
            if (keys['d'] || keys['arrowright']) dx += 1;

            player.isMoving = (dx !== 0 || dy !== 0);

            let effSpeed = getEffectivePlayerSpeed();
            let speedX = (dx * effSpeed) + player.kbX;
            let speedY = (dy * effSpeed) + player.kbY;

            if (dx !== 0 && dy !== 0) {
                speedX = (dx * 0.7071 * effSpeed) + player.kbX;
                speedY = (dy * 0.7071 * effSpeed) + player.kbY;
            }

            let nextX = player.x + speedX;
            let nextY = player.y + speedY;
            let collides = false;

            // Build the list of solid blockers for this stage
            let solids = null;
            if (currentLevel === 2) {
                solids = brokenPillars;
            } else if (currentLevel === 4) {
                solids = arenaObstacles.filter(o => o.type === 'rock' || o.type === 'log');
            }

            if (solids) {
                for (let p of solids) {
                    if (distSq(nextX, nextY, p.x, p.y) < (player.radius + p.radius) * (player.radius + p.radius)) {
                        collides = true;
                        break;
                    }
                }
            }

            if (!collides) {
                player.x = nextX;
                player.y = nextY;
            } else {
                let colX = false,
                    colY = false;
                for (let p of solids) {
                    if (distSq(nextX, player.y, p.x, p.y) < (player.radius + p.radius) * (player.radius + p.radius)) colX = true;
                    if (distSq(player.x, nextY, p.x, p.y) < (player.radius + p.radius) * (player.radius + p.radius)) colY = true;
                }
                if (!colX) player.x = nextX;
                if (!colY) player.y = nextY;
            }

            // PUDDLES (Stage 4): walking over one briefly slows the hero
            if (currentLevel === 4) {
                for (let o of arenaObstacles) {
                    if (o.type !== 'puddle') continue;
                    if (distSq(player.x, player.y, o.x, o.y) < (o.radius * 0.8) * (o.radius * 0.8)) {
                        // refresh a short slow so it lasts only while on/just-left the puddle
                        if (player.slowTimer < Date.now() + 250) {
                            player.slowTimer = Date.now() + 350;
                            player.slowMagnitude = Math.max(player.slowMagnitude, 0.35);
                        }
                        break;
                    }
                }
            }

            if (dx !== 0) player.moveDirX = dx;

            player.kbX *= 0.85;
            player.kbY *= 0.85;
            if (Math.abs(player.kbX) < 0.05) player.kbX = 0;
            if (Math.abs(player.kbY) < 0.05) player.kbY = 0;

            player.x = Math.max(player.radius + 15, Math.min(worldWidth - player.radius - 15, player.x));
            if (currentLevel !== 3) {
                player.y = Math.max(player.radius + 15, Math.min(worldHeight - player.radius - 15, player.y));
            }
        }

        function updateCamera() {
            if (currentLevel === 3) {
                let autoScrollSpeed = 0.5 + (totalSeconds * 0.005);
                level3CameraY -= autoScrollSpeed;
                camera.x = player.x - canvas.width / 2;
                camera.x = Math.max(0, Math.min(worldWidth - canvas.width, camera.x));
                camera.y = level3CameraY;
                if (player.y > camera.y + canvas.height - player.radius - 10) {
                    player.y = camera.y + canvas.height - player.radius - 10;
                }
                if (player.y < camera.y + player.radius + 10) {
                    player.y = camera.y + player.radius + 10;
                }
                if (level3CameraY < 1000) {
                    let shift = 1000;
                    level3CameraY += shift;
                    camera.y += shift;
                    player.y += shift;
                    enemies.forEach(e => e.y += shift);
                    bullets.forEach(b => {
                        b.y += shift;
                        b.startY += shift;
                    });
                    enemyProjectiles.forEach(ep => ep.y += shift);
                    coins.forEach(c => c.y += shift);
                    chickens.forEach(c => c.y += shift);
                    friendlySkeletons.forEach(s => s.y += shift);
                }
            } else {
                camera.x = player.x - canvas.width / 2;
                camera.y = player.y - canvas.height / 2;
                camera.x = Math.max(0, Math.min(worldWidth - canvas.width, camera.x));
                camera.y = Math.max(0, Math.min(worldHeight - canvas.height, camera.y));
            }
        }

        // --- PLAYER STATUS EFFECT APPLIERS ---
        function applySlowToPlayer(magnitude, durationMs) {
            const wasActive = player.slowTimer > Date.now();
            player.slowTimer = Date.now() + durationMs;
            player.slowMagnitude = Math.min(0.6, magnitude); // cap so the hero is never fully locked
            if (!wasActive) playSlowSFX();
            spawnParticles(player.x, player.y, 8, '#5dade2', 2.5, 20, 3);
        }

        function applyBurnToPlayer(durationMs) {
            const wasActive = player.burnTimer > Date.now();
            player.burnTimer = Date.now() + durationMs;
            if (!wasActive) {
                player.burnLastTick = Date.now();
                playBurnSFX();
            }
            spawnParticles(player.x, player.y, 8, '#e67e22', 2.5, 20, 3);
        }

        function applyBleedToPlayer(durationMs) {
            const wasActive = player.bleedTimer > Date.now();
            player.bleedTimer = Date.now() + durationMs;
            if (!wasActive) {
                player.bleedLastTick = Date.now();
                playBleedSFX();
            }
            spawnParticles(player.x, player.y, 8, '#c0392b', 2.5, 20, 3);
        }

        function applyPoisonToPlayer(durationMs) {
            const wasActive = player.poisonTimer > Date.now();
            player.poisonTimer = Date.now() + durationMs;
            if (!wasActive) {
                player.poisonLastTick = Date.now();
                playPoisonHitSFX();
            }
            spawnParticles(player.x, player.y, 8, '#33ff44', 2.5, 20, 3);
        }

        // Effective move speed after SLOW
        function getEffectivePlayerSpeed() {
            if (player.slowTimer > Date.now()) {
                return player.speed * (1 - player.slowMagnitude);
            }
            return player.speed;
        }

        // Per-frame tick for BURN and BLEED damage-over-time on the player.
        // BURN also lowers hero attack: we apply a -30% multiplier to player.dmgBonus while
        // burning by snapshotting the un-burned value, so all 17 damage sites stay untouched.
        function updatePlayerStatusEffects() {
            const sNow = Date.now();
            const burning = player.burnTimer > sNow;

            // Manage the burn attack penalty via a snapshot of the real dmgBonus.
            if (burning && !player._burnPenaltyActive) {
                player._dmgBonusBeforeBurn = player.dmgBonus;
                player.dmgBonus = player.dmgBonus * 0.7; // BURN: -30% attack
                player._burnPenaltyActive = true;
            } else if (!burning && player._burnPenaltyActive) {
                // Restore, but preserve any buffs/curses gained while burning by applying the same ratio back.
                player.dmgBonus = player.dmgBonus / 0.7;
                player._burnPenaltyActive = false;
            }

            // BURN: DoT ticks
            if (burning) {
                if (sNow - player.burnLastTick > 1000) {
                    player.burnLastTick = sNow;
                    dealStatusDamageToPlayer(3); // 3 dmg per burn tick
                    spawnParticles(player.x, player.y, 5, '#e67e22', 2, 16, 2.5);
                }
            }
            // BLEED: DoT ticks; also blocks regen (handled in regen check)
            if (player.bleedTimer > sNow) {
                if (sNow - player.bleedLastTick > 1000) {
                    player.bleedLastTick = sNow;
                    dealStatusDamageToPlayer(4); // 4 dmg per bleed tick
                    spawnParticles(player.x, player.y, 5, '#c0392b', 2, 16, 2.5);
                }
            }
            // POISON: DoT ticks (turns hero green; see sprite tint)
            if (player.poisonTimer > sNow) {
                if (sNow - player.poisonLastTick > 1000) {
                    player.poisonLastTick = sNow;
                    dealStatusDamageToPlayer(2); // 2 dmg per poison tick
                    spawnParticles(player.x, player.y, 5, '#33ff44', 2, 16, 2.5);
                }
            }

            // HUD: tint the HP bar to the dominant active status effect color (or normal red).
            let st = getPlayerStatus();
            let barCol = st ? STATUS_COLORS[st] : '';
            if (player._hpBarStatus !== (st || '')) {
                player._hpBarStatus = st || '';
                hpFill.style.background = barCol || '';
                hpFill.style.boxShadow = st ? `0 0 8px ${barCol}` : '';
            }
        }

        const STATUS_COLORS = {
            frozen: '#5dc0ff',
            stun: '#f1c40f',
            poison: '#39ff14',
            burn: '#e67e22',
            bleed: '#c0392b',
            slow: '#5dcfe0'
        };
        // Returns the dominant active player status (priority order) or null.
        function getPlayerStatus() {
            const n = Date.now();
            if (player.frozenTimer && n < player.frozenTimer) return 'frozen';
            if (n < player.stunnedTimer) return 'stun';
            if (player.poisonTimer > n) return 'poison';
            if (player.burnTimer > n) return 'burn';
            if (player.bleedTimer > n) return 'bleed';
            if (player.slowTimer > n) return 'slow';
            return null;
        }

        // Minimal status icon drawn above the hero's head.
        function drawStatusIcon(st) {
            let iy = -32;
            ctx.save();
            ctx.translate(0, iy);
            // little badge
            ctx.fillStyle = 'rgba(0,0,0,0.55)';
            ctx.beginPath(); ctx.arc(0, 0, 7, 0, Math.PI * 2); ctx.fill();
            ctx.strokeStyle = STATUS_COLORS[st]; ctx.lineWidth = 1.5;
            ctx.beginPath(); ctx.arc(0, 0, 7, 0, Math.PI * 2); ctx.stroke();
            ctx.fillStyle = STATUS_COLORS[st];
            if (st === 'frozen') {
                // snowflake: 3 crossing lines
                for (let a = 0; a < 3; a++) {
                    let ang = a * Math.PI / 3;
                    ctx.beginPath();
                    ctx.moveTo(-Math.cos(ang) * 5, -Math.sin(ang) * 5);
                    ctx.lineTo(Math.cos(ang) * 5, Math.sin(ang) * 5);
                    ctx.stroke();
                }
            } else if (st === 'stun') {
                // spiral-ish star
                ctx.font = 'bold 9px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText('✦', 0, 0.5);
            } else if (st === 'poison') {
                // skull dot
                ctx.beginPath(); ctx.arc(0, -1, 3, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = '#0a0a0a';
                ctx.fillRect(-1.5, -1.5, 1, 1.5); ctx.fillRect(0.5, -1.5, 1, 1.5);
            } else if (st === 'burn') {
                // flame
                ctx.beginPath(); ctx.moveTo(0, -5); ctx.quadraticCurveTo(4, 0, 0, 5); ctx.quadraticCurveTo(-4, 0, 0, -5); ctx.fill();
            } else if (st === 'bleed') {
                // droplet
                ctx.beginPath(); ctx.moveTo(0, -5); ctx.quadraticCurveTo(4, 2, 0, 5); ctx.quadraticCurveTo(-4, 2, 0, -5); ctx.fill();
            } else {
                // slow: clock-ish
                ctx.beginPath(); ctx.arc(0, 0, 4, 0, Math.PI * 2); ctx.fill();
                ctx.strokeStyle = '#0a0a0a'; ctx.lineWidth = 1;
                ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, -3); ctx.moveTo(0, 0); ctx.lineTo(2, 0); ctx.stroke();
            }
            ctx.restore();
        }

        // Status DoT bypasses armor/shield mitigation flash but still routes through HP/shield
        function dealStatusDamageToPlayer(amount) {
            if (player.shield > 0) {
                player.shield -= amount;
                if (player.shield < 0) {
                    player.hp += player.shield;
                    player.shield = 0;
                }
            } else {
                player.hp -= amount;
            }
            hpFill.style.width = `${Math.max(0, (player.hp / player.maxHp) * 100)}%`;
            updateShieldUI();
            if (player.hp <= 0) triggerGameOver();
        }

        function dealDamageToPlayer(amount) {
            if (shopInventory.blackArmorPurchased) {
                amount *= 0.70;
            } else if (shopInventory.redArmorPurchased) {
                amount *= 0.80;
            }
            if (player.damageReduction > 0) {
                amount *= (1 - player.damageReduction); // THORNED CARAPACE / VENGEFUL BULWARK
            }
            if (player.shield > 0) {
                player.shield -= amount;
                if (player.shield < 0) {
                    player.hp += player.shield;
                    player.shield = 0;
                }
            } else {
                player.hp -= amount;
            }
            playPlayerHitSFX();
            hitFlashAlpha = 0.45;
            triggerShake(6);
            hpFill.style.width = `${Math.max(0, (player.hp / player.maxHp) * 100)}%`;
            updateShieldUI();
            if (player.hp <= 0) triggerGameOver();
        }

        function explodeBarrel(b) {
            if (b.exploding) return;
            b.exploding = true;
            b.boomTimer = Date.now();
            const blastRadius = 130;
            playBoomSFX();
            triggerShake(16);
            // Blast particles
            spawnParticles(b.x, b.y, 40, '#ff6600', 6, blastRadius * 0.5, 6);
            spawnParticles(b.x, b.y, 24, '#ffcc00', 5, blastRadius * 0.4, 5);
            spawnParticles(b.x, b.y, 16, '#7f8c8d', 4, blastRadius * 0.5, 4);
            // Damage enemies in radius
            for (let j = enemies.length - 1; j >= 0; j--) {
                let e = enemies[j];
                if (distSq(b.x, b.y, e.x, e.y) < (blastRadius + e.radius) * (blastRadius + e.radius)) {
                    damageEnemy(e, 60 * player.dmgBonus);
                    let ka = Math.atan2(e.y - b.y, e.x - b.x);
                    e.x += Math.cos(ka) * 18;
                    e.y += Math.sin(ka) * 18;
                    if (e.hp <= 0) {
                        playCustomHitSFX(e.type);
                        processEnemyElimination(enemies.splice(j, 1)[0]);
                    }
                }
            }
            // Damage the player if too close (barrels are dangerous!)
            if (distSq(b.x, b.y, player.x, player.y) < (blastRadius + player.radius) * (blastRadius + player.radius)) {
                dealDamageToPlayer(18);
                let ka = Math.atan2(player.y - b.y, player.x - b.x);
                player.kbX = Math.cos(ka) * 22;
                player.kbY = Math.sin(ka) * 22;
            }
            // Chain reaction: ignite nearby barrels shortly after
            for (let other of barrels) {
                if (other !== b && !other.exploding && distSq(b.x, b.y, other.x, other.y) < (blastRadius + other.radius) * (blastRadius + other.radius)) {
                    other.chainAt = Date.now() + 120;
                }
            }
        }

        function damageEnemy(e, amount) {
            // SHIELD BAR: shielded enemies (Tife, Ursula) absorb damage on their shield first.
            if (e.shield !== undefined && e.shield > 0) {
                e.shield -= amount;
                if (e.shield < 0) {
                    e.hp += e.shield; // spill remainder onto HP
                    e.shield = 0;
                }
                return;
            }
            e.hp -= amount;
            if (e.hp > 0 && e.type === 'nagalord' && Math.random() < 0.15) {
                let angle = Math.atan2(player.y - e.y, player.x - e.x);
                enemyProjectiles.push({
                    x: e.x,
                    y: e.y,
                    radius: 10,
                    vx: Math.cos(angle) * 6,
                    vy: Math.sin(angle) * 6,
                    type: 'naga_blade',
                    isReflected: false
                });
            }
        }

        function handleDifficultyAndTimers() {
            let elapsedMs = (Date.now() - startTime) - pausedTimeAcc;
            totalSeconds = Math.floor(elapsedMs / 1000);
            timerEl.innerText = `${Math.floor(totalSeconds / 60).toString().padStart(2, '0')}:${(totalSeconds % 60).toString().padStart(2, '0')}`;
            enemySpeedMultiplier = 1.0 + (totalSeconds * 0.006);

            if (currentLevel === 1) {
                if (totalSeconds >= 300) {
                    if (currentTheme !== 'BOSS') {
                        currentTheme = 'BOSS';
                        musicStep = 0;
                        startSequencer();
                    }
                    currentSpawnCooldown = 1500 * 0.96 * 0.97 * spawnRateBonus; // BALANCE PASS: +3% spawn rate
                } else if (totalSeconds >= 180 && totalSeconds < 240) {
                    currentSpawnCooldown = 260 * 0.96 * 0.97 * spawnRateBonus; // BALANCE PASS: +3% spawn rate
                } else {
                    currentSpawnCooldown = Math.max(340, 1300 - (totalSeconds * 12)) * 0.96 * 0.97 * spawnRateBonus; // BALANCE PASS: +3% spawn rate
                }
            } else if (currentLevel === 2) {
                currentSpawnCooldown = Math.max(400, 1500 - (totalSeconds * 12)) * spawnRateBonus * 1.05 * 0.97; // BALANCE PASS: +3% spawn rate
            } else if (currentLevel === 4) {
                // STAGE 4 BATTLE ARENA timeline — denser spawns than before
                let base = Math.max(320, 1080 - (totalSeconds * 12)) * spawnRateBonus * 0.97;
                if (totalSeconds >= 390) {
                    // 6:30+ : drastically thin out spawns (-70%) to build tension before the boss
                    base = base / 0.30;
                }
                if (totalSeconds >= 420) {
                    // 7:00 : boss window — heavily suppress regular spawns so Ursula owns the arena
                    base = base * 6;
                }
                if (totalSeconds >= 300 && totalSeconds < 390) {
                    // 5:00 : frenzy — +5% spawn rate (lower cooldown)
                    base = base * 0.95;
                }
                currentSpawnCooldown = base;

                // Dynamic music: intense drums kick in at 5:00
                if (totalSeconds >= 300 && !stage4IntenseTriggered) {
                    stage4IntenseTriggered = true;
                    currentTheme = 'LEVEL_4_INTENSE';
                    musicStep = 0;
                    startSequencer();
                }
                // Ursula boss theme at 7:00
                if (totalSeconds >= 420 && currentTheme !== 'BOSS') {
                    currentTheme = 'BOSS';
                    musicStep = 0;
                    startSequencer();
                }
            } else {
                currentSpawnCooldown = Math.max(200, 900 - (totalSeconds * 15)) * spawnRateBonus * 0.97; // BALANCE PASS: +3% spawn rate
            }

            globalAnimateClock += 0.05;
            if (player.shieldLevel > 0 && player.shield < player.maxShield && globalAnimateClock % 4 < 0.05) {
                player.shield = Math.min(player.maxShield, player.shield + 1);
                updateShieldUI();
            }
            if (player.regenLevel > 0 && player.bleedTimer < Date.now() && Date.now() - lastRegenTick > 2000) {
                player.hp = Math.min(player.maxHp, player.hp + (player.regenLevel * 3));
                hpFill.style.width = `${(player.hp / player.maxHp) * 100}%`;
                lastRegenTick = Date.now();
            }
        }
