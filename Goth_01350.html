                            processEnemyElimination(enemies.splice(i, 1)[0]);
                            continue;
                        }
                    }
                }
            }
        }

        // --- GRAPHICS & RENDERING SYSTEM ---

        function saveGame(slotIndex) {
            // Save the START-OF-STAGE snapshot (not live mid-stage state) so that loading
            // a save restores items/levels exactly as they were when the current stage began.
            let snap = stageStartSnapshot || buildLiveSaveData();
            localStorage.setItem('gothic_save_' + slotIndex, JSON.stringify(snap));
            loadSaveSlots();
        }

        function buildLiveSaveData() {
            return {
                currentLevel,
                score,
                totalSeconds: 0,
                shopInventory: JSON.parse(JSON.stringify(shopInventory)),
                lootCounts: JSON.parse(JSON.stringify(lootCounts)),
                evolvedCounts: JSON.parse(JSON.stringify(evolvedCounts)),
                unlockedEvolutions: JSON.parse(JSON.stringify(unlockedEvolutions)),
                unlockedLegendaries: JSON.parse(JSON.stringify(unlockedLegendaries)),
                swordSizeModifier,
                bossesDefeated,
                xpGainMultiplier,
                spawnRateBonus,
                playerClass,
                player: {
                    ...player,
                    isMoving: false,
                    kbX: 0,
                    kbY: 0
                }
            };
        }

        // Capture the player/loot state at the moment a stage begins. Loading later restores
        // THIS, so a mid-stage death/resume never carries the scaling earned during the stage.
        function captureStageStartSnapshot() {
            stageStartSnapshot = buildLiveSaveData();
            stageStartSnapshot.totalSeconds = 0;
        }

        function saveGameLegacy(slotIndex) {
            let saveData = {
                currentLevel,
                score,
                totalSeconds,
                shopInventory,
                lootCounts,
                evolvedCounts,
                unlockedEvolutions,
                unlockedLegendaries,
                swordSizeModifier,
                bossesDefeated,
                xpGainMultiplier,
                spawnRateBonus,
                player: {
                    ...player,
                    isMoving: false,
                    kbX: 0,
                    kbY: 0
                }
            };
            localStorage.setItem('gothic_save_' + slotIndex, JSON.stringify(saveData));
            loadSaveSlots();
        }

        function loadGame(slotIndex) {
            let data = JSON.parse(localStorage.getItem('gothic_save_' + slotIndex));
            if (!data) return;

            currentLevel = data.currentLevel;
            score = data.score;
            totalSeconds = data.totalSeconds || 0;
            shopInventory = data.shopInventory;
            lootCounts = data.lootCounts;
            evolvedCounts = data.evolvedCounts;
            unlockedEvolutions = data.unlockedEvolutions;
            unlockedLegendaries = data.unlockedLegendaries;
            swordSizeModifier = data.swordSizeModifier;
            bossesDefeated = data.bossesDefeated;
            xpGainMultiplier = data.xpGainMultiplier;
            spawnRateBonus = data.spawnRateBonus;
            if (data.playerClass) playerClass = data.playerClass;
            player = {
                ...player,
                ...data.player,
                isMoving: false,
                kbX: 0,
                kbY: 0
            };

            if (currentLevel === 4) {
                worldWidth = 3600;
                worldHeight = 2800;
            } else if (currentLevel === 3) {
                worldWidth = 800;
                worldHeight = 2400;
            } else {
                worldWidth = 3200;
                worldHeight = 2400;
            }
            floorLabelEl.innerText = "STAGE " + currentLevel;
            triggerLevelLoadInitialization();
            initEnvironmentMaps();

            if (currentLevel === 4) {
                player.x = worldWidth / 2;
                player.y = worldHeight / 2;
                miniBossSpawned = false;
                bossSpawned = false;
                stage4IntenseTriggered = false;
                stage4LullTriggered = false;
                ursulaBerserk = false;
                currentTheme = 'LEVEL_4';
            } else if (currentLevel === 3) {
                player.x = worldWidth / 2;
                level3CameraY = worldHeight - canvas.height;
                player.y = level3CameraY + canvas.height - 100;
                currentTheme = 'BATTLE_LVL3';
            } else if (currentLevel === 2) {
                player.x = worldWidth / 2;
                player.y = worldHeight / 2;
                currentTheme = 'LEVEL_2';
            } else {
                player.x = worldWidth / 2;
                player.y = worldHeight / 2;
                currentTheme = 'LEVEL_1';
            }

            // Re-snapshot so that if the player saves again this stage, it still reflects the
            // start-of-stage state (loaded state IS the start-of-stage state).
            captureStageStartSnapshot();

            scoreEl.innerText = score;
            lvlEl.innerText = player.level;
            coinEl.innerText = player.coinsCollected;
            diceEl.innerText = player.rerolls;
            timerEl.innerText = `${Math.floor(totalSeconds / 60).toString().padStart(2, '0')}:${(totalSeconds % 60).toString().padStart(2, '0')}`;
            hpFill.style.width = `${(player.hp / player.maxHp) * 100}%`;

            updateLootHUD();
            updateShieldUI();
            startTime = Date.now();
            pausedTimeAcc = 0;
            gameState = 'PLAYING';
            musicStep = 0;
            startSequencer();
        }

        // --- MENU REVAMP: reusable gothic panel with corner brackets + glow ---
        function wrapText(ctx, text, cx, y, maxWidth, lineHeight) {
            let words = text.split(' ');
            let line = '';
            let lines = [];
            for (let n = 0; n < words.length; n++) {
                let test = line + words[n] + ' ';
                if (ctx.measureText(test).width > maxWidth && n > 0) {
                    lines.push(line.trim());
                    line = words[n] + ' ';
                } else {
                    line = test;
                }
            }
            lines.push(line.trim());
            for (let i = 0; i < lines.length; i++) {
                ctx.fillText(lines[i], cx, y + i * lineHeight);
            }
        }

        // Static class portrait for the selection cards (mirrors the in-game class look)
        function drawHeroPortrait(classId, cx, cy, scale) {
            ctx.save();
            ctx.translate(cx, cy);
            ctx.scale(scale, scale);
            ctx.fillStyle = 'rgba(0,0,0,0.3)';
            ctx.beginPath();
            ctx.ellipse(0, 16, 12, 4, 0, 0, Math.PI * 2);
            ctx.fill();

            let armorBase, armorDark, skin;
            if (classId === 'mage') {
                armorBase = '#3949ab';
                armorDark = '#283593';
                skin = '#d9c2a6';
            } else if (classId === 'archer') {
                armorBase = '#2e7d32';
                armorDark = '#1b5e20';
                skin = '#d9c2a6';
            } else {
                armorBase = '#667075';
                armorDark = '#4c565c';
                skin = '#d9c2a6';
            }
            ctx.fillStyle = skin;
            ctx.fillRect(-7, 10, 4, 6);
            ctx.fillRect(3, 10, 4, 6);
            ctx.fillStyle = armorDark;
            ctx.beginPath();
            ctx.arc(-10, -1, 5, 0, Math.PI * 2);
            ctx.arc(10, -1, 5, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = armorBase;
            ctx.fillRect(-9, -4, 18, 15);
            ctx.fillStyle = 'rgba(255,255,255,0.18)';
            ctx.fillRect(-9, -4, 18, 4);
            ctx.fillStyle = armorDark;
            ctx.beginPath();
            ctx.arc(0, -11, 8, 0, Math.PI * 2);
            ctx.fill();

            if (classId === 'mage') {
                ctx.fillStyle = '#283593';
                ctx.beginPath();
                ctx.moveTo(-9, -15);
                ctx.lineTo(9, -15);
                ctx.lineTo(2, -34);
                ctx.closePath();
                ctx.fill();
                ctx.fillStyle = '#3949ab';
                ctx.fillRect(-11, -16, 22, 4);
                ctx.fillStyle = '#ffd24a';
                ctx.font = 'bold 7px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('\u2726', -1, -22);
                // glowing staff
                ctx.strokeStyle = '#6d4c2f';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(13, 14);
                ctx.lineTo(15, -16);
                ctx.stroke();
                ctx.fillStyle = '#3da9fc';
                ctx.shadowColor = '#3da9fc';
                ctx.shadowBlur = 8;
                ctx.beginPath();
                ctx.arc(15, -18, 4, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
            } else if (classId === 'archer') {
                // hood + feather
                ctx.fillStyle = '#1b5e20';
                ctx.beginPath();
                ctx.arc(0, -12, 8, Math.PI, Math.PI * 2);
                ctx.fill();
                ctx.fillRect(-8, -12, 16, 4);
                ctx.strokeStyle = '#a5d6a7';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(7, -15);
                ctx.lineTo(14, -23);
                ctx.stroke();
                // bow
                ctx.strokeStyle = '#6d4c2f';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(-13, 0, 11, -1.0, 1.0);
                ctx.stroke();
                ctx.strokeStyle = '#cfd8dc';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(-13 + Math.cos(-1.0) * 11, Math.sin(-1.0) * 11);
                ctx.lineTo(-13 + Math.cos(1.0) * 11, Math.sin(1.0) * 11);
                ctx.stroke();
            } else {
                // warrior helmet crest + sword
                ctx.fillStyle = armorDark;
                ctx.fillRect(-8, -15, 16, 5);
                ctx.fillStyle = 'rgba(200,220,240,0.25)';
                ctx.fillRect(-6, -16, 6, 3);
                ctx.fillStyle = '#000';
                ctx.fillRect(-5, -13, 10, 3);
                ctx.strokeStyle = '#bdc3c7';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(12, 12);
                ctx.lineTo(18, -14);
                ctx.stroke();
                ctx.fillStyle = '#d4af37';
                ctx.fillRect(10, 8, 8, 3);
            }
            ctx.restore();
        }

        function drawGothicPanel(x, y, w, h, options = {}) {
            const glowColor = options.glowColor || '#f1c40f';
            const borderColor = options.borderColor || '#f1c40f';
            const fillTop = options.fillTop || 'rgba(20, 8, 8, 0.92)';
            const fillBottom = options.fillBottom || 'rgba(5, 2, 2, 0.95)';
            const cornerSize = options.cornerSize || 14;
            const glowAmount = options.glowAmount != null ? options.glowAmount : 10;

            ctx.save();

            // Drop shadow (matches the game's existing hard-offset shadow language)
            ctx.fillStyle = 'rgba(0,0,0,0.6)';
            ctx.fillRect(x + 5, y + 5, w, h);

            // Panel body gradient
            let grad = ctx.createLinearGradient(x, y, x, y + h);
            grad.addColorStop(0, fillTop);
            grad.addColorStop(1, fillBottom);
            ctx.fillStyle = grad;
            ctx.fillRect(x, y, w, h);

            // Glowing border
            ctx.shadowColor = glowColor;
            ctx.shadowBlur = glowAmount;
            ctx.strokeStyle = borderColor;
            ctx.lineWidth = 2;
            ctx.strokeRect(x, y, w, h);
            ctx.shadowBlur = 0;

            // Gold corner brackets (the signature gothic-arcade detail)
            ctx.strokeStyle = glowColor;
            ctx.lineWidth = 3;
            const corners = [
                [x, y, 1, 1],
                [x + w, y, -1, 1],
                [x, y + h, 1, -1],
                [x + w, y + h, -1, -1]
            ];
            for (let [cx, cy, dx, dy] of corners) {
                ctx.beginPath();
                ctx.moveTo(cx, cy + cornerSize * dy);
                ctx.lineTo(cx, cy);
                ctx.lineTo(cx + cornerSize * dx, cy);
                ctx.stroke();
            }

            ctx.restore();
        }

        // --- MENU REVAMP: vibrant gothic title renderer ---
        function drawGothicTitle(text, centerX, centerY, baseSize) {
            const font = titleFontReady ? titleFontName : '"Courier New", monospace';
            const flicker = 0.85 + 0.15 * Math.sin(Date.now() * 0.0025);
            ctx.save();
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.font = `${baseSize}px ${font}`;

            // Outer vibrant glow (animated flicker, like a brazier)
            ctx.shadowColor = '#ff3300';
            ctx.shadowBlur = 28 * flicker;
            ctx.fillStyle = '#ff3300';
            ctx.fillText(text, centerX, centerY);

            // Mid glow layer for richer color depth
            ctx.shadowBlur = 14 * flicker;
            ctx.fillStyle = '#ff6a00';
            ctx.fillText(text, centerX, centerY);

            // Crisp core fill on top
            ctx.shadowBlur = 0;
            let coreGrad = ctx.createLinearGradient(centerX, centerY - baseSize / 2, centerX, centerY + baseSize / 2);
            coreGrad.addColorStop(0, '#ffd24a');
            coreGrad.addColorStop(0.5, '#ff5b1f');
            coreGrad.addColorStop(1, '#c41a1a');
            ctx.fillStyle = coreGrad;
            ctx.fillText(text, centerX, centerY);

            // Thin dark outline for legibility against bright backgrounds
            ctx.strokeStyle = 'rgba(20, 5, 5, 0.6)';
            ctx.lineWidth = 1.5;
            ctx.strokeText(text, centerX, centerY);

            ctx.restore();
        }

        function drawHitboxFloorRing(x, y, radius, color) {
            ctx.save();
            ctx.strokeStyle = color;
            ctx.lineWidth = 1.5;
            ctx.setLineDash([4, 4]);
            ctx.beginPath();
            ctx.arc(x, y, radius, 0, Math.PI * 2);
            ctx.stroke();
            ctx.restore();
        }

        // --- STATIC BACKGROUND CACHE (perf) ---
        // The floor never changes during a stage, so render it ONCE to an offscreen canvas
        // and blit it each frame instead of re-tiling the whole world. Big FPS win on 2 & 4.
        let bgCache = null;
        let bgCacheLevel = -1;
        function invalidateBgCache() { bgCache = null; bgCacheLevel = -1; }

        function buildBgCache() {
            bgCache = document.createElement('canvas');
            bgCache.width = worldWidth;
            bgCache.height = worldHeight;
            let bctx = bgCache.getContext('2d');
            renderStaticFloor(bctx);
            bgCacheLevel = currentLevel;
        }

        function drawLevelBackground() {
            ctx.fillStyle = '#0a120b';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.translate(-camera.x, -camera.y);

            // Stages 2 & 4 have large static floors — use the offscreen cache (blit only the visible region).
            if (currentLevel === 2 || currentLevel === 4) {
                if (!bgCache || bgCacheLevel !== currentLevel) buildBgCache();
                let vx = Math.max(0, camera.x), vy = Math.max(0, camera.y);
                let vw = Math.min(canvas.width, worldWidth - vx);
                let vh = Math.min(canvas.height, worldHeight - vy);
                if (vw > 0 && vh > 0) ctx.drawImage(bgCache, vx, vy, vw, vh, vx, vy, vw, vh);
                if (currentLevel === 4) drawStage4FloorOverlay();
                ctx.restore();
                return;
            }

            drawLevelBackgroundLive();
            ctx.restore();
        }

        // Organic pixelated sand floor (noise-based dappling, NOT a checkerboard). Static -> cached.
        function renderSandFloor(g) {
            g.fillStyle = '#c2a062';
            g.fillRect(0, 0, worldWidth, worldHeight);
            let cell = 10;
            let palette = ['#c8a668', '#bd9a58', '#cdab6e', '#b59052', '#c2a062', '#d0b074'];
            for (let y = 0; y < worldHeight; y += cell) {
                for (let x = 0; x < worldWidth; x += cell) {
                    let h = ((x * 73856093) ^ (y * 19349663)) >>> 0;
                    g.fillStyle = palette[h % palette.length];
                    g.fillRect(x, y, cell, cell);
                }
            }
            for (let i = 0; i < 60; i++) {
                let h = ((i * 2654435761) >>> 0);
                let dx = (h % worldWidth);
                let dy = ((h >> 8) % worldHeight);
                let r = 30 + (h % 60);
                g.fillStyle = (i % 2 === 0) ? 'rgba(208,176,116,0.35)' : 'rgba(165,128,72,0.30)';
                g.beginPath(); g.arc(dx, dy, r, 0, Math.PI * 2); g.fill();
            }
            level2FloorTiles.forEach(patch => {
                let gx = Math.floor(patch.x / 8) * 8;
                let gy = Math.floor(patch.y / 8) * 8;
                if (patch.type === 'sand_light') {
                    g.fillStyle = 'rgba(212,184,120,0.6)';
                    g.beginPath(); g.arc(gx, gy, patch.size * 0.5, 0, Math.PI * 2); g.fill();
                } else if (patch.type === 'sand_dark') {
                    g.fillStyle = 'rgba(168,133,74,0.6)';
                    g.beginPath(); g.arc(gx, gy, patch.size * 0.5, 0, Math.PI * 2); g.fill();
                } else if (patch.type === 'stain') {
                    g.fillStyle = 'rgba(120, 30, 20, 0.35)';
                    g.beginPath(); g.arc(gx, gy, patch.size * 0.55, 0, Math.PI * 2); g.fill();
                    g.fillStyle = 'rgba(90, 20, 15, 0.4)';
                    g.beginPath(); g.arc(gx, gy, patch.size * 0.3, 0, Math.PI * 2); g.fill();
                }
            });
            let cx = worldWidth / 2, cy = worldHeight / 2;
            g.strokeStyle = '#8a6a38'; g.lineWidth = 8;
            g.beginPath(); g.arc(cx, cy, worldWidth * 0.34, 0, Math.PI * 2); g.stroke();
            g.strokeStyle = '#9c7a44'; g.lineWidth = 5;
            g.beginPath(); g.arc(cx, cy, worldWidth * 0.20, 0, Math.PI * 2); g.stroke();
            arenaDecor.forEach(d => {
                if (d.type !== 'pebble') return;
                g.fillStyle = '#8a7240';
                g.beginPath(); g.arc(d.x, d.y, d.size * 0.6, 0, Math.PI * 2); g.fill();
                g.fillStyle = '#9c8350';
                g.beginPath(); g.arc(d.x - 1, d.y - 1, d.size * 0.3, 0, Math.PI * 2); g.fill();
            });
        }

        // Cheap viewport cull: is a world point within (margin) px of the visible camera area?
        function onScreen(wx, wy, margin) {
            margin = margin || 60;
            return wx > camera.x - margin && wx < camera.x + canvas.width + margin &&
                   wy > camera.y - margin && wy < camera.y + canvas.height + margin;
        }

        function drawStage4FloorOverlay() {
            castlePillars.forEach(p => {
                if (!p.banner) return;
                if (!onScreen(p.x, p.y, 80)) return;
                ctx.fillStyle = '#5a3a1a';
                ctx.fillRect(p.x - p.w / 2, p.y, p.w, p.h);
                let wave = Math.sin(globalAnimateClock * 2 + p.seed) * 4;
                ctx.fillStyle = p.banner;
                ctx.beginPath();
                ctx.moveTo(p.x - p.w / 2, p.y - 30);
                ctx.lineTo(p.x + p.w / 2 + 22 + wave, p.y - 22);
                ctx.lineTo(p.x - p.w / 2, p.y - 8);
                ctx.closePath();
                ctx.fill();
            });
            arenaDecor.forEach(d => {
                if (d.type !== 'weed') return;
                if (!onScreen(d.x, d.y, 30)) return;
                let sway = Math.sin(globalAnimateClock * 2 + d.seed) * 1.5;
                ctx.strokeStyle = '#5e7a32';
                ctx.lineWidth = 1.5;
                for (let k = -1; k <= 1; k++) {
                    ctx.beginPath();
                    ctx.moveTo(d.x + k * 2, d.y);
                    ctx.lineTo(d.x + k * 2 + sway, d.y - d.size - 2);
                    ctx.stroke();
                }
            });
            arenaObstacles.forEach(o => {
                if (o.type !== 'puddle') return;
                if (!onScreen(o.x, o.y, o.radius + 20)) return;
                let shimmer = 0.5 + 0.1 * Math.sin(globalAnimateClock * 1.5 + o.seed);
                ctx.fillStyle = `rgba(60, 90, 120, 0.55)`;
                ctx.beginPath(); ctx.ellipse(o.x, o.y, o.radius, o.radius * 0.7, 0, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = `rgba(120, 160, 200, ${shimmer * 0.4})`;
                ctx.beginPath(); ctx.ellipse(o.x - o.radius * 0.2, o.y - o.radius * 0.15, o.radius * 0.5, o.radius * 0.3, 0, 0, Math.PI * 2); ctx.fill();
                ctx.strokeStyle = 'rgba(40, 60, 80, 0.5)'; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.ellipse(o.x, o.y, o.radius, o.radius * 0.7, 0, 0, Math.PI * 2); ctx.stroke();
            });
        }

        // Renders the full static floor for the current level into the given context (world coords).
        function renderStaticFloor(g) {
            if (currentLevel === 2) {
                g.fillStyle = '#222328';
                g.fillRect(0, 0, worldWidth, worldHeight);
                let tileSize = 40;
                for (let y = 0; y < worldHeight; y += tileSize) {
                    for (let x = 0; x < worldWidth; x += tileSize) {
                        g.fillStyle = ((x / tileSize + Math.floor(y / tileSize)) % 2 === 0) ? '#26272d' : '#1d1e23';
                        g.fillRect(x, y, tileSize, tileSize);
                    }
                }
                level2FloorTiles.forEach(p => {
                    g.fillStyle = p.color || 'rgba(60,40,20,0.3)';
                    g.fillRect(p.x, p.y, p.size, p.size);
                });
            } else if (currentLevel === 4) {
                renderSandFloor(g);
            }
        }

        function drawLevelBackgroundLive() {

            if (currentLevel === 3) {
                ctx.fillStyle = '#0a0a0c';
                ctx.fillRect(0, camera.y, worldWidth, canvas.height);
                let startY = camera.y - (camera.y % 100);
                for (let y = startY - 100; y < camera.y + canvas.height + 100; y += 100) {
                    for (let x = 0; x < worldWidth; x += 100) {
                        if ((x / 100 + Math.floor(y / 100)) % 2 === 0) {
                            ctx.fillStyle = '#111216';
                        } else {
                            ctx.fillStyle = '#1a1b20';
                        }
                        ctx.fillRect(x, y, 100, 100);
                        ctx.strokeStyle = '#050505';
                        ctx.lineWidth = 2;
                        ctx.strokeRect(x, y, 100, 100);
                    }
                }
                let carpetX = worldWidth / 2 - 150;
                ctx.fillStyle = '#3a0808';
                ctx.fillRect(carpetX, camera.y, 300, canvas.height);
                ctx.fillStyle = '#b8860b';
                ctx.fillRect(carpetX - 10, camera.y, 10, canvas.height);
                ctx.fillRect(carpetX + 300, camera.y, 10, canvas.height);

                let patStartY = camera.y - (camera.y % 60);
                for (let y = patStartY - 60; y < camera.y + canvas.height + 60; y += 60) {
                    ctx.fillStyle = '#4a0a0a';
                    ctx.beginPath();
                    ctx.moveTo(worldWidth / 2, y + 10);
                    ctx.lineTo(worldWidth / 2 + 120, y + 30);
                    ctx.lineTo(worldWidth / 2, y + 50);
                    ctx.lineTo(worldWidth / 2 - 120, y + 30);
                    ctx.fill();
                    if (y % 180 === 0) {
                        ctx.fillStyle = '#222';
                        ctx.fillRect(carpetX - 40, y + 20, 20, 20);
                        // cheap glow: 2 stacked translucent circles (no per-frame gradient alloc)
                        ctx.fillStyle = 'rgba(243, 156, 18, 0.18)';
                        ctx.beginPath();
                        ctx.arc(carpetX - 30, y + 30, 60, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.fillStyle = 'rgba(243, 156, 18, 0.22)';
                        ctx.beginPath();
                        ctx.arc(carpetX - 30, y + 30, 28, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.fillStyle = '#f39c12';
                        ctx.beginPath();
                        ctx.arc(carpetX - 30, y + 30, 6, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.fillStyle = '#222';
                        ctx.fillRect(carpetX + 320, y + 20, 20, 20);
                        ctx.fillStyle = 'rgba(243, 156, 18, 0.18)';
                        ctx.beginPath();
                        ctx.arc(carpetX + 330, y + 30, 60, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.fillStyle = 'rgba(243, 156, 18, 0.22)';
                        ctx.beginPath();
                        ctx.arc(carpetX + 330, y + 30, 28, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.fillStyle = '#f39c12';
                        ctx.beginPath();
                        ctx.arc(carpetX + 330, y + 30, 6, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            } else if (currentLevel === 2) {
                ctx.fillStyle = '#222328';
                ctx.fillRect(0, 0, worldWidth, worldHeight);
                let tileSize = 40;
                for (let y = 0; y < worldHeight; y += tileSize) {
                    for (let x = 0; x < worldWidth; x += tileSize) {
                        if ((Math.floor(x / tileSize) + Math.floor(y / tileSize)) % 2 === 0) {
                            ctx.fillStyle = '#1c1d22';
                            ctx.fillRect(x, y, tileSize, tileSize);
                        }
                    }
                }
                level2FloorTiles.forEach(patch => {
                    if (patch.type === 'grass') {
                        ctx.fillStyle = '#2d4c1e';
                        ctx.fillRect(Math.floor(patch.x / 10) * 10, Math.floor(patch.y / 10) * 10, patch.size, patch.size);
                        ctx.fillStyle = '#3a6624';
                        ctx.fillRect(Math.floor(patch.x / 10) * 10 + 5, Math.floor(patch.y / 10) * 10 + 5, patch.size - 10, patch.size - 10);
                    } else {
                        ctx.fillStyle = '#111215';
                        ctx.fillRect(Math.floor(patch.x / 10) * 10, Math.floor(patch.y / 10) * 10, patch.size, patch.size);
                        ctx.fillStyle = '#3a3a40';
                        ctx.fillRect(Math.floor(patch.x / 10) * 10 + 2, Math.floor(patch.y / 10) * 10 + 2, 8, 8);
                        ctx.fillRect(Math.floor(patch.x / 10) * 10 + patch.size - 10, Math.floor(patch.y / 10) * 10 + patch.size - 10, 8, 8);
                    }
                });
                for (let i = 0; i < fogPatches.length; i++) {
                    let fp = fogPatches[i];
                    let pulse = 0.04 + 0.02 * Math.sin(globalAnimateClock * 0.4 + fp.seed);
                    let gr = ctx.createRadialGradient(fp.x, fp.y, 0, fp.x, fp.y, fp.r);
                    gr.addColorStop(0, `rgba(80,90,100,${pulse})`);
                    gr.addColorStop(1, 'rgba(0,0,0,0)');
                    ctx.fillStyle = gr;
                    ctx.beginPath();
                    ctx.arc(fp.x, fp.y, fp.r, 0, Math.PI * 2);
                    ctx.fill();
                }
            } else if (currentLevel === 4) {
                // BATTLE ARENA — pixelated sand floor
                let baseTile = 40;
                // base sand fill
                ctx.fillStyle = '#c2a062';
                ctx.fillRect(0, 0, worldWidth, worldHeight);
                // pixel checker for arcade texture
                for (let y = 0; y < worldHeight; y += baseTile) {
                    for (let x = 0; x < worldWidth; x += baseTile) {
                        if ((Math.floor(x / baseTile) + Math.floor(y / baseTile)) % 2 === 0) {
                            ctx.fillStyle = '#b89455';
                            ctx.fillRect(x, y, baseTile, baseTile);
                        }
                    }
                }
                // sand patches / stains
                level2FloorTiles.forEach(patch => {
                    let gx = Math.floor(patch.x / 8) * 8;
                    let gy = Math.floor(patch.y / 8) * 8;
                    if (patch.type === 'sand_light') {
                        ctx.fillStyle = '#d4b878';
                        ctx.fillRect(gx, gy, patch.size, patch.size);
                    } else if (patch.type === 'sand_dark') {
                        ctx.fillStyle = '#a8854a';
                        ctx.fillRect(gx, gy, patch.size, patch.size);
                    } else if (patch.type === 'stain') {
                        ctx.fillStyle = 'rgba(120, 30, 20, 0.35)';
                        ctx.fillRect(gx, gy, patch.size, patch.size);
                        ctx.fillStyle = 'rgba(90, 20, 15, 0.4)';
                        ctx.fillRect(gx + 6, gy + 6, patch.size - 12, patch.size - 12);
                    }
                });
                // large central arena ring (pixelated concentric circles)
                let cx = worldWidth / 2,
                    cy = worldHeight / 2;
                ctx.strokeStyle = '#8a6a38';
                ctx.lineWidth = 8;
                ctx.beginPath();
                ctx.arc(cx, cy, worldWidth * 0.34, 0, Math.PI * 2);
                ctx.stroke();
                ctx.strokeStyle = '#9c7a44';
                ctx.lineWidth = 5;
                ctx.beginPath();
                ctx.arc(cx, cy, worldWidth * 0.20, 0, Math.PI * 2);
                ctx.stroke();
                // banner posts around the rim
                castlePillars.forEach(p => {
                    if (!p.banner) return;
                    ctx.fillStyle = '#5a3a1a';
                    ctx.fillRect(p.x - p.w / 2, p.y, p.w, p.h);
                    let wave = Math.sin(globalAnimateClock * 2 + p.seed) * 4;
                    ctx.fillStyle = p.banner;
                    ctx.beginPath();
                    ctx.moveTo(p.x - p.w / 2, p.y - 30);
                    ctx.lineTo(p.x + p.w / 2 + 22 + wave, p.y - 22);
                    ctx.lineTo(p.x - p.w / 2, p.y - 8);
                    ctx.closePath();
                    ctx.fill();
                });
                // Decorative pebbles + weeds (drawn on the floor, under entities)
                arenaDecor.forEach(d => {
                    if (d.type === 'pebble') {
                        ctx.fillStyle = '#8a7240';
                        ctx.beginPath();
                        ctx.arc(d.x, d.y, d.size * 0.6, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.fillStyle = '#9c8350';
                        ctx.beginPath();
                        ctx.arc(d.x - 1, d.y - 1, d.size * 0.3, 0, Math.PI * 2);
                        ctx.fill();
                    } else {
                        // weed tufts
                        let sway = Math.sin(globalAnimateClock * 2 + d.seed) * 1.5;
                        ctx.strokeStyle = '#5e7a32';
                        ctx.lineWidth = 1.5;
                        for (let k = -1; k <= 1; k++) {
                            ctx.beginPath();
                            ctx.moveTo(d.x + k * 2, d.y);
                            ctx.lineTo(d.x + k * 2 + sway, d.y - d.size - 2);
                            ctx.stroke();
                        }
                    }
                });
                // Puddles (walkable; slow the hero) — drawn as floor features
                arenaObstacles.forEach(o => {
                    if (o.type !== 'puddle') return;
                    let shimmer = 0.5 + 0.1 * Math.sin(globalAnimateClock * 1.5 + o.seed);
                    ctx.fillStyle = `rgba(60, 90, 120, ${0.55})`;
                    ctx.beginPath();
                    ctx.ellipse(o.x, o.y, o.radius, o.radius * 0.7, 0, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = `rgba(120, 160, 200, ${shimmer * 0.4})`;
                    ctx.beginPath();
                    ctx.ellipse(o.x - o.radius * 0.2, o.y - o.radius * 0.15, o.radius * 0.5, o.radius * 0.3, 0, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = 'rgba(40, 60, 80, 0.5)';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.ellipse(o.x, o.y, o.radius, o.radius * 0.7, 0, 0, Math.PI * 2);
                    ctx.stroke();
                });
            } else {
                let grad = ctx.createRadialGradient(worldWidth / 2, worldHeight / 2, 100, worldWidth / 2, worldHeight / 2, worldWidth * 0.75);
                grad.addColorStop(0, '#152218');
                grad.addColorStop(1, '#0d1610');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, worldWidth, worldHeight);
                forestBeds.forEach(bed => {
                    ctx.fillStyle = bed.color;
                    ctx.beginPath();
                    ctx.ellipse(bed.x, bed.y, bed.w, bed.h, 0, 0, Math.PI * 2);
                    ctx.fill();
                });
                for (let i = 0; i < fireflyPoints.length; i++) {
                    let f = fireflyPoints[i];
                    let alpha = 0.3 + 0.3 * Math.sin(globalAnimateClock * 1.2 + f.seed);
                    let gr = ctx.createRadialGradient(f.x, f.y, 0, f.x, f.y, 6);
                    gr.addColorStop(0, `rgba(180,255,150,${alpha})`);
                    gr.addColorStop(1, 'rgba(0,0,0,0)');
                    ctx.fillStyle = gr;
                    ctx.beginPath();
                    ctx.arc(f.x, f.y, 6, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
            ctx.restore();
        }

        function drawProceduralMenuBG(ctx, canvas, time) {
            // 1. Dark Gothic Sky Gradient (Deep Crimson to Black)
            let skyGradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            skyGradient.addColorStop(0, '#1a0505'); // Dark blood red
            skyGradient.addColorStop(0.6, '#0a0a12'); // Dark midnight blue
            skyGradient.addColorStop(1, '#050a06'); // Game floor color
            ctx.fillStyle = skyGradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 2. The Blood Moon
            ctx.fillStyle = '#8a0303';
            ctx.shadowColor = '#ff0000';
            ctx.shadowBlur = 30;
            ctx.beginPath();
            ctx.arc(canvas.width * 0.7, canvas.height * 0.35, 90, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0; // Reset shadow so it doesn't affect the rest

            // 3. Distant Castle Silhouettes (Jagged procedural drawing)
            ctx.fillStyle = '#020204'; // Almost pitch black
            ctx.beginPath();
            ctx.moveTo(0, canvas.height);

            // Hardcoded blocky points for a 32-bit pixelated castle skyline
            const skyline = [
                [0, 150],
                [40, 150],
                [40, 220],
                [60, 220],
                [60, 100],
                [100, 100],
                [100, 180],
                [150, 180],
                [150, 80],
                [170, 80],
                [170, 200],
                [250, 200],
                [250, 50],
                [280, 50],
                [280, 160],
                [350, 160],
                [350, 120],
                [400, 120],
                [400, 250],
                [500, 250],
                [500, 90],
                [540, 90],
                [540, 210],
                [650, 210],
                [650, 140],
                [700, 140],
                [700, 260],
                [800, 260]
            ];

            for (let point of skyline) {
                // Draw the points relative to the bottom of the screen
                ctx.lineTo(point[0], canvas.height - point[1]);
            }
            ctx.lineTo(canvas.width, canvas.height);
            ctx.closePath();
            ctx.fill();

            // 4. Moving Fog / Mist (Overlapping sine waves)
            ctx.fillStyle = 'rgba(40, 45, 55, 0.15)';
            for (let i = 0; i < 3; i++) {
                ctx.beginPath();
                ctx.moveTo(0, canvas.height);
                for (let x = 0; x <= canvas.width; x += 20) {
                    // Calculate a slow wavy offset based on time and x-position
                    let yOffset = Math.sin((time * 0.001) + (x * 0.01) + i) * 30;
                    // Layer the fog at different heights
                    let fogHeight = canvas.height - 100 - (i * 40) + yOffset;
                    ctx.lineTo(x, fogHeight);
                }
                ctx.lineTo(canvas.width, canvas.height);
                ctx.closePath();
                ctx.fill();
            }

            // 5. Drifting Embers (deterministic per-index pseudo-random drift, menu-only atmosphere)
            ctx.save();
            const emberCount = 26;
            for (let i = 0; i < emberCount; i++) {
                // Deterministic seed per ember so motion is smooth and doesn't jitter frame-to-frame
                let seedX = (i * 73.17) % canvas.width;
                let seedSpeed = 14 + (i % 5) * 6;
                let seedPhase = i * 0.7;
                let loopTime = (time * 0.001 * seedSpeed) % (canvas.height + 60);
                let ex = seedX + Math.sin(time * 0.0006 + seedPhase) * 18;
                let ey = canvas.height - loopTime;
                let flicker = 0.4 + 0.6 * Math.abs(Math.sin(time * 0.004 + seedPhase));
                let size = 1 + (i % 3) * 0.8;
                let grad = ctx.createRadialGradient(ex, ey, 0, ex, ey, size * 3);
                grad.addColorStop(0, `rgba(255, ${120 + (i % 3) * 30}, 40, ${flicker})`);
                grad.addColorStop(1, 'rgba(255, 80, 20, 0)');
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.arc(ex, ey, size * 3, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.restore();
        }

        function drawCoinAsset(c) {
            let bob = Math.sin((Date.now() * 0.007) + c.pulseSeed) * 2.5;
            let spin = Math.abs(Math.cos((Date.now() * 0.005) + c.pulseSeed));
            ctx.save();
            // Blink during the final ~1.3s before the pickup expires
            if (c.spawnTime) {
                let age = Date.now() - c.spawnTime;
                if (age > 3700) {
                    if (Math.floor(Date.now() / 120) % 2 === 0) {
                        ctx.restore();
                        return;
                    }
                }
            }
            ctx.translate(c.x - camera.x, c.y - camera.y + bob);
            if (c.isDice) {
                ctx.shadowColor = '#fff';
                ctx.shadowBlur = 8;
                ctx.fillStyle = '#ecf0f1';
                ctx.fillRect(-6, -6, 12, 12);
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#2c3e50';
                ctx.beginPath();
                ctx.arc(-2, -2, 1.2, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(2, 2, 1.2, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(-2, 2, 1.2, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(2, -2, 1.2, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
                return;
            }
            let glowCol = c.isDemon ? 'rgba(155,89,182,0.45)' : c.isSilver ? 'rgba(236,240,241,0.3)' : 'rgba(241,196,15,0.3)';
            let gr = ctx.createRadialGradient(0, 0, 0, 0, 0, c.radius * 2.5);
            gr.addColorStop(0, glowCol);
            gr.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = gr;
            ctx.beginPath();
            ctx.arc(0, 0, c.radius * 2.5, 0, Math.PI * 2);
            ctx.fill();
            ctx.scale(spin * 0.6 + 0.4, 1);
            if (c.isDemon) {
                // black coin with purple sheen + demonic sigil
                ctx.fillStyle = '#2a0a3a';
                ctx.beginPath();
                ctx.arc(0, 0, c.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#0a0a0a';
                ctx.beginPath();
                ctx.arc(0, 0, c.radius - 1.5, 0, Math.PI * 2);
                ctx.fill();
                // glowing purple sigil
                ctx.strokeStyle = '#b14dff';
                ctx.lineWidth = 1.4;
                ctx.shadowColor = '#b14dff';
                ctx.shadowBlur = 6;
                ctx.beginPath();
                ctx.moveTo(0, -c.radius * 0.55);
                ctx.lineTo(c.radius * 0.5, c.radius * 0.4);
                ctx.lineTo(-c.radius * 0.5, c.radius * 0.4);
                ctx.closePath();
                ctx.stroke();
                ctx.shadowBlur = 0;
                ctx.fillStyle = 'rgba(177,77,255,0.7)';
                ctx.beginPath();
                ctx.arc(-1.5, -1.5, c.radius * 0.25, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
                return;
            }
            ctx.fillStyle = c.isSilver ? '#7f8c8d' : '#b58900';
            ctx.beginPath();
            ctx.arc(0, 0, c.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = c.isSilver ? '#ecf0f1' : '#f1c40f';

            ctx.arc(0, 0, c.radius - 1.5, 0, Math.PI * 2);

            ctx.beginPath();
            ctx.arc(-1.5, -1.5, c.radius * 0.35, 0, Math.PI * 2);

            ctx.restore();
        }

        // --- DYNAMIC HERO RENDERING SYSTEM ---
        function drawBallAndChain(px, py) {
            if (player.ballChainLevel <= 0) return;
            let orbitR = (player.hasChainChakra ? 95 : player.hasSpikeChain ? 80 : 64) + player.ballChainLevel * 2;
            let hx = px - camera.x,
                hy = py - camera.y;
            let bx = hx + Math.cos(ballChainAngle) * orbitR;
            let by = hy + Math.sin(ballChainAngle) * orbitR;
            ctx.save();

            if (player.hasChainChakra) {
                // TIER 3: thin ethereal translucent chain + big animated blue energy ball
                ctx.strokeStyle = 'rgba(41, 182, 246, 0.5)';
                ctx.lineWidth = 2;
                ctx.setLineDash([3, 5]);
                ctx.beginPath();
                ctx.moveTo(hx, hy);
                ctx.lineTo(bx, by);
                ctx.stroke();
                ctx.setLineDash([]);
                // energy ball: pulsing glow
                let pulse = 0.7 + 0.3 * Math.sin(globalAnimateClock * 6);
                let R = 22 * pulse;
                let gr = ctx.createRadialGradient(bx, by, 0, bx, by, R * 1.8);
                gr.addColorStop(0, 'rgba(180, 230, 255, 0.95)');
                gr.addColorStop(0.5, 'rgba(41, 182, 246, 0.6)');
                gr.addColorStop(1, 'rgba(20, 100, 200, 0)');
                ctx.fillStyle = gr;
                ctx.beginPath();
                ctx.arc(bx, by, R * 1.8, 0, Math.PI * 2);
                ctx.fill();
                // crackling core
                ctx.strokeStyle = 'rgba(220, 245, 255, 0.8)';
                ctx.lineWidth = 1.5;
                for (let a = 0; a < 3; a++) {
                    let ang = globalAnimateClock * 3 + a * 2.1;
                    ctx.beginPath();
                    ctx.moveTo(bx, by);
                    ctx.lineTo(bx + Math.cos(ang) * R, by + Math.sin(ang) * R);
                    ctx.stroke();
                }
            } else {
                // TIER 1 (ball+chain) / TIER 2 (spike+chain): metal links + iron ball
                let links = player.hasSpikeChain ? 7 : 6;
                ctx.strokeStyle = '#6b6b6b';
                ctx.lineWidth = player.hasSpikeChain ? 3.5 : 2.5;
                for (let l = 1; l <= links; l++) {
                    let t = l / (links + 1);
                    let lx = hx + (bx - hx) * t;
                    let ly = hy + (by - hy) * t;
                    ctx.beginPath();
                    ctx.arc(lx, ly, player.hasSpikeChain ? 2.6 : 2, 0, Math.PI * 2);
                    ctx.stroke();
                }
                let R = player.hasSpikeChain ? 18 : 12;
                // iron ball
                ctx.fillStyle = '#4a4a4a';
                ctx.beginPath();
                ctx.arc(bx, by, R, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#5e5e5e';
                ctx.beginPath();
                ctx.arc(bx - R * 0.3, by - R * 0.3, R * 0.4, 0, Math.PI * 2);
                ctx.fill();
                // spikes on tier 2
                if (player.hasSpikeChain) {
                    ctx.fillStyle = '#7f8c8d';
                    for (let s = 0; s < 8; s++) {
                        let a = (s / 8) * Math.PI * 2;
                        ctx.beginPath();
                        ctx.moveTo(bx + Math.cos(a) * R, by + Math.sin(a) * R);
                        ctx.lineTo(bx + Math.cos(a) * (R + 7), by + Math.sin(a) * (R + 7));
                        ctx.lineTo(bx + Math.cos(a + 0.25) * R, by + Math.sin(a + 0.25) * R);
                        ctx.closePath();
                        ctx.fill();
                    }
                }
            }
            ctx.restore();
        }

        function drawKnightCharacter(x, y, radius, isMoving) {
            let screenX = x - camera.x;
            let screenY = y - camera.y;

            // BASE HITBOX/SHADOWS
            ctx.save();
            ctx.globalAlpha = 0.4;

            ctx.restore();
            drawHitboxFloorRing(screenX, screenY, radius, 'rgba(255, 255, 255, 0.18)');

            if (player.hasUndyingHeart || player.hasImmortalForm) {
                ctx.save();
                let pulse = 0.5 + 0.3 * Math.sin(globalAnimateClock * 4);
                let gr = ctx.createRadialGradient(screenX, screenY, 0, screenX, screenY, radius * 2);

                gr.addColorStop(1, 'rgba(0,0,0,0)');

                ctx.beginPath();
                ctx.arc(screenX, screenY, radius * 2, 0, Math.PI * 2);

            if (player.stunnedTimer > Date.now()) {
                ctx.fillStyle = 'rgba(155, 89, 182, 0.5)';

                ctx.fill();
                ctx.fillStyle = '#f1c40f';
                ctx.fillText('⭐', screenX - 5, screenY - 20);
            }

            // --- ACTIVE STATUS EFFECT AURAS ---
            (function drawPlayerStatusAuras() {
                const sNow = Date.now();
                let auras = [];
                if (player.slowTimer > sNow) auras.push('rgba(93, 173, 226, 0.45)'); // SLOW blue
                if (player.poisonTimer > sNow) auras.push('rgba(57, 255, 20, 0.45)'); // POISON green
                if (player.burnTimer > sNow) auras.push('rgba(230, 126, 34, 0.5)'); // BURN orange
                if (player.bleedTimer > sNow) auras.push('rgba(192, 57, 43, 0.5)'); // BLEED red
                for (let a = 0; a < auras.length; a++) {
                    let pulse = 0.6 + 0.4 * Math.sin(globalAnimateClock * 6 + a * 1.5);
                    ctx.save();
                    ctx.strokeStyle = auras[a];
                    ctx.globalAlpha = pulse;
                    ctx.lineWidth = 2.5;
                    ctx.beginPath();
                    ctx.arc(screenX, screenY, radius + 4 + a * 3, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.restore();
                }
                // Rising particles cue for burn/bleed/poison
                if (auras.length > 0 && Math.random() < 0.3) {
                    let col = player.burnTimer > sNow ? '#e67e22' : player.bleedTimer > sNow ? '#c0392b' : player.poisonTimer > sNow ? '#39ff14' : '#5dade2';
                    spawnParticles(player.x, player.y - radius * 0.3, 1, col, 1.2, 12, 2);

        function drawWhirlwindShield(px, py, radiusLevel) {
            // NERF/REVAMP: fewer, slower-orbiting little green tornadoes that scale up slowly
            let orbitCount = 2 + Math.floor(radiusLevel / 2); // slower count growth (was 2 + lvl)
            let radiusDist = 50 + (radiusLevel * 6); // matches aura hitbox
            let orbitSpeed = 1.1; // NERF: slower spin (was 1.8)
            let tornadoScale = 1 + Math.min(0.8, radiusLevel * 0.08); // grows slowly with level
            for (let i = 0; i < orbitCount; i++) {
                let finalAngle = globalAnimateClock * orbitSpeed + (i * (Math.PI * 2 / orbitCount));
                let sx = (px - camera.x) + Math.cos(finalAngle) * radiusDist;
                let sy = (py - camera.y) + Math.sin(finalAngle) * radiusDist;
                drawMiniTornado(sx, sy, tornadoScale, i);
            }
        }

        // A small swirling green tornado funnel with a slight per-frame animation
        function drawMiniTornado(sx, sy, scale, seed) {
            ctx.save();
            ctx.translate(sx, sy);
            // gentle sway / wobble so each tornado feels alive
            let sway = Math.sin(globalAnimateClock * 4 + seed * 1.7) * 0.18;
            ctx.rotate(sway);
            ctx.scale(scale, scale);

            // soft glow base
            let gr = ctx.createRadialGradient(0, 0, 0, 0, 0, 13);
            gr.addColorStop(0, 'rgba(46,204,113,0.45)');
            gr.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = gr;
            ctx.beginPath();
            ctx.arc(0, -2, 13, 0, Math.PI * 2);
            ctx.fill();

            // Funnel: stacked ellipses, widest at top tapering to a point, with animated swirl offset
            let spin = globalAnimateClock * 6 + seed;
            const bands = 5;
            for (let b = 0; b < bands; b++) {
                let t = b / (bands - 1); // 0 top -> 1 bottom
                let w = 11 * (1 - t) + 1.5; // taper width
                let yy = -9 + t * 16; // top to bottom
                let xoff = Math.sin(spin + b * 0.9) * (2.6 * (1 - t)); // swirl wobble per band
                let alpha = 0.85 - t * 0.35;
                ctx.fillStyle = `rgba(${b % 2 === 0 ? '46,204,113' : '88,224,150'}, ${alpha})`;
                ctx.beginPath();
                ctx.ellipse(xoff, yy, w, 2.6, 0, 0, Math.PI * 2);
                ctx.fill();
            }

            // bright debris fleck swirling at the mouth
            let fa = spin * 1.4;
            ctx.fillStyle = '#d8ffe8';
            ctx.beginPath();
            ctx.arc(Math.cos(fa) * 6, -7 + Math.sin(fa) * 1.5, 1.6, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();
        }

        function drawFirebolt(f) {
            let sx = f.x - camera.x,
                sy = f.y - camera.y;
            ctx.save();
            let gr = ctx.createRadialGradient(sx, sy, 0, sx, sy, f.radius * 3);
            gr.addColorStop(0, 'rgba(255,160,30,0.7)');
            gr.addColorStop(0.5, 'rgba(231,76,60,0.3)');
            gr.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = gr;
            ctx.beginPath();
            ctx.arc(sx, sy, f.radius * 3, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#fff5e0';
            ctx.beginPath();
            ctx.arc(sx, sy, f.radius * 0.5, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#f39c12';
            ctx.beginPath();
            ctx.arc(sx, sy, f.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }

        function drawIceBolt(ib) {
            let sx = ib.x - camera.x,
                sy = ib.y - camera.y;
            let ang = (ib.angle !== undefined) ? ib.angle : Math.atan2(ib.vy, ib.vx);
            let len = ib.radius * 2.6;
            let wid = ib.radius * 0.9;
            ctx.save();

            // soft frosty glow
            let gr = ctx.createRadialGradient(sx, sy, 0, sx, sy, ib.radius * 2.4);
            gr.addColorStop(0, 'rgba(174,243,255,0.5)');
            gr.addColorStop(1, 'rgba(133,193,233,0)');
            ctx.fillStyle = gr;
            ctx.beginPath();
            ctx.arc(sx, sy, ib.radius * 2.4, 0, Math.PI * 2);
            ctx.fill();

            ctx.translate(sx, sy);
            ctx.rotate(ang);

            // crystalline ice-pick: a sharp diamond/spike pointing along travel
            ctx.fillStyle = '#d6f3ff';
            ctx.shadowColor = '#7fdfff';
            ctx.shadowBlur = 8;
            ctx.beginPath();
            ctx.moveTo(len, 0); // sharp tip
            ctx.lineTo(0, -wid);
            ctx.lineTo(-len * 0.5, 0); // tail
            ctx.lineTo(0, wid);
            ctx.closePath();
            ctx.fill();

            // bright inner facet for a glassy look
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.moveTo(len * 0.75, 0);
            ctx.lineTo(0, -wid * 0.45);
            ctx.lineTo(-len * 0.3, 0);
            ctx.lineTo(0, wid * 0.45);
            ctx.closePath();
            ctx.fill();

            // edge highlight
            ctx.strokeStyle = '#5dade2';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(len, 0);
            ctx.lineTo(0, -wid);
            ctx.lineTo(-len * 0.5, 0);
            ctx.lineTo(0, wid);
            ctx.closePath();
            ctx.stroke();

            ctx.restore();
        }

        function drawJavelinAsset(jv) {
            let sx = jv.x - camera.x,
                sy = jv.y - camera.y;
            ctx.save();
            ctx.translate(sx, sy);

            ctx.shadowColor = '#1abc9c';

                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(-16 - t * 5, 0);
                ctx.lineTo(12, 0);
                ctx.stroke();
                ctx.restore();

            ctx.strokeStyle = '#1abc9c';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(-16, 0);
            ctx.lineTo(12, 0);
            ctx.stroke();
            ctx.fillStyle = '#e0f8f3';
            ctx.beginPath();
            ctx.moveTo(12, -4);
            ctx.lineTo(22, 0);
            ctx.lineTo(12, 4);
            ctx.closePath();

        function drawProjectileProjectile(ep) {
            let sx = ep.x - camera.x,
                sy = ep.y - camera.y;
            ctx.save();
            ctx.translate(sx, sy);
            if (ep.type === 'bone') {
                ctx.rotate(globalAnimateClock * 2.5);
                let boneCol = ep.isReflected ? '#00e5ff' : '#e6e7df';
                if (ep.isReflected) {
                    ctx.shadowColor = '#00bcd4';
                    ctx.shadowBlur = 14;

                ctx.fillStyle = boneCol;
                ctx.fillRect(-12, -3, 24, 6);
                ctx.beginPath();
                ctx.arc(-12, -3, 4, 0, Math.PI * 2);
                ctx.arc(-12, 3, 4, 0, Math.PI * 2);
                ctx.arc(12, -3, 4, 0, Math.PI * 2);
                ctx.arc(12, 3, 4, 0, Math.PI * 2);

                let kCol = ep.isReflected ? '#00e5ff' : '#d8d9d0';
                let gr = ctx.createRadialGradient(0, 0, 0, 0, 0, ep.radius * 2.5);
                gr.addColorStop(0, ep.isReflected ? 'rgba(0,230,255,0.5)' : 'rgba(160,80,255,0.35)');
                gr.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.fillStyle = gr;
                ctx.beginPath();
                ctx.arc(0, 0, ep.radius * 2.5, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = kCol;
                ctx.fillRect(-ep.radius, -ep.radius * 0.35, ep.radius * 2, ep.radius * 0.7);
                ctx.beginPath();
                ctx.arc(-ep.radius, -ep.radius * 0.35, ep.radius * 0.5, 0, Math.PI * 2);
                ctx.arc(-ep.radius, ep.radius * 0.35, ep.radius * 0.5, 0, Math.PI * 2);
                ctx.arc(ep.radius, -ep.radius * 0.35, ep.radius * 0.5, 0, Math.PI * 2);
                ctx.arc(ep.radius, ep.radius * 0.35, ep.radius * 0.5, 0, Math.PI * 2);
                ctx.fill();
            } else if (ep.type === 'naga_blade') {
                ctx.rotate(globalAnimateClock * 4.5);
                ctx.fillStyle = '#8e44ad';
                ctx.fillRect(-10, -3, 20, 6);
                ctx.fillStyle = '#9b59b6';
                ctx.beginPath();
                ctx.moveTo(10, -4);
                ctx.lineTo(16, 0);
                ctx.lineTo(10, 4);
                ctx.moveTo(-10, -4);
                ctx.lineTo(-16, 0);
                ctx.lineTo(-10, 4);
                ctx.fill();
            } else if (ep.type === 'stun_spit') {
                ctx.fillStyle = '#9b59b6';
                ctx.beginPath();
                ctx.arc(0, 0, ep.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#8e44ad';
                ctx.beginPath();
                ctx.arc(-2, -2, ep.radius / 2, 0, Math.PI * 2);
                ctx.fill();
            } else if (ep.type === 'slime_ball') {
                ctx.rotate(globalAnimateClock * 2);
                ctx.fillStyle = 'rgba(46, 204, 113, 0.8)';
                ctx.beginPath();
                ctx.arc(0, 0, ep.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#8e44ad';
                ctx.beginPath();
                ctx.arc(-2, -2, ep.radius / 2, 0, Math.PI * 2);
                ctx.fill();
            } else if (ep.type === 'arrow') {
                let aang = (ep.angle !== undefined) ? ep.angle : Math.atan2(ep.vy, ep.vx);
                ctx.rotate(aang);
                let reflected = ep.isReflected;
                // danger glow halo so the arrow reads clearly against any floor
                ctx.fillStyle = reflected ? 'rgba(0,229,255,0.35)' : 'rgba(255,120,40,0.35)';
                ctx.beginPath();
                ctx.ellipse(0, 0, 18, 7, 0, 0, Math.PI * 2);
                ctx.fill();
                // thick shaft with ink outline
                ctx.lineCap = 'round';
                ctx.strokeStyle = '#2a1a0c';
                ctx.lineWidth = 5;
                ctx.beginPath(); ctx.moveTo(-13, 0); ctx.lineTo(9, 0); ctx.stroke();
                ctx.strokeStyle = reflected ? '#7fefff' : '#caa15a';
                ctx.lineWidth = 3;
                ctx.beginPath(); ctx.moveTo(-13, 0); ctx.lineTo(9, 0); ctx.stroke();
                // bright arrowhead (bigger)
                ctx.fillStyle = reflected ? '#00e5ff' : '#ffe14d';
                ctx.strokeStyle = '#2a1a0c'; ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.moveTo(18, 0); ctx.lineTo(7, -6); ctx.lineTo(7, 6); ctx.closePath();
                ctx.fill(); ctx.stroke();
                // fletching
                ctx.fillStyle = '#e74c3c';
                ctx.beginPath();

            } else if (ep.type === 'shield_throw') {

                ctx.beginPath();
                ctx.arc(0, 0, ep.radius, 0, Math.PI * 2);

                ctx.beginPath();
                ctx.arc(0, 0, ep.radius * 0.7, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#f1c40f';
                ctx.beginPath();
                ctx.arc(0, 0, ep.radius * 0.3, 0, Math.PI * 2);
                ctx.fill();
                // rim
                ctx.strokeStyle = '#5d6d7e';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(0, 0, ep.radius, 0, Math.PI * 2);
                ctx.stroke();
            } else if (ep.type === 'flame_axe') {
                ep.spin = (ep.spin || 0) + 0.4;

                // fiery glow
                let fgr = ctx.createRadialGradient(0, 0, 0, 0, 0, ep.radius * 2.4);
                fgr.addColorStop(0, 'rgba(255,140,20,0.7)');
                fgr.addColorStop(0.5, 'rgba(231,76,60,0.35)');
                fgr.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.fillStyle = fgr;
                ctx.beginPath();
                ctx.arc(0, 0, ep.radius * 2.4, 0, Math.PI * 2);
                ctx.fill();
                // handle
                ctx.strokeStyle = '#5a3a1a';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(0, ep.radius);
                ctx.lineTo(0, -ep.radius);
                ctx.stroke();
                // axe head (double-bladed)
                ctx.fillStyle = '#4a4a4a';
                ctx.beginPath();
                ctx.moveTo(0, -ep.radius * 0.6);
                ctx.lineTo(ep.radius * 0.9, -ep.radius * 0.2);
                ctx.lineTo(ep.radius * 0.9, ep.radius * 0.2);
                ctx.lineTo(0, ep.radius * 0.6);
                ctx.closePath();
                ctx.fill();
                ctx.beginPath();
                ctx.moveTo(0, -ep.radius * 0.6);
                ctx.lineTo(-ep.radius * 0.9, -ep.radius * 0.2);
                ctx.lineTo(-ep.radius * 0.9, ep.radius * 0.2);
                ctx.lineTo(0, ep.radius * 0.6);
                ctx.closePath();
                ctx.fill();
                // burning edge
                ctx.fillStyle = '#f39c12';
                let flick = 0.5 + 0.5 * Math.sin(globalAnimateClock * 10);
                ctx.globalAlpha = 0.6 + 0.4 * flick;
                ctx.beginPath();
                ctx.arc(ep.radius * 0.85, 0, 2.5, 0, Math.PI * 2);
                ctx.arc(-ep.radius * 0.85, 0, 2.5, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            } else {
                let bombCol = ep.isReflected ? '#00e5ff' : '#37475a';
                let gr = ctx.createRadialGradient(0, 0, 0, 0, 0, ep.radius * 2.5);
                gr.addColorStop(0, ep.isReflected ? 'rgba(0,230,255,0.5)' : 'rgba(80,100,120,0.4)');
                gr.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.fillStyle = gr;
                ctx.beginPath();
                ctx.arc(0, 0, ep.radius * 2.5, 0, Math.PI * 2);
                ctx.fill();
                // cel-shaded ink-outlined orb
                snkCircle(0, 0, ep.radius, bombCol, 2);
            }
            ctx.restore();
        }

        function drawArenaObstacles() {
            arenaObstacles.forEach(o => {
                if (o.type === 'puddle') return; // puddles drawn on the floor layer
                let sx = o.x - camera.x,
                    sy = o.y - camera.y;
                if (sx < -80 || sx > canvas.width + 80 || sy < -80 || sy > canvas.height + 80) return;
                ctx.save();
                ctx.translate(sx, sy);
                // ground shadow
                ctx.fillStyle = 'rgba(0,0,0,0.25)';
                ctx.beginPath();
                ctx.ellipse(0, o.radius * 0.5, o.radius * 0.9, o.radius * 0.35, 0, 0, Math.PI * 2);
                ctx.fill();
                if (o.type === 'rock') {
                    // cel-shaded faceted boulder with ink outline
                    snkPoly([
                        [-o.radius, o.radius*0.4],[-o.radius*0.7,-o.radius*0.6],
                        [0,-o.radius],[o.radius*0.7,-o.radius*0.5],[o.radius,o.radius*0.4]
                    ], '#808b90', 2.5);
                    // lit facet
                    snkPoly([[-o.radius*0.5,-o.radius*0.2],[0,-o.radius],[o.radius*0.4,-o.radius*0.3]], '#a4adb1', 1.5);
                    // dark crack
                    ctx.strokeStyle = '#3a4248'; ctx.lineWidth = 1.5;
                    ctx.beginPath(); ctx.moveTo(-o.radius*0.2, -o.radius*0.4); ctx.lineTo(o.radius*0.1, o.radius*0.2); ctx.stroke();
                } else if (o.type === 'log') {
                    ctx.rotate(o.rot);
                    snkRect(-o.radius, -o.radius * 0.45, o.radius * 2, o.radius * 0.9, '#7a5430', 2.5, 4);
                    // bark lines
                    ctx.strokeStyle = '#4a3018'; ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(-o.radius, -o.radius * 0.15); ctx.lineTo(o.radius, -o.radius * 0.15);
                    ctx.moveTo(-o.radius, o.radius * 0.15); ctx.lineTo(o.radius, o.radius * 0.15);
                    ctx.stroke();
                    // end ring
                    snkCircle(o.radius, 0, o.radius * 0.28, '#caa472', 2);
                    ctx.strokeStyle = '#8a6a3a'; ctx.lineWidth = 1.5;
                    ctx.beginPath(); ctx.ellipse(o.radius, 0, o.radius * 0.12, o.radius * 0.12, 0, 0, Math.PI * 2); ctx.stroke();
                }
                ctx.restore();
            });
        }

        function drawBarrels() {
            barrels.forEach(b => {
                let sx = b.x - camera.x,
                    sy = b.y - camera.y;
                if (sx < -80 || sx > canvas.width + 80 || sy < -80 || sy > canvas.height + 80) return;
                ctx.save();
                ctx.translate(sx, sy);
                if (b.exploding) {
                    // Blast sprite: expanding fiery burst
                    let t = Math.min(1, (Date.now() - b.boomTimer) / 180);
                    let r = 30 + t * 110;
                    let gr = ctx.createRadialGradient(0, 0, 0, 0, 0, r);
                    gr.addColorStop(0, `rgba(255,240,180,${1 - t})`);
                    gr.addColorStop(0.4, `rgba(255,140,20,${0.9 - t * 0.9})`);
                    gr.addColorStop(0.8, `rgba(200,40,10,${0.5 - t * 0.5})`);
                    gr.addColorStop(1, 'rgba(0,0,0,0)');
                    ctx.fillStyle = gr;
                    ctx.beginPath();
                    ctx.arc(0, 0, r, 0, Math.PI * 2);
                    ctx.fill();
                    // jagged shockwave ring
                    ctx.strokeStyle = `rgba(255,200,80,${0.8 - t * 0.8})`;
                    ctx.lineWidth = 4;
                    ctx.beginPath();
                    for (let a = 0; a < Math.PI * 2; a += Math.PI / 8) {
                        let rr = r * (0.7 + 0.15 * (a % 2 === 0 ? 1 : -1));
                        let px = Math.cos(a) * rr,
                            py = Math.sin(a) * rr;
                        if (a === 0) ctx.moveTo(px, py);
                        else ctx.lineTo(px, py);
                    }
                    ctx.closePath();
                    ctx.stroke();
                    ctx.restore();
                    return;
                }
                // ground shadow
                ctx.fillStyle = 'rgba(0,0,0,0.25)';
                ctx.beginPath();
                ctx.ellipse(0, b.radius * 0.7, b.radius * 0.8, b.radius * 0.3, 0, 0, Math.PI * 2);
                ctx.fill();
                // SNK cel-shaded red barrel
                snkRect(-b.radius * 0.72, -b.radius, b.radius * 1.44, b.radius * 2, '#c0392b', 2, 3);
                // top rim
                ctx.fillStyle = snkShade('#c0392b', 0.25);
                ctx.beginPath();
                ctx.ellipse(0, -b.radius, b.radius * 0.7, b.radius * 0.25, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#16121f'; ctx.lineWidth = 1.5; ctx.stroke();
                // metal bands
                ctx.fillStyle = '#9aa3a8';
                ctx.fillRect(-b.radius * 0.72, -b.radius * 0.5, b.radius * 1.44, 3);
                ctx.fillRect(-b.radius * 0.72, b.radius * 0.4, b.radius * 1.44, 3);
                // hazard mark
                ctx.fillStyle = '#f1c40f';
                ctx.font = 'bold 15px "Courier New"';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('!', 0, 0);
                ctx.textBaseline = 'alphabetic';
                ctx.restore();
            });
        }

        function drawFrogMerchantSprite(x, y) {

            ctx.fillStyle = '#2e7d32';
            ctx.beginPath();
            ctx.ellipse(0, 40, 45, 35, 0, 0, Math.PI * 2);

            ctx.arc(-15, -12, 4, 0, Math.PI * 2);

            ctx.fillStyle = '#fff';

            ctx.moveTo(400, 90);
            ctx.lineTo(380, 110);
            ctx.lineTo(420, 90);
            ctx.fill();
            ctx.fillStyle = '#000';
            ctx.font = 'bold 16px "Courier New"';

            ctx.fillText(frogSpeechBubble, 400, 70);

            ctx.font = 'bold 20px "Courier New"';
            shopButtons.forEach(btn => {
                let text = "";
                if (btn.id === 'longsword') text = shopInventory.longswordPurchased ? "SOLD OUT" : "LONGSWORD (10C)";
                if (btn.id === 'armor') text = shopInventory.redArmorPurchased ? "SOLD OUT" : "RED ARMOR (30C)";
                if (btn.id === 'holy_blade') text = shopInventory.holyBladePurchased ? "SOLD OUT" : "HOLY BLADE (25C)";
                if (btn.id === 'black_armor') text = shopInventory.blackArmorPurchased ? "SOLD OUT" : "BLACK ARMOR (100C)";
                if (btn.id === 'leaf') text = shopInventory.leafPurchased ? "SOLD OUT" : "SWIFT LEAF (20C)";
                if (btn.id === 'locked' || btn.id === 'locked_2') text = "LOCKED";
                if (btn.id === 'leave' || btn.id === 'leave_2' || btn.id === 'leave_3') text = "LEAVE SHOP";
                if (btn.id === 'boomerang') text = shopInventory.boomerangPurchased ? "SOLD OUT" : "BOOMERANG (20C)";
                if (btn.id === 'dragon_soul') text = shopInventory.dragonSoulPurchased ? "SOLD OUT" : "DRAGON SOUL (100C)";

        // Minimal item icon shown above each shop slot.
        function drawShopItemSprite(id, cx, cy) {
            ctx.save();
            ctx.translate(cx, cy);
            // backing plate
            ctx.fillStyle = 'rgba(0,0,0,0.4)';
            ctx.strokeStyle = '#5a4a2a';
            ctx.lineWidth = 1.5;
            ctx.beginPath(); ctx.arc(0, 0, 18, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
            ctx.lineJoin = 'round';

            } else if (id === 'holy_blade') {
                snkPoly([[0,-13],[3,8],[0,12],[-3,8]], '#fff3b0', 1.5);

                snkGlowDot(0, -10, 2.5, '#fff3b0');
            } else if (id === 'armor') {
                snkPoly([[0,-12],[11,-6],[9,9],[0,14],[-9,9],[-11,-6]], '#c0392b', 1.5);
            } else if (id === 'black_armor') {
                snkPoly([[0,-12],[11,-6],[9,9],[0,14],[-9,9],[-11,-6]], '#2c2c34', 1.5);
            } else if (id === 'leaf') {
                snkPoly([[0,-12],[9,0],[0,13],[-9,0]], '#27ae60', 1.5);
                ctx.strokeStyle = '#145a32'; ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(0,-10); ctx.lineTo(0,11); ctx.stroke();
            } else if (id === 'boomerang') {
                ctx.strokeStyle = '#e67e22'; ctx.lineWidth = 4; ctx.lineCap='round';
                ctx.beginPath(); ctx.arc(0, 0, 9, -0.4, 2.0); ctx.stroke(); ctx.lineCap='butt';
            } else if (id === 'dragon_soul') {
                snkGlowDot(0, 0, 8, '#e74c3c', '#ff8a5c');
                ctx.fillStyle = '#fff3b0'; ctx.beginPath(); ctx.arc(0,0,3,0,Math.PI*2); ctx.fill();
            } else if (id === 'gladiator') {
                snkCircle(0, 0, 11, '#bdc3c7', 1.5);
                ctx.fillStyle = '#7f8c8d'; ctx.fillRect(-2, -10, 4, 20); ctx.fillRect(-10, -2, 20, 4);
            } else if (id === 'frog_key') {
                ctx.fillStyle = '#f1c40f'; ctx.beginPath(); ctx.arc(0, -5, 5, 0, Math.PI*2); ctx.fill();
                ctx.fillRect(-1.5, -2, 3, 14); ctx.fillRect(0, 8, 5, 3);
            } else if (id === 'lunchbox') {
                snkRect(-10, -8, 20, 16, '#c0392b', 1.5, 3);

                ctx.fillStyle = '#9aa4ad'; ctx.beginPath(); ctx.arc(0,0,6,0,Math.PI*2); ctx.fill();
