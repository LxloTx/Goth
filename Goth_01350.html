        function autoAttack() {
            if (enemies.length === 0) return;
            const now = Date.now();
            let cls = HERO_CLASSES[playerClass] || HERO_CLASSES.warrior;

            let shotRate = Math.max(220, cls.shotCooldown - (totalSeconds * 4)) * player.cooldownReduction;
            if (now - lastShot > shotRate) {
                let closest = getClosestEnemy();
                if (closest) {
                    let baseAngle = Math.atan2(closest.y - player.y, closest.x - player.x);
                    // Class projectile choice (evolutions still override via getHeroWeaponType for the held sprite)
                    let primaryProj = cls.projectileType;
                    let projRadius = (8 * swordSizeModifier) * (player.holyBladeLevel > 0 ? 1.8 : 1.0);
                    if (playerClass === 'mage') projRadius = 7 * swordSizeModifier;
                    if (playerClass === 'archer') projRadius = 5 * swordSizeModifier;
                    for (let i = 0; i < player.multiplierLevel; i++) {
                        let offset = (i - (player.multiplierLevel - 1) / 2) * 0.22;
                        let finalAngle = baseAngle + offset;
                        bullets.push({
                            x: player.x,
                            y: player.y,
                            startX: player.x,
                            startY: player.y,
                            radius: projRadius,
                            vx: Math.cos(finalAngle) * cls.shotSpeed,
                            vy: Math.sin(finalAngle) * cls.shotSpeed,
                            angle: finalAngle,
                            pierceRemaining: player.holyBladeLevel * 2,
                            damage: cls.shotDamage,
                            isHero: true,
                            projectileType: primaryProj
                        });
                    }
                    lastShot = now;
                }
            }

            // SAINT SWORD: fire an animated holy bolt at the nearest enemy
            if (player.hasSaintSword && now - (player._lastHolyBolt || 0) > 600 * player.cooldownReduction) {
                let t = getClosestEnemy();
                if (t) {
                    let a = Math.atan2(t.y - player.y, t.x - player.x);
                    bullets.push({
                        x: player.x,
                        y: player.y,
                        startX: player.x,
                        startY: player.y,
                        radius: 10,
                        vx: Math.cos(a) * 6.5,
                        vy: Math.sin(a) * 6.5,
                        angle: a,
                        pierceRemaining: 3,
                        damage: 3.2,
                        isHero: true,
                        projectileType: 'holy_bolt',
                        isHolyBolt: true
                    });
                    player._lastHolyBolt = now;
                }
            }

            let bowRate = Math.max(150, 1200 - (player.bowLevel * 150)) * player.cooldownReduction;
            if (player.bowLevel > 0 && (now - lastBow > bowRate)) {
                let target = getClosestEnemy();
                if (target) {
                    let baseAngle = Math.atan2(target.y - player.y, target.x - player.x);
                    let arrowsToFire = (player.hasStormcaller || player.hasApollosWrath) ? 3 : 1;
                    if (player.bowLevel >= 8) arrowsToFire += 4;
                    for (let i = 0; i < arrowsToFire; i++) {
                        let angle = baseAngle + (i - (arrowsToFire - 1) / 2) * 0.15;
                        bullets.push({
                            x: player.x,
                            y: player.y,
                            startX: player.x,
                            startY: player.y,
                            radius: (player.hasStormcaller || player.hasApollosWrath) ? 8 : 5,
                            vx: Math.cos(angle) * (player.hasStormcaller || player.hasApollosWrath ? 10 : 8),
                            vy: Math.sin(angle) * (player.hasStormcaller || player.hasApollosWrath ? 10 : 8),
                            angle: angle,
                            pierceRemaining: (player.hasStormcaller || player.hasApollosWrath) ? 4 : 2,
                            damage: (player.hasStormcaller || player.hasApollosWrath) ? 3.0 : 1.8,
                            isHero: true,
                            projectileType: (player.hasStormcaller || player.hasApollosWrath) ? 'lightning_arrow' : 'arrow'
                        });
                    }
                    lastBow = now;
                }
            }

            let fireboltRate = Math.max(400, baseFireboltCooldown - (player.fireboltLevel * 250)) * player.cooldownReduction;
            if (player.fireboltLevel > 0 && (now - lastFirebolt > fireboltRate)) {
                let target = enemies[Math.floor(Math.random() * enemies.length)];
                if (target) {
                    let angle = Math.atan2(target.y - player.y, target.x - player.x);
                    firebolts.push({
                        x: player.x,
                        y: player.y,
                        startX: player.x,
                        startY: player.y,
                        radius: 6 + (player.fireboltLevel * 1.5),
                        vx: Math.cos(angle) * 5.5,
                        vy: Math.sin(angle) * 5.5
                    });
                    lastFirebolt = now;
                }
            }

            let iceboltRate = baseFireboltCooldown * player.cooldownReduction;
            if (player.iceBoltLevel > 0 && (now - lastIceBolt > iceboltRate)) {
                // REVAMPED COLD RAY: target the CLOSEST enemy and fire a fast, short-range homing ice pick
                let target = getClosestEnemy();
                if (target) {
                    let angle = Math.atan2(target.y - player.y, target.x - player.x);
                    let spd = 6.2;
                    iceBolts.push({
                        x: player.x,
                        y: player.y,
                        startX: player.x,
                        startY: player.y,
                        radius: 6 + (player.iceBoltLevel * 1.2),
                        vx: Math.cos(angle) * spd,
                        vy: Math.sin(angle) * spd,
                        speed: spd,
                        angle: angle,
                        homing: true,
                        life: 70 // short lifespan -> short range
                    });
                    lastIceBolt = now;
                    playFreezeSFX();
                }
            }

            let axeRate = baseAxeCooldown * player.cooldownReduction;
            if (player.axeLevel > 0 && (now - lastAxe > axeRate)) {
                axeSwingProgress = 1.0;
                let cleaveRadius = 85 + (player.axeLevel * 15);
                for (let i = enemies.length - 1; i >= 0; i--) {
                    let e = enemies[i];
                    if (distSq(player.x, player.y, e.x, e.y) < (cleaveRadius + e.radius) * (cleaveRadius + e.radius)) {
                        let dmg = (3.15 + player.axeLevel * 1.35) * player.dmgBonus;
                        if (shopInventory.longswordPurchased || shopInventory.holyBladePurchased) dmg *= 1.10;
                        damageEnemy(e, dmg);
                        playCustomHitSFX(e.type);
                        if (e.hp <= 0) processEnemyElimination(enemies.splice(i, 1)[0]);
                    }
                }
                lastAxe = now;
            }

            if (player.minionLevel > 0) {
                let minionShotRate = baseMinionCooldown * player.cooldownReduction;
                if (now - lastMinionShot > minionShotRate) {
                    let minionX = player.x + Math.cos(globalAnimateClock) * 45;
                    let minionY = player.y + Math.sin(globalAnimateClock) * 45;
                    let target = getClosestEnemy();
                    if (target) {
                        let angle = Math.atan2(target.y - minionY, target.x - minionX);
                        bullets.push({
                            x: minionX,
                            y: minionY,
                            startX: minionX,
                            startY: minionY,
                            radius: 5,
                            vx: Math.cos(angle) * 4.0,
                            vy: Math.sin(angle) * 4.0,
                            angle: angle,
                            pierceRemaining: 0,
                            damage: 0.65,
                            isHero: false
                        });
                        lastMinionShot = now;
                    }
                }
            }

            let javelinRate = baseJavelinCooldown * player.cooldownReduction;
            if (player.javelinLevel > 0 && (now - lastJavelin > javelinRate)) {
                let target = getClosestEnemy();
                let initialAngle = target ? Math.atan2(target.y - player.y, target.x - player.x) : 0;
                javelins.push({
                    x: player.x,
                    y: player.y,
                    startX: player.x,
                    startY: player.y,
                    vx: Math.cos(initialAngle) * 3.8,
                    vy: Math.sin(initialAngle) * 3.8,
                    angle: initialAngle,
                    radius: 5
                });
                lastJavelin = now;
            }

            if (player.skeletonSummonLevel > 0 && (now - lastSkeletonSpawn > 3000 / player.skeletonSummonLevel)) {
                if (friendlySkeletons.length < player.skeletonSummonLevel * 3) {
                    friendlySkeletons.push({
                        x: player.x,
                        y: player.y,
                        hp: 15,
                        target: null,
                        speed: 2.2
                    });
                    lastSkeletonSpawn = now;
                }
            }
            let boomerangRate = Math.max(300, 1500 - (player.boomerangLevel * 200)) * player.cooldownReduction;
            if (player.boomerangLevel > 0 && (now - lastBoomerang > boomerangRate)) {
                let target = getClosestEnemy();
                let angle = target ? Math.atan2(target.y - player.y, target.x - player.x) : player.moveDirX > 0 ? 0 : Math.PI;
                let bType = player.hasLaserang ? 'laserang' : (player.hasFeatherang ? 'featherang' : 'boomerang');
                let speed = player.hasLaserang ? 14 : 9;
                bullets.push({
                    x: player.x,
                    y: player.y,
                    startX: player.x,
                    startY: player.y,
                    radius: player.hasFeatherang ? 14 : 10,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    angle: angle,
                    pierceRemaining: 999,
                    damage: player.hasFeatherang ? 4.5 : 2.0,
                    isHero: true,
                    projectileType: bType,
                    isReturning: false,
                    flightTime: 0
                });
                lastBoomerang = now;
                if (player.hasLaserang) playShadowKillSFX();
            }

            // --- ULTRA RARE: THROWING DAGGERS / POISON DAGGERS ---
            let daggerRate = Math.max(300, 900) * player.cooldownReduction;
            if (player.throwingDaggersLevel > 0 && (now - lastDagger > daggerRate)) {
                let target = getClosestEnemy();
                if (target) {
                    let baseAngle = Math.atan2(target.y - player.y, target.x - player.x);
                    let count = player.hasPoisonDaggers ? 5 : 3;
                    for (let i = 0; i < count; i++) {
                        let spread = (i - (count - 1) / 2) * 0.28;
                        let a = baseAngle + spread;
                        bullets.push({
                            x: player.x,
                            y: player.y,
                            startX: player.x,
                            startY: player.y,
                            radius: 5,
                            vx: Math.cos(a) * 7,
                            vy: Math.sin(a) * 7,
                            angle: a,
                            pierceRemaining: 0,
                            damage: player.hasPoisonDaggers ? 1.8 : 1.2,
                            isHero: true,
                            projectileType: player.hasPoisonDaggers ? 'poison_dagger' : 'dagger',
                            isUltraProj: true
                        });
                    }
                    if (player.hasPoisonDaggers) playPoisonHitSFX();
                    lastDagger = now;
                }
            }

            // --- ULTRA RARE: ARCANE GUN auto attack ---
            if (player.hasArcaneGun && (now - lastArcaneGunShot > 1400 * player.cooldownReduction)) {
                let target = getClosestEnemy();
                if (target) {
                    let baseAngle = Math.atan2(target.y - player.y, target.x - player.x);
                    for (let i = 0; i < 3; i++) {
                        let spread = (i - 1) * 0.25;
                        arcaneBullets.push({
                            x: player.x,
                            y: player.y,
                            vx: Math.cos(baseAngle + spread) * 5,
                            vy: Math.sin(baseAngle + spread) * 5,
                            radius: 8,
                            damage: 2.8,
                            homing: true,
                            life: 180
                        });
                    }
                    playArcaneFireSFX();
                    lastArcaneGunShot = now;
                }
            }

            // --- ULTRA RARE: MONKEY VIRUS banana attack ---
            if (player.monkeyVirusLevel > 0) {
                let bananaRate = Math.max(400, 1400 - (player.monkeyVirusLevel * 100)) * player.cooldownReduction;
                if (!player._lastBanana) player._lastBanana = 0;
                if (now - player._lastBanana > bananaRate) {
                    let target = getClosestEnemy();
                    let angle = target ? Math.atan2(target.y - player.y, target.x - player.x) : (player.moveDirX > 0 ? 0 : Math.PI);
                    let bSize = player.hasPrimeMonkey ? 18 : 10;
                    let bDmg = player.hasPrimeMonkey ? 4.5 : 2.0;
                    bullets.push({
                        x: player.x,
                        y: player.y,
                        startX: player.x,
                        startY: player.y,
                        radius: bSize,
                        vx: Math.cos(angle) * 8,
                        vy: Math.sin(angle) * 8,
                        angle: angle,
                        pierceRemaining: 999,
                        damage: bDmg,
                        isHero: true,
                        projectileType: 'banana',
                        isReturning: false,
                        flightTime: 0,
                        isBanana: true
                    });
                    playBananaSFX();
                    player._lastBanana = now;
                }
            }
        }

        function isEnemyPoisoned(e) {
            for (let i = 0; i < poisonedEnemies.length; i++) {
                if (poisonedEnemies[i].enemy === e) return true;
            }
            return false;
        }

        function getClosestEnemy(sourceX = player.x, sourceY = player.y) {
            let closest = null,
                minDist = Infinity;
            for (let e of enemies) {
                let d = distSq(e.x, e.y, sourceX, sourceY);
                if (d < minDist) {
                    minDist = d;
                    closest = e;
                }
            }
            return closest;
        }

        function processEnemyElimination(deadEnemy) {
            score++;
            scoreEl.innerText = score;
            if (deadEnemy.isShadow) playShadowKillSFX();

            let col = deadEnemy.type === 'nagalord' ? '#9b59b6' : deadEnemy.type === 'wicked_warrior' ? '#e67e22' : deadEnemy.type === 'boss' ? '#f1c40f' : deadEnemy.type === 'skeleton' ? '#e3e4db' : deadEnemy.type === 'bone_warrior' ? '#c0392b' : deadEnemy.type === 'cursed_soldier' ? '#6a1b9a' : '#2ecc71';
            if (deadEnemy.type === 'shadow_slime') col = '#2ecc71';

            spawnParticles(deadEnemy.x, deadEnemy.y, 10, col, 3.5, 28, 3.5);
            spawnParticles(deadEnemy.x, deadEnemy.y, 5, '#fff', 2, 18, 2);
            triggerShake(deadEnemy.type === 'boss' || deadEnemy.type === 'nagalord' || deadEnemy.type === 'skeleton_king' ? 14 : deadEnemy.type === 'wicked_warrior' ? 10 : deadEnemy.type === 'big' ? 6 : 3);

            // RABBIT FOOT luck: widen drop thresholds by ~6% per level (capped)
            let luck = 1 + Math.min(2.5, player.rabbitFootLevel * 0.06);
            // STAGE 4: dice drops get a flat +3% chance bump
            let diceChance = 0.002 * luck + (currentLevel === 4 ? 0.01 : 0);
            let roll = Math.random();
            if (roll < 0.0001) {
                // DEMON COIN: ultra-rare black coin worth 50 coins
                coins.push({
                    x: deadEnemy.x,
                    y: deadEnemy.y,
                    radius: 10,
                    pulseSeed: Math.random() * 10,
                    isDemon: true,
                    spawnTime: Date.now()
                });
            } else if (roll < diceChance) {
                coins.push({
                    x: deadEnemy.x,
                    y: deadEnemy.y,
                    radius: 9,
                    pulseSeed: Math.random() * 10,
                    isDice: true,
                    spawnTime: Date.now()
                });
            } else if (roll < diceChance + 0.012 * luck) {
                coins.push({
                    x: deadEnemy.x,
                    y: deadEnemy.y,
                    radius: 9,
                    pulseSeed: Math.random() * 10,
                    isSilver: true,
                    spawnTime: Date.now()
                });
            } else if (roll < diceChance + 0.09 * luck) {
                coins.push({
                    x: deadEnemy.x,
                    y: deadEnemy.y,
                    radius: 7,
                    pulseSeed: Math.random() * 10,
                    isSilver: false,
                    spawnTime: Date.now()
                });
            }

            if (deadEnemy.type === 'boss' && currentLevel === 1) {
                bossesDefeated++;
                xpGainMultiplier *= 1.15;
                spawnRateBonus *= 0.9091;
                playVictorySFX();
                setupShopButtonsLevel1();
                frogSpeechBubble = "GREETINGS TRAVELER! WELCOME TO MY SHOP!";
                shopLeaveTimer = 0;
                gameState = 'SHOP';
                currentTheme = 'FROG_SHOP';
                musicStep = 0;
                startSequencer();
                return;
            }

            if (deadEnemy.type === 'skeleton_king' && currentLevel === 2) {
                bossesDefeated++;
                xpGainMultiplier *= 1.15;
                spawnRateBonus *= 0.9091;
                playVictorySFX();
                triggerShake(20);
                spawnParticles(deadEnemy.x, deadEnemy.y, 40, '#d4af37', 5, 60, 5);
                spawnParticles(deadEnemy.x, deadEnemy.y, 30, '#ffffff', 4, 45, 3);
                setupShopButtonsLevel2();
                frogSpeechBubble = "RIBBIT! THE KING IS DEAD. PREPARE FOR THE HALLWAY!";
                shopLeaveTimer = 0;
                gameState = 'SHOP_LVL2';
                currentTheme = 'FROG_SHOP';
                musicStep = 0;
                startSequencer();
                return;
            }

            if (deadEnemy.type === 'nagalord' && currentLevel === 3) {
                bossesDefeated++;
                xpGainMultiplier *= 1.15;
                spawnRateBonus *= 0.9091;
                playVictorySFX();
                triggerShake(25);
                spawnParticles(deadEnemy.x, deadEnemy.y, 60, '#9b59b6', 6, 80, 6);
                spawnParticles(deadEnemy.x, deadEnemy.y, 40, '#ffffff', 5, 60, 4);
                setupShopButtonsLevel3();
                frogSpeechBubble = "Welcome, you have made it this far. I offer goods no one else got.";
                shopLeaveTimer = 0;
                gameState = 'SHOP_LVL3';
                currentTheme = 'FROG_SHOP';
                musicStep = 0;
                startSequencer();
                return;
            }

            if (deadEnemy.type === 'ursula' && currentLevel === 4) {
                bossesDefeated++;
                playVictorySFX();
                triggerShake(30);
                spawnParticles(deadEnemy.x, deadEnemy.y, 80, '#f1c40f', 7, 100, 7);
                spawnParticles(deadEnemy.x, deadEnemy.y, 50, '#ffffff', 6, 70, 5);
                triggerVictory();
                return;
            }

            if (player.vampireLevel > 0 && player.bleedTimer < Date.now() && Math.random() < 0.15) {
                player.hp = Math.min(player.maxHp, player.hp + (player.vampireLevel * 2));
                hpFill.style.width = `${(player.hp / player.maxHp) * 100}%`;
            }

            let baseXp = 1;
            switch (deadEnemy.type) {
                case 'grunt':
                    baseXp = 1;
                    break;
                case 'bomber':
                    baseXp = 2;
                    break;
                case 'big':
                    baseXp = 3;
                    break;
                case 'armored':
                    baseXp = 4;
                    break;
                case 'skeleton':
                    baseXp = 5;
                    break;
                case 'bone_warrior':
                    baseXp = 8;
                    break;
                case 'elite_bone_warrior':
                    baseXp = 8;
                    break;
                case 'cursed_soldier':
                    baseXp = 8.4;
                    break;
                case 'elite_cursed_soldier':
                    baseXp = 8.4;
                    break;
                case 'shadow_slime':
                    baseXp = 10;
                    break;
                case 'wicked_warrior':
                    baseXp = 40;
                    break;
                case 'wolf_handler':
                    baseXp = 7;
                    break;
                case 'white_wolf_handler':
                    baseXp = 10;
                    break;
                case 'wolf':
                    baseXp = 4;
                    break;
                case 'tife':
                    baseXp = 12;
                    break;
                case 'bulk_goblin':
                    baseXp = 8;
                    break;
                case 'battle_orc':
                    baseXp = 35;
                    break;
                case 'ursula':
                    baseXp = 80;
                    break;
                default:
                    baseXp = currentLevel === 3 ? 7 : (currentLevel === 2 ? 4 : 1);
                    break;
            }
            // XP scales up per stage so leveling keeps pace on later stages (3 & 4 felt starved).
            // Stage 1: x1, Stage 2: x1.6, Stage 3: x2.6, Stage 4: x4.2
            baseXp *= Math.pow(1.62, currentLevel - 1);

            let finalXpMult = deadEnemy.xpMult || 1;
            let xpGain = Math.max(1, Math.floor(baseXp * xpGainMultiplier * finalXpMult));
            player.xp += xpGain;

            if (player.xp >= player.xpNeeded) {
                player.xp = player.xp - player.xpNeeded;
                player.level++;
                player.xpNeeded = Math.floor(player.xpNeeded * 1.30);
                lvlEl.innerText = player.level;
                playLevelUpSFX();
                lootSelectionActive = true;
                lootMenuOpenTime = Date.now();
                setupLootCards();
            }
            lootFill.style.width = `${(player.xp / player.xpNeeded) * 100}%`;
        }

        function setupLootCards() {
            lootCards = [];
            let deck = [...standardLootOptions];
            let rareDeck = [...rareLootOptions];

            // BALANCE PASS: Loot pools accumulate cumulatively (>=) rather than switching (===),
            // so anything unlockable at Stage 1 stays available at Stage 2 and Stage 3, and so on.
            if (currentLevel >= 2) {
                deck = deck.concat(level2LootOptions);
                rareDeck = rareDeck.concat(level2RareLootOptions);
            }
            if (currentLevel >= 3) {
                deck = deck.concat(level3LootOptions);
                rareDeck = rareDeck.concat(level3RareLootOptions);
            }
            if (currentLevel >= 4) {
                deck = deck.concat(level4LootOptions);
            }
            if (shopInventory.holyBladePurchased && currentLevel < 3) {
                deck = deck.concat(level3LootOptions);
            }

            let legendaryPool = [];
            // THRESHOLD FIX: Require 8 counts of evolved item to reach legendary (tier 3)
            for (let evId in evolvedCounts) {
                if (evolvedCounts[evId] >= 8 && !unlockedLegendaries[evId] && legendaryLootOptions[evId]) {
                    legendaryPool.push({
                        ...legendaryLootOptions[evId],
                        _legendaryFromId: evId
                    });
                }
            }

            let evolutionPool = [];
            // THRESHOLD FIX: Require 4 counts for evolution (tier 2)
            for (let lootId in lootCounts) {
                if (lootCounts[lootId] >= 4 && !unlockedEvolutions[lootId] && evolvedLootOptions[lootId]) {
                    evolutionPool.push({
                        ...evolvedLootOptions[lootId],
                        _evolvedFromId: lootId
                    });
                }
            }

            // Ultra rare evolution check (tier 2 for ultra rares)
            let ultraEvoPool = [];
            for (let lootId in lootCounts) {
                if (lootCounts[lootId] >= 4 && !unlockedEvolutions['ultra_' + lootId] && ultraRareEvolvedOptions[lootId]) {
                    ultraEvoPool.push({
                        ...ultraRareEvolvedOptions[lootId],
                        _ultraEvolvedFromId: lootId,
                        _evolvedFromId: lootId
                    });
                }
            }

            // STAGE 4: filter out maxed / already-owned unique loot from the common deck
            deck = deck.filter(item => {
                if (item.id === 'ring_of_curse' && player.ringOfCurseLevel >= 3) return false;
                if (item.id === 'saint_sword' && player.hasSaintSword) return false;
                if (item.id === 'heart_of_throne' && player.hasHeartOfThrone) return false;
                return true;
            });

            for (let i = deck.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [deck[i], deck[j]] = [deck[j], deck[i]];
            }
            activeLootChoices = deck.slice(0, 3);

            let slot = 0;
            for (let lg of legendaryPool) {
                if (slot < 2) {
                    activeLootChoices[slot] = lg;
                    slot++;
                }
            }
            for (let ev of evolutionPool) {
                if (slot < 2) {
                    activeLootChoices[slot] = ev;
                    slot++;
                }
            }
            for (let uev of ultraEvoPool) {
                if (slot < 2) {
                    activeLootChoices[slot] = uev;
                    slot++;
                }
            }
            if (slot < 3 && Math.random() < 0.15) {
                let rareSlot = (slot === 0) ? Math.floor(Math.random() * 3) : slot;
                activeLootChoices[rareSlot] = rareDeck[Math.floor(Math.random() * rareDeck.length)];
            }

            // 2% chance to inject an ULTRA RARE into a random slot (only tier 1 ultra rares not yet evolved)
            let ultraRareInjectedThisRoll = false;
            if (Math.random() < 0.02) {
                let availableUltraRares = ultraRareLootOptions.filter(u => !unlockedEvolutions['ultra_' + u.id]);
                if (availableUltraRares.length > 0) {
                    let ultraRare = availableUltraRares[Math.floor(Math.random() * availableUltraRares.length)];
                    let ultraSlot = Math.floor(Math.random() * 3);
                    activeLootChoices[ultraSlot] = ultraRare;
                    ultraRareInjectedThisRoll = true;
                }
            }

            // 3% chance to inject a CURSED LOOT into a random slot (skips the slot just used by an Ultra Rare, if any)
            if (!ultraRareInjectedThisRoll && Math.random() < 0.03) {
                let cursedItem = cursedLootOptions[Math.floor(Math.random() * cursedLootOptions.length)];
                let cursedSlot = Math.floor(Math.random() * 3);
                activeLootChoices[cursedSlot] = cursedItem;
            }

            // STAGE 4 CONDITIONAL UNIQUE LOOT: guaranteed offer when the prerequisite Tier-3 is owned.
            if (currentLevel === 4) {
                if (player.hasDivineJudgement && !player.hasSaintSword && Math.random() < 0.5) {
                    activeLootChoices[Math.floor(Math.random() * 3)] = saintSwordLoot;
                } else if (player.hasImmortalForm && !player.hasHeartOfThrone && Math.random() < 0.5) {
                    activeLootChoices[Math.floor(Math.random() * 3)] = heartOfThroneLoot;
                }
            }

            let cardWidth = 220,
                cardHeight = 360,
                startX = 40,
                spacing = 30,
                centerY = 120;
            for (let i = 0; i < 3; i++) {
                lootCards.push({
                    x: startX + i * (cardWidth + spacing),
                    y: centerY,
                    w: cardWidth,
                    h: cardHeight,
                    lootData: activeLootChoices[i]
                });
            }
        }

                h: 45
            }, {
                id: 'lunchbox',
                x: 580,
                y: 360,
                w: 160,
                h: 45
            }, {
                id: 'leave_3',
                x: 300,
                y: 510,
                w: 200,
                h: 45
            }];
        }

        function triggerGameOver() {
            gameState = 'GAMEOVER';
            gameOverTime = Date.now();
            triggerShake(20);
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('knight_gothic_highscore', highScore);
                isNewHighScore = true;
            }
            // Switch to the somber defeat theme
            currentTheme = 'GAME_OVER';
            musicStep = 0;
            startSequencer();
        }

        function triggerVictory() {
            gameState = 'VICTORY';
            shopLeaveTimer = 0;
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('knight_gothic_highscore', highScore);
                isNewHighScore = true;
            }
        }

        function update() {
            if (gameState === 'LEVEL_INTRO') {
                if (Date.now() - levelIntroTimer > 2800) {
                    gameState = 'PLAYING';
                    startTime = Date.now();
                }
                return;
            }
            if (gameState === 'SHOP') {
                if (shopLeaveTimer > 0 && Date.now() - shopLeaveTimer > 1800) {
                    initializeLevel2Transition();
                }
                return;
            }
            if (gameState === 'SHOP_LVL2') {
                if (shopLeaveTimer > 0 && Date.now() - shopLeaveTimer > 1800) {
                    initializeLevel3Transition();
                }
                return;
            }
            if (gameState === 'SHOP_LVL3') {
                // After the final (Big Toad) shop, advance to the Battle Arena (Stage 4).
                if (shopLeaveTimer > 0 && Date.now() - shopLeaveTimer > 1800) {
                    initializeLevel4Transition();
                }
                return;
            }
            if (gameState !== 'PLAYING' || lootSelectionActive) return;

            movePlayer();
            updateCamera();
            handleDifficultyAndTimers();
            spawnEnemy();
            autoAttack();
            updateParticles();
            updateScreenShake();
            const now = Date.now();

            if (axeSwingProgress > 0) axeSwingProgress -= 0.04;

            // --- STAGE 4 EXPLOSIVE BARRELS ---
            if (currentLevel === 4 && barrels.length > 0) {
                for (let bi = barrels.length - 1; bi >= 0; bi--) {
                    let b = barrels[bi];
                    if (b.exploding) {
                        // Remove shortly after detonation (lets the blast sprite show briefly)
                        if (Date.now() - b.boomTimer > 180) barrels.splice(bi, 1);
                        continue;
                    }
                    // Pending chain-reaction trigger
                    if (b.chainAt && Date.now() >= b.chainAt) {
                        explodeBarrel(b);
                        continue;
                    }
                    // Player bullets detonate barrels
                    for (let k = bullets.length - 1; k >= 0; k--) {
                        let bl = bullets[k];
                        if (distSq(bl.x, bl.y, b.x, b.y) < (b.radius + bl.radius) * (b.radius + bl.radius)) {
                            if (!bl.pierceRemaining || bl.pierceRemaining <= 0) bullets.splice(k, 1);
                            explodeBarrel(b);
                            break;
                        }
                    }
                    if (b.exploding) continue;
                    // Firebolts / ice / arcane also pop barrels
                    for (let k = firebolts.length - 1; k >= 0; k--) {
                        if (distSq(firebolts[k].x, firebolts[k].y, b.x, b.y) < (b.radius + firebolts[k].radius) * (b.radius + firebolts[k].radius)) {
                            explodeBarrel(b);
                            break;
                        }
                    }
                }
            }

            const PICKUP_LIFETIME = 5000; // coins, dice, and chickens vanish after 5s if not collected
            for (let i = coins.length - 1; i >= 0; i--) {
                let c = coins[i];
                if (c.spawnTime && Date.now() - c.spawnTime > PICKUP_LIFETIME) {
                    coins.splice(i, 1);
                    continue;
                }
                if (distSq(player.x, player.y, c.x, c.y) < (player.radius + c.radius + 6) * (player.radius + c.radius + 6)) {
                    coins.splice(i, 1);
                    if (c.isDemon) {
                        player.coinsCollected += 50;
                        playSilverCoinSFX();
                        spawnParticles(c.x, c.y, 16, '#9b59b6', 4, 26, 4);
                    } else if (c.isDice) {
                        player.rerolls++;
                        diceEl.innerText = player.rerolls;
                        playLevelUpSFX();
                    } else if (c.isSilver) {
                        player.coinsCollected += 5;
                        playSilverCoinSFX();
                    } else {
                        player.coinsCollected++;
                        playCoinSFX();
                    }
                    coinEl.innerText = player.coinsCollected;

                    // ARCANE BANDOLIER: fire homing shot on coin pickup
                    if (player.arcaneBandolierLevel > 0) {
                        let target = getClosestEnemy();
                        if (target) {
                            let angle = Math.atan2(target.y - player.y, target.x - player.x);
                            arcaneBullets.push({
                                x: player.x,
                                y: player.y,
                                vx: Math.cos(angle) * 4,
                                vy: Math.sin(angle) * 4,
                                radius: 7,
                                damage: 2.0,
                                homing: true,
                                life: 200
                            });
                            playArcaneFireSFX();
                        }
                    }
                }
            }

            for (let i = chickens.length - 1; i >= 0; i--) {
                let c = chickens[i];
                if (c.spawnTime && Date.now() - c.spawnTime > PICKUP_LIFETIME) {
                    chickens.splice(i, 1);
                    continue;
                }
                if (distSq(player.x, player.y, c.x, c.y) < (player.radius + c.radius + 6) * (player.radius + c.radius + 6)) {
                    chickens.splice(i, 1);
                    player.hp = Math.min(player.maxHp, player.hp + player.maxHp * 0.20);
                    hpFill.style.width = `${(player.hp / player.maxHp) * 100}%`;
                    playLevelUpSFX();
                    spawnParticles(player.x, player.y, 15, '#2ecc71', 4, 30, 4);
                }
            }

            for (let i = friendlySkeletons.length - 1; i >= 0; i--) {
                let fs = friendlySkeletons[i];
                fs.target = getClosestEnemy(fs.x, fs.y);
                if (fs.target) {
                    let angle = Math.atan2(fs.target.y - fs.y, fs.target.x - fs.x);
                    fs.x += Math.cos(angle) * fs.speed;
                    fs.y += Math.sin(angle) * fs.speed;
                    if (distSq(fs.x, fs.y, fs.target.x, fs.target.y) < 25 * 25) {
                        damageEnemy(fs.target, 0.4 * player.dmgBonus);
                        if (fs.target.hp <= 0) processEnemyElimination(enemies.splice(enemies.indexOf(fs.target), 1)[0]);
                    }
                } else {
                    let angle = Math.atan2(player.y - fs.y, player.x - fs.x);
                    if (distSq(fs.x, fs.y, player.x, player.y) > 60 * 60) {
                        fs.x += Math.cos(angle) * fs.speed;
                        fs.y += Math.sin(angle) * fs.speed;
                    }
                }
            }

            // --- BALL AND CHAIN (Stage 4 loot) ---
            if (player.ballChainLevel > 0) {
                // Orbit angle advances each frame; tier 3 (Chakra) spins faster.
                let spinSpeed = player.hasChainChakra ? 0.045 : player.hasSpikeChain ? 0.018 : 0.026;
                ballChainAngle = (ballChainAngle + spinSpeed) % (Math.PI * 2);
                // Swing-pulse interval lowers slowly with levels (min 3s); Chakra swings fastest.
                let interval = player.hasChainChakra ? 3000 : Math.max(3500, 6000 - player.ballChainLevel * 200);
                let orbitR = (player.hasChainChakra ? 95 : player.hasSpikeChain ? 80 : 64) + player.ballChainLevel * 2;
                let ballX = player.x + Math.cos(ballChainAngle) * orbitR;
                let ballY = player.y + Math.sin(ballChainAngle) * orbitR;
                let ballHitR = player.hasChainChakra ? 46 : player.hasSpikeChain ? 34 : 24;
                if (Date.now() - (player._lastBallChain || 0) > interval) {
                    player._lastBallChain = Date.now();
                    playSwingSFX();
                    let dmg = (player.hasChainChakra ? 14 : player.hasSpikeChain ? 9 : 5) * player.dmgBonus;
                    for (let j = enemies.length - 1; j >= 0; j--) {
                        let e = enemies[j];
                        if (distSq(ballX, ballY, e.x, e.y) < (ballHitR + e.radius) * (ballHitR + e.radius)) {
                            damageEnemy(e, dmg);
                            e.slowStacks = (e.slowStacks || 0) + 1;
                            e.frozenTimer = Math.max(e.frozenTimer || 0, 0); // ensure field exists
                            // brief enemy slow: mark a slow timestamp the movement code respects
                            e.chainSlowUntil = Date.now() + 1500;
                            spawnParticles(e.x, e.y, 6, player.hasChainChakra ? '#29b6f6' : '#95a5a6', 3, 18, 3);
                            if (e.hp <= 0) {
                                playCustomHitSFX(e.type);
                                processEnemyElimination(enemies.splice(j, 1)[0]);
                            }
                        }
                    }
                    // AOE shockwave for Chain and Chakra (tier 3)
                    if (player.hasChainChakra) {
                        for (let j = enemies.length - 1; j >= 0; j--) {
                            let e = enemies[j];
                            if (distSq(ballX, ballY, e.x, e.y) < (110 + e.radius) * (110 + e.radius)) {
                                damageEnemy(e, dmg * 0.5);
                                e.chainSlowUntil = Date.now() + 1500;
                                if (e.hp <= 0) {
                                    playCustomHitSFX(e.type);
                                    processEnemyElimination(enemies.splice(j, 1)[0]);
                                }
                            }
                        }
                        spawnParticles(ballX, ballY, 18, '#29b6f6', 5, 60, 5);
                    }
                }
            }

            if (player.whirlwindLevel > 0) {
                let auraRadius = 50 + (player.whirlwindLevel * 6); // NERF: slower radius growth (was 55 + lvl*10)
                for (let j = enemies.length - 1; j >= 0; j--) {
                    let e = enemies[j];
                    if (distSq(player.x, player.y, e.x, e.y) < (auraRadius + e.radius) * (auraRadius + e.radius)) {
                        damageEnemy(e, (0.025 * player.whirlwindLevel) * player.dmgBonus); // NERF: lower dmg (was 0.04/lvl)
                        if (e.hp <= 0) {
                            playCustomHitSFX(e.type);
                            processEnemyElimination(enemies.splice(j, 1)[0]);
                        }
                    }
                }
            }

            // --- ARCANE BULLETS UPDATE (Bandolier / Arcane Gun) ---
            for (let i = arcaneBullets.length - 1; i >= 0; i--) {
                let ab = arcaneBullets[i];
                if (ab.homing) {
                    let target = getClosestEnemy(ab.x, ab.y);
                    if (target) {
                        let angle = Math.atan2(target.y - ab.y, target.x - ab.x);
                        let spd = Math.sqrt(ab.vx * ab.vx + ab.vy * ab.vy);
                        ab.vx += (Math.cos(angle) * spd - ab.vx) * 0.18;
                        ab.vy += (Math.sin(angle) * spd - ab.vy) * 0.18;
                    }
                }
                ab.x += ab.vx;
                ab.y += ab.vy;
                ab.life--;
                if (ab.life <= 0 || ab.x < -100 || ab.x > worldWidth + 100 || ab.y < camera.y - 100 || ab.y > camera.y + canvas.height + 100) {
                    arcaneBullets.splice(i, 1);
                    continue;
                }
                for (let j = enemies.length - 1; j >= 0; j--) {
                    let e = enemies[j];
                    if (distSq(ab.x, ab.y, e.x, e.y) < (ab.radius + e.radius) * (ab.radius + e.radius)) {
                        damageEnemy(e, ab.damage * player.dmgBonus);
                        playCustomHitSFX(e.type);
                        spawnParticles(ab.x, ab.y, 6, '#bb44ff', 3, 18, 3);
                        if (e.hp <= 0) processEnemyElimination(enemies.splice(j, 1)[0]);
                        arcaneBullets.splice(i, 1);
                        break;
                    }
                }
            }

            // --- PLAYER STATUS EFFECTS UPDATE (burn/bleed DoT, burn attack penalty) ---
            updatePlayerStatusEffects();

            // --- POISON SYSTEM UPDATE ---
            const poisonNow = Date.now();
            for (let i = poisonedEnemies.length - 1; i >= 0; i--) {
                let pe = poisonedEnemies[i];
                if (!enemies.includes(pe.enemy)) {
                    poisonedEnemies.splice(i, 1);
                    continue;
                }
                if (poisonNow - pe.lastTick > 800) {
                    damageEnemy(pe.enemy, 1.2 * player.dmgBonus);
                    spawnParticles(pe.enemy.x, pe.enemy.y, 3, '#33ff44', 1.5, 14, 2.5);
                    if (pe.enemy.hp <= 0) {
                        playCustomHitSFX(pe.enemy.type);
                        processEnemyElimination(enemies.splice(enemies.indexOf(pe.enemy), 1)[0]);
                        poisonedEnemies.splice(i, 1);
                        continue;
                    }
                    pe.lastTick = poisonNow;
                    pe.ticks--;
                    if (pe.ticks <= 0) poisonedEnemies.splice(i, 1);
                }
            }

            for (let i = bullets.length - 1; i >= 0; i--) {
                let b = bullets[i];

                // --- NEW BOOMERANG PHYSICS ---
                if (b.projectileType === 'boomerang' || b.projectileType === 'featherang' || b.projectileType === 'laserang') {
                    b.flightTime++;
                    if (!b.isReturning && b.flightTime > (b.projectileType === 'laserang' ? 20 : 35)) {
                        b.vx *= 0.85;
                        b.vy *= 0.85; // Slow down at peak
                        if (Math.abs(b.vx) < 0.5 && Math.abs(b.vy) < 0.5) b.isReturning = true;
                    } else if (b.isReturning) {
                        let retAngle = Math.atan2(player.y - b.y, player.x - b.x);
                        let spd = b.projectileType === 'laserang' ? 16 : 10;
                        b.vx = Math.cos(retAngle) * spd;
                        b.vy = Math.sin(retAngle) * spd;
                        if (distSq(b.x, b.y, player.x, player.y) < 600) {
                            bullets.splice(i, 1);
                            continue;
                        } // Caught by player
                    }
                    b.angle += (b.projectileType === 'laserang' ? 0.6 : 0.3); // Spin animation
                }
                // -----------------------------

                b.x += b.vx;
                b.y += b.vy;

                let distTraveled = distSq(b.x, b.y, b.startX, b.startY);
                // Allow boomerangs to exceed normal bullet distance while returning
                if ((distTraveled > 360 * 360 && !b.isReturning) || b.x < -50 || b.x > worldWidth + 50 || b.y < camera.y - 100 || b.y > camera.y + canvas.height + 100) {
                    bullets.splice(i, 1);
                    continue;
                }

                for (let j = enemies.length - 1; j >= 0; j--) {
                    let e = enemies[j];
                    if (distSq(b.x, b.y, e.x, e.y) < ((b.radius * 1.5) + e.radius) * ((b.radius * 1.5) + e.radius)) {
                        let dmg = b.damage;
                        if (b.isHero) dmg *= player.dmgBonus;

                        // PRESERVED LONGSWORD & HOLY BLADE BUFF
                        if (b.isHero && (shopInventory.longswordPurchased || shopInventory.holyBladePurchased)) dmg *= 1.10;

                        damageEnemy(e, dmg);
                        playCustomHitSFX(e.type);
                        spawnParticles(b.x, b.y, 5, '#bdc3c7', 2.5, 16, 2);

                        // SAINT SWORD holy bolt: light burst + LIGHT SFX
                        if (b.isHolyBolt) {
                            playLightSFX();
                            spawnParticles(b.x, b.y, 8, '#fff3b0', 3, 22, 3);
                        }

                        // Apply poison on poison dagger hit
                        if (b.projectileType === 'poison_dagger') {
                            spawnParticles(b.x, b.y, 6, '#33ff44', 2, 18, 3);
                            if (!poisonedEnemies.find(pe => pe.enemy === e)) {
                                poisonedEnemies.push({
                                    enemy: e,
                                    ticks: 5,
                                    lastTick: Date.now() - 700
                                });
                            }
                        }

                        if (e.hp <= 0) processEnemyElimination(enemies.splice(j, 1)[0]);

                        // Boomerangs pierce infinitely on the way back
                        if (b.pierceRemaining > 0 && !b.isReturning) b.pierceRemaining--;
                        else if (!b.isReturning) {
                            bullets.splice(i, 1);
                            break;
                        }
                    }
                }
            }

            for (let i = firebolts.length - 1; i >= 0; i--) {
                let f = firebolts[i];
                f.x += f.vx;
                f.y += f.vy;
                if (distSq(f.x, f.y, f.startX, f.startY) > 360 * 360) {
                    firebolts.splice(i, 1);
                    continue;
                }
                for (let j = enemies.length - 1; j >= 0; j--) {
                    let e = enemies[j];
                    if (distSq(f.x, f.y, e.x, e.y) < (f.radius + e.radius) * (f.radius + e.radius)) {
                        firebolts.splice(i, 1);
                        damageEnemy(e, 1.8 * player.dmgBonus);
                        playCustomHitSFX(e.type);
                        spawnParticles(f.x, f.y, 7, '#f39c12', 3, 20, 3);
                        spawnParticles(f.x, f.y, 4, '#e74c3c', 2, 14, 2);
                        if (e.hp <= 0) processEnemyElimination(enemies.splice(j, 1)[0]);
                        break;
                    }
                }
            }

            for (let i = iceBolts.length - 1; i >= 0; i--) {
                let ib = iceBolts[i];

                // Homing steer toward nearest enemy (gentle, so it curves like a guided pick)
                if (ib.homing) {
                    let tgt = getClosestEnemy(ib.x, ib.y);
                    if (tgt) {
                        let desired = Math.atan2(tgt.y - ib.y, tgt.x - ib.x);
                        let diff = desired - ib.angle;
                        while (diff < -Math.PI) diff += Math.PI * 2;
                        while (diff > Math.PI) diff -= Math.PI * 2;
                        ib.angle += diff * 0.12;
                        let spd = ib.speed || 6.2;
                        ib.vx = Math.cos(ib.angle) * spd;
                        ib.vy = Math.sin(ib.angle) * spd;
                    }
                }

                ib.x += ib.vx;
                ib.y += ib.vy;

                if (ib.life !== undefined) {
                    ib.life--;
                    if (ib.life <= 0) {
                        iceBolts.splice(i, 1);
                        continue;
                    }
                } else if (distSq(ib.x, ib.y, ib.startX, ib.startY) > 360 * 360) {
                    iceBolts.splice(i, 1);
                    continue;
                }

                for (let j = enemies.length - 1; j >= 0; j--) {
                    let e = enemies[j];
                    if (distSq(ib.x, ib.y, e.x, e.y) < (ib.radius + e.radius) * (ib.radius + e.radius)) {
                        iceBolts.splice(i, 1);
                        damageEnemy(e, (1.6 + player.iceBoltLevel * 0.5) * player.dmgBonus);
                        e.slowStacks = (e.slowStacks || 0) + 1;
                        // FREEZE: revamped Cold Ray freezes faster (2 stacks) and longer
                        if (e.slowStacks >= 2) {
                            e.frozenTimer = Date.now() + 2500;
                            e.slowStacks = 0;
                            playFreezeSFX();
                            spawnParticles(e.x, e.y, 12, '#aef3ff', 3.5, 26, 3.5);
                        }
                        playCustomHitSFX(e.type);
                        spawnParticles(ib.x, ib.y, 7, '#85c1e9', 3, 20, 3);
                        if (e.hp <= 0) processEnemyElimination(enemies.splice(j, 1)[0]);
                        break;
                    }
                }
            }

            for (let i = javelins.length - 1; i >= 0; i--) {
                let jv = javelins[i];
                let target = getClosestEnemy();
                if (target) {
                    let targetAngle = Math.atan2(target.y - jv.y, target.x - jv.x);
                    let angleDifference = targetAngle - jv.angle;
                    while (angleDifference < -Math.PI) angleDifference += Math.PI * 2;
                    while (angleDifference > Math.PI) angleDifference -= Math.PI * 2;
                    jv.angle += angleDifference * 0.14;
                    jv.vx = Math.cos(jv.angle) * 4.6;
                    jv.vy = Math.sin(jv.angle) * 4.6;
                }
                jv.x += jv.vx;
                jv.y += jv.vy;
                if (distSq(jv.x, jv.y, jv.startX, jv.startY) > 360 * 360) {
                    javelins.splice(i, 1);
                    continue;
                }
                for (let j = enemies.length - 1; j >= 0; j--) {
                    let e = enemies[j];
                    if (distSq(jv.x, jv.y, e.x, e.y) < (jv.radius + e.radius) * (jv.radius + e.radius)) {
                        javelins.splice(i, 1);
                        damageEnemy(e, (3.6 + player.javelinLevel * 1.8) * player.dmgBonus);
                        playCustomHitSFX(e.type);
                        if (e.hp <= 0) processEnemyElimination(enemies.splice(j, 1)[0]);
                        break;
                    }
                }
            }

            for (let i = enemyProjectiles.length - 1; i >= 0; i--) {
                let ep = enemyProjectiles[i];
                ep.x += ep.vx;
                ep.y += ep.vy;
                if (ep.isReflected) {
                    if (ep.x < 0 || ep.x > worldWidth || ep.y < camera.y - 100 || ep.y > camera.y + canvas.height + 100) {
                        enemyProjectiles.splice(i, 1);
                        continue;
                    }
                    for (let j = enemies.length - 1; j >= 0; j--) {
                        let e = enemies[j];
                        if (distSq(ep.x, ep.y, e.x, e.y) < (ep.radius + e.radius) * (ep.radius + e.radius)) {
                            damageEnemy(e, 6 * player.dmgBonus);
                            playCustomHitSFX(e.type);
                            enemyProjectiles.splice(i, 1);
                            if (e.hp <= 0) processEnemyElimination(enemies.splice(j, 1)[0]);
                            break;
                        }
                    }
                    continue;
                }
                if (distSq(player.x, player.y, ep.x, ep.y) < (player.radius + ep.radius) * (player.radius + ep.radius)) {
                    // MIRROR: drastically lowered reflect chance that scales per item level.
                    // ~12% at lvl 1, +12% per level, capped at 75%. Failed rolls fall through and hit normally.
                    let reflectChance = Math.min(0.75, player.mirrorLevel * 0.12);
                    if (player.mirrorLevel > 0 && ep.type !== 'stun_spit' && ep.type !== 'slime_ball' && Math.random() < reflectChance) {
                        ep.isReflected = true;
                        ep.vx = -ep.vx * 1.5;
                        ep.vy = -ep.vy * 1.5;
                        playCoinSFX();
                        spawnParticles(player.x, player.y, 6, '#00e5ff', 2.5, 16, 2.5);
                        continue;
                    }
                    if (ep.type === 'stun_spit') {
                        player.stunnedTimer = now + 1500;
                        triggerShake(8);
                        spawnParticles(player.x, player.y, 20, '#9b59b6', 4, 30, 4);
                    } else if (ep.type === 'shield_throw') {
                        // TIFE's shield: damage + strong knockback + 15% chance to STUN
                        dealDamageToPlayer(12);
                        let pushAngle = Math.atan2(player.y - ep.y, player.x - ep.x);
                        player.kbX = Math.cos(pushAngle) * 26;
                        player.kbY = Math.sin(pushAngle) * 26;
                        if (Math.random() < 0.15) {
                            player.stunnedTimer = now + 1200;
                            spawnParticles(player.x, player.y, 16, '#f1c40f', 4, 28, 4);
                        }
                        triggerShake(7);
                    } else if (ep.type === 'flame_axe') {
                        // URSULA's flaming axe: damage + applies BURN
                        dealDamageToPlayer(16);
                        applyBurnToPlayer(3000);
                        let pushAngle = Math.atan2(player.y - ep.y, player.x - ep.x);
                        player.kbX = Math.cos(pushAngle) * 14;
                        player.kbY = Math.sin(pushAngle) * 14;
                        spawnParticles(player.x, player.y, 12, '#e67e22', 4, 24, 3.5);
                    } else {
                        dealDamageToPlayer(ep.type === 'bone' ? 12 : ep.type === 'king_bone' || ep.type === 'naga_blade' ? 18 : ep.type === 'slime_ball' ? 15 : ep.type === 'arrow' ? 9 : 14);
                        // SHADOW SLIME projectile chills the hero, sapping movement speed
                        if (ep.type === 'slime_ball') {
                            applySlowToPlayer(0.4, 2500); // -40% speed for 2.5s
                        }
                    }
                    enemyProjectiles.splice(i, 1);
                    if (ep.type === 'bone' || ep.type === 'king_bone' || ep.type === 'naga_blade' || ep.type === 'arrow') {
                        let pushAngle = Math.atan2(player.y - ep.y, player.x - ep.x);
                        let pushForce = (ep.type === 'king_bone' || ep.type === 'naga_blade') ? 18 : ep.type === 'arrow' ? 8 : 12.5;
                        player.kbX = Math.cos(pushAngle) * pushForce;
                        player.kbY = Math.sin(pushAngle) * pushForce;
                    }
                    continue;
                }
                if (ep.x < 0 || ep.x > worldWidth || ep.y < camera.y - 200 || ep.y > camera.y + canvas.height + 200) enemyProjectiles.splice(i, 1);
            }

            for (let i = enemies.length - 1; i >= 0; i--) {
                let e = enemies[i];
                let dist = Math.hypot(player.x - e.x, player.y - e.y);
                let angle = Math.atan2(player.y - e.y, player.x - e.x);
                e.dirX = Math.cos(angle) >= 0 ? 1 : -1;

                let currentSpd = e.speed;
                if (e.frozenTimer && now < e.frozenTimer) {
                    currentSpd = 0;
                } else if (e.slowStacks > 0) {
                    currentSpd *= (1 - (e.slowStacks * 0.25));
                }
                // BALL AND CHAIN slow (temporary, independent of freeze stacks)
                if (e.chainSlowUntil && now < e.chainSlowUntil) {
                    currentSpd *= 0.5;
                }

                if (e.type === 'wicked_warrior') {
                    e.x += e.bounceX * currentSpd;
                    e.y += e.bounceY * currentSpd;
                    if (e.x < camera.x + e.radius) {
                        e.x = camera.x + e.radius;
                        e.bounceX *= -1;
                    } else if (e.x > camera.x + canvas.width - e.radius) {
                        e.x = camera.x + canvas.width - e.radius;
                        e.bounceX *= -1;
                    }
                    if (e.y < camera.y + e.radius) {
                        e.y = camera.y + e.radius;
                        e.bounceY *= -1;
                    } else if (e.y > camera.y + canvas.height - e.radius) {
                        e.y = camera.y + canvas.height - e.radius;
                        e.bounceY *= -1;
                    }
                } else if (e.type === 'nagalord') {
                    let targetY = camera.y + 100;
                    if (e.y < targetY) e.y += currentSpd;
                    if (e.y > targetY) e.y -= currentSpd;
                    if (e.x < player.x - 20) e.x += currentSpd * 0.8;
                    if (e.x > player.x + 20) e.x -= currentSpd * 0.8;
                    e.x = Math.max(camera.x + e.radius, Math.min(camera.x + canvas.width - e.radius, e.x));
                    e.y = Math.max(camera.y + e.radius, Math.min(camera.y + canvas.height - e.radius, e.y));
                    if (now - e.lastShot > 1400 && currentSpd > 0) {
                        enemyProjectiles.push({
                            x: e.x,
                            y: e.y,
                            radius: 10,
                            vx: Math.cos(angle - 0.2) * 4,
                            vy: Math.sin(angle - 0.2) * 4,
                            type: 'naga_blade',
                            isReflected: false
                        });
                        enemyProjectiles.push({
                            x: e.x,
                            y: e.y,
                            radius: 10,
                            vx: Math.cos(angle + 0.2) * 4,
                            vy: Math.sin(angle + 0.2) * 4,
                            type: 'naga_blade',
                            isReflected: false
                        });
                        e.lastShot = now;
                    }
                    if (now - e.lastSpit > 4000 && currentSpd > 0) {
                        enemyProjectiles.push({
                            x: e.x,
                            y: e.y,
                            radius: 8,
                            vx: Math.cos(angle) * 5.5,
                            vy: Math.sin(angle) * 5.5,
                            type: 'stun_spit',
                            isReflected: false
                        });
                        e.lastSpit = now;
                    }
                } else if (e.type === 'wolf_handler' || e.type === 'white_wolf_handler') {
                    // Handler keeps its distance and fires arrows; white variant fires slower arrows.
                    if (dist > 320) {
                        e.x += Math.cos(angle) * currentSpd;
                        e.y += Math.sin(angle) * currentSpd;
                    } else if (dist < 240) {
                        e.x -= Math.cos(angle) * currentSpd;
                        e.y -= Math.sin(angle) * currentSpd;
                    }
                    let arrowRate = e.type === 'white_wolf_handler' ? 2600 : 1900;
                    let arrowSpeed = e.type === 'white_wolf_handler' ? 3.0 : 4.4;
                    if (now - e.lastShot > arrowRate && currentSpd > 0) {
                        enemyProjectiles.push({
                            x: e.x,
                            y: e.y,
                            radius: 9,
                            vx: Math.cos(angle) * arrowSpeed,
                            vy: Math.sin(angle) * arrowSpeed,
                            type: 'arrow',
                            angle: angle,
                            isReflected: false
                        });
                        e.lastShot = now;
                    }
                } else if (e.type === 'wolf') {
                    // PET: covers its handler when the hero is far, lunges at the hero when close.
                    let owner = null;
                    if (e.ownerId) {
                        for (let k = 0; k < enemies.length; k++) {
                            if (enemies[k].handlerId === e.ownerId) {
                                owner = enemies[k];
                                break;
                            }
                        }
                    }
                    let aggroRange = e.wolfBig ? 340 : 280;
                    if (dist < aggroRange || !owner) {
                        // Attack the hero directly
                        e.x += Math.cos(angle) * currentSpd;
                        e.y += Math.sin(angle) * currentSpd;
                    } else {
                        // Stay near the handler, slightly toward the hero (covering position)
                        let guardX = owner.x + Math.cos(angle) * 45;
                        let guardY = owner.y + Math.sin(angle) * 45;
                        let ga = Math.atan2(guardY - e.y, guardX - e.x);
                        let gd = Math.hypot(guardX - e.x, guardY - e.y);
                        if (gd > 6) {
                            e.x += Math.cos(ga) * currentSpd;
                            e.y += Math.sin(ga) * currentSpd;
                        }
                    }
                } else if (e.type === 'battle_orc') {
                    // Boss-sized, slow, no projectiles — pure menacing bruiser.
                    e.x += Math.cos(angle) * currentSpd;
                    e.y += Math.sin(angle) * currentSpd;
                } else if (e.type === 'tife') {
                    // Fast warrior that closes in and throws stun-shields.
                    e.x += Math.cos(angle) * currentSpd;
                    e.y += Math.sin(angle) * currentSpd;
                    if (now - e.lastShot > 2400 && dist < 420 && currentSpd > 0) {
                        enemyProjectiles.push({
                            x: e.x,
                            y: e.y,
                            radius: 11,
                            vx: Math.cos(angle) * 4.6,
                            vy: Math.sin(angle) * 4.6,
                            type: 'shield_throw',
                            isReflected: false
                        });
                        e.lastShot = now;
                    }
                } else if (e.type === 'bulk_goblin') {
                    // Beefy red goblin: lumbers toward the hero and periodically plants a live barrel.
                    e.x += Math.cos(angle) * currentSpd;
                    e.y += Math.sin(angle) * currentSpd;
                    if (now - (e.lastBarrel || 0) > 5000 && currentSpd > 0 && barrels.length < 40) {
                        // drop a barrel just behind/around the goblin
                        let ba = Math.random() * Math.PI * 2;
                        let bx = e.x + Math.cos(ba) * 26;
                        let by = e.y + Math.sin(ba) * 26;
                        bx = Math.max(40, Math.min(worldWidth - 40, bx));
                        by = Math.max(40, Math.min(worldHeight - 40, by));
                        barrels.push({
                            x: bx, y: by, radius: 16, hp: 1,
                            exploding: false, boomTimer: 0, seed: Math.random() * Math.PI * 2,
                            spawnPop: now // brief spawn animation flag
                        });
                        spawnParticles(bx, by, 8, '#c0392b', 3, 18, 3);
                        e.lastBarrel = now;
                    }
                } else if (e.type === 'ursula') {
                    // URSULA, GRAND CHAMPION — huge, very slow, flaming axes + earthquake slow.
                    // Berserker trigger at <20% HP
                    if (!e.berserk && e.hp <= e.maxHp * 0.20) {
                        e.berserk = true;
                        ursulaBerserk = true;
                        triggerShake(22);
                        spawnParticles(e.x, e.y, 50, '#ff3b00', 6, 70, 6);
                    }
                    let spdMul = e.berserk ? 1.4 : 1.0;
                    e.x += Math.cos(angle) * currentSpd * spdMul;
                    e.y += Math.sin(angle) * currentSpd * spdMul;
                    e.x = Math.max(e.radius, Math.min(worldWidth - e.radius, e.x));
                    e.y = Math.max(e.radius, Math.min(worldHeight - e.radius, e.y));
                    // Flaming axes (low base speed; faster + wider spread in berserk)
                    let axeRate = e.berserk ? 1100 : 1700;
                    let axeSpeed = e.berserk ? 4.6 : 2.8;
                    if (now - e.lastShot > axeRate && currentSpd > 0) {
                        let spread = e.berserk ? 5 : 3;
                        for (let s = 0; s < spread; s++) {
                            let off = (s - (spread - 1) / 2) * (e.berserk ? 0.30 : 0.34);
                            enemyProjectiles.push({
                                x: e.x,
                                y: e.y - 10,
                                radius: 13,
                                vx: Math.cos(angle + off) * axeSpeed,
                                vy: Math.sin(angle + off) * axeSpeed,
                                type: 'flame_axe',
                                spin: 0,
                                isReflected: false
                            });
                        }
                        e.lastShot = now;
                    }
                    // Earthquake "shake" that slows the hero, on a long cooldown
                    if (now - e.lastQuake > (e.berserk ? 4000 : 6000) && currentSpd > 0) {
                        let quakeRadius = e.berserk ? 520 : 360; // AOE expands in berserk
                        triggerShake(18);
                        spawnParticles(e.x, e.y, 40, '#c2a062', 5, quakeRadius * 0.18, 5);
                        if (dist < quakeRadius) {
                            applySlowToPlayer(0.45, e.berserk ? 3000 : 2200);
                        }
                        e.lastQuake = now;
                    }
                } else if (e.type === 'bomber') {
                    if (dist > 190) {
                        e.x += Math.cos(angle) * currentSpd;
                        e.y += Math.sin(angle) * currentSpd;
                    } else if (dist < 120) {
                        e.x -= Math.cos(angle) * currentSpd;
                        e.y -= Math.sin(angle) * currentSpd;
                    }
                    if (now - e.lastShot > 2200 && currentSpd > 0) {
                        enemyProjectiles.push({
                            x: e.x,
                            y: e.y - 6,
                            radius: 5,
                            vx: Math.cos(angle) * 1.8,
                            vy: Math.sin(angle) * 1.8,
                            isReflected: false
                        });
                        e.lastShot = now;
                    }
                } else if (e.type === 'bone_warrior' || e.type === 'elite_bone_warrior') {
                    if (dist > 230) {
                        e.x += Math.cos(angle) * currentSpd;
                        e.y += Math.sin(angle) * currentSpd;
                    } else if (dist < 150) {
                        e.x -= Math.cos(angle) * currentSpd;
                        e.y -= Math.sin(angle) * currentSpd;
                    }
                    if (now - e.lastShot > (e.type === 'elite_bone_warrior' ? 2500 : 4200) && currentSpd > 0) {
                        enemyProjectiles.push({
                            x: e.x,
                            y: e.y,
                            radius: e.type === 'elite_bone_warrior' ? 8 : 6,
                            vx: Math.cos(angle) * (e.type === 'elite_bone_warrior' ? 4.5 : 3.4),
                            vy: Math.sin(angle) * (e.type === 'elite_bone_warrior' ? 4.5 : 3.4),
                            type: 'bone',
                            isReflected: false
                        });
                        e.lastShot = now;
                    }
                } else if (e.type === 'shadow_slime') {
                    if (dist > 200) {
                        e.x += Math.cos(angle) * currentSpd;
                        e.y += Math.sin(angle) * currentSpd;
                    } else if (dist < 100) {
                        e.x -= Math.cos(angle) * currentSpd;
                        e.y -= Math.sin(angle) * currentSpd;
                    }
                    if (now - e.lastShot > 3000 && currentSpd > 0) {
                        enemyProjectiles.push({
                            x: e.x,
                            y: e.y,
                            radius: 8,
                            vx: Math.cos(angle) * 3,
                            vy: Math.sin(angle) * 3,
                            type: 'slime_ball',
                            isReflected: false
                        });
                        e.lastShot = now;
                    }
                } else if (e.type === 'skeleton') {
                    if (!e.erraticTimer) e.erraticTimer = now;
                    if (!e.erraticDirX) {
                        e.erraticDirX = 0;
                        e.erraticDirY = 0;
                    }
                    if (now - e.erraticTimer > e.erraticInterval && currentSpd > 0) {
                        let erraticAngle = angle + (Math.random() - 0.5) * 4.0;
                        e.erraticDirX = Math.cos(erraticAngle);
                        e.erraticDirY = Math.sin(erraticAngle);
                        e.erraticInterval = 100 + Math.random() * 300;
                        e.erraticTimer = now;
                    }
                    e.x += e.erraticDirX * currentSpd * 2.5;
                    e.y += e.erraticDirY * currentSpd * 2.5;
                } else if (e.type === 'skeleton_king') {
                    e.x += Math.cos(angle) * currentSpd;
                    e.y += Math.sin(angle) * currentSpd;
                    if (now - e.lastShot > 900 && currentSpd > 0) {
                        for (let s = -1; s <= 1; s++) {
                            let spreadAngle = angle + s * 0.28;
                            enemyProjectiles.push({
                                x: e.x,
                                y: e.y,
                                radius: 8,
                                vx: Math.cos(spreadAngle) * 4.2,
                                vy: Math.sin(spreadAngle) * 4.2,
                                type: 'king_bone',
                                isReflected: false
                            });
                        }
                        e.lastShot = now;
                    }
                } else {
                    e.x += Math.cos(angle) * currentSpd;
                    e.y += Math.sin(angle) * currentSpd;
                }

                if (currentLevel === 2) {
                    for (let p of brokenPillars) {
                        if (distSq(e.x, e.y, p.x, p.y) < (e.radius + p.radius) * (e.radius + p.radius)) {
                            let pa = Math.atan2(e.y - p.y, e.x - p.x);
                            e.x += Math.cos(pa) * 1.5;
                            e.y += Math.sin(pa) * 1.5;
                        }
                    }
                }

                if (dist < player.radius + e.radius) {
                    let dps = 0.85;
                    if (e.type === 'bomber') dps = 0.35;
                    if (e.type === 'big') dps = 1.2;
                    if (e.type === 'armored') dps = 2.8;
                    if (e.type === 'boss') dps = 4.0;
                    if (e.type === 'skeleton') dps = 2.72;
                    if (e.type === 'bone_warrior' || e.type === 'elite_bone_warrior') dps = e.type === 'elite_bone_warrior' ? 4.0 : 2.0;
                    if (e.type === 'cursed_soldier' || e.type === 'elite_cursed_soldier') dps = e.type === 'elite_cursed_soldier' ? 9.0 : 6.0;
                    if (e.type === 'shadow_slime') dps = 5.0;
                    if (e.type === 'skeleton_king') dps = 5.0;
                    if (e.type === 'wicked_warrior') {
                        dps = 2.5; // Decreased damage from 7.0
                        let pushAngle = Math.atan2(player.y - e.y, player.x - e.x);
                        player.kbX = Math.cos(pushAngle) * 25; // Apply massive knockback!
                        player.kbY = Math.sin(pushAngle) * 25;
                    }
                    if (e.type === 'nagalord') dps = 8.5;
                    if (e.type === 'wolf_handler' || e.type === 'white_wolf_handler') dps = e.type === 'white_wolf_handler' ? 3.5 : 2.5;
                    if (e.type === 'bulk_goblin') dps = 4.0;
                    if (e.type === 'wolf') dps = e.wolfBig ? 7.0 : 4.0;
                    if (e.type === 'battle_orc') {
                        dps = 9.0;
                        let pushAngle = Math.atan2(player.y - e.y, player.x - e.x);
                        player.kbX = Math.cos(pushAngle) * 16;
                        player.kbY = Math.sin(pushAngle) * 16;
                    }
                    if (e.type === 'tife') dps = 5.0;
                    if (e.type === 'ursula') dps = e.berserk ? 11.0 : 7.5;
                    dealDamageToPlayer(dps);

                    // CONTACT STATUS EFFECTS from thematic enemies.
                    // Contact persists across frames, so use a low per-frame chance to space out procs.
                    if ((e.type === 'cursed_soldier' || e.type === 'elite_cursed_soldier') && player.poisonTimer < now && Math.random() < 0.04) {
                        applyPoisonToPlayer(3000); // cursed soldiers poison on touch (3s)
                    } else if (e.type === 'wicked_warrior' && player.burnTimer < now && Math.random() < 0.06) {
                        applyBurnToPlayer(3000); // fiery wicked warrior burns on touch (3s)
                    } else if ((e.type === 'bone_warrior' || e.type === 'elite_bone_warrior') && player.bleedTimer < now && Math.random() < 0.04) {
                        applyBleedToPlayer(3000); // jagged bone warriors cause bleed (3s)
                    }

                    // HEART OF THRONE: 20% chance to erupt blood spikes in all directions when struck
                    if (player.hasHeartOfThrone && (now - (player._lastBloodSpike || 0) > 700) && Math.random() < 0.20) {
                        player._lastBloodSpike = now;
                        let spikeCount = 12;
                        for (let s = 0; s < spikeCount; s++) {
                            let a = (s / spikeCount) * Math.PI * 2;
                            bullets.push({
                                x: player.x,
                                y: player.y,
                                startX: player.x,
                                startY: player.y,
                                radius: 8,
                                vx: Math.cos(a) * 5.5,
                                vy: Math.sin(a) * 5.5,
                                angle: a,
                                pierceRemaining: 2,
                                damage: 2.4,
                                isHero: true,
                                projectileType: 'blood_spike'
                            });
                        }
                        spawnParticles(player.x, player.y, 14, '#8b0000', 4, 26, 4);
                        playBleedSFX();
                    }

                    // THORNED CARAPACE / VENGEFUL BULWARK: retaliation damage + knockback on contact
                    if (player.thornsLevel > 0) {
                        let thornDmg = (1.5 * player.thornsLevel) * player.dmgBonus;
                        damageEnemy(e, thornDmg);
                        spawnParticles(e.x, e.y, 4, '#7f8c8d', 2, 16, 2.5);
                        let pushBack = Math.atan2(e.y - player.y, e.x - player.x);
                        e.x += Math.cos(pushBack) * 6;
                        e.y += Math.sin(pushBack) * 6;
                        if (e.hp <= 0) {
                            playCustomHitSFX(e.type);
