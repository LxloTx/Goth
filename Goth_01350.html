            ctx.restore();
        }

        function drawLootMenu() {
            let bgGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
            bgGrad.addColorStop(0, 'rgba(5, 10, 15, 0.85)');
            bgGrad.addColorStop(1, 'rgba(0, 0, 0, 0.95)');
            ctx.fillStyle = bgGrad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            let glow = ctx.createRadialGradient(canvas.width / 2, canvas.height / 2, 100, canvas.width / 2, canvas.height / 2, 600);
            glow.addColorStop(0, 'rgba(46, 204, 113, 0.1)');
            glow.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = glow;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#f1c40f';
            ctx.font = 'bold 36px "Courier New"';
            ctx.textAlign = 'center';
            ctx.shadowColor = '#f1c40f';
            ctx.shadowBlur = 10;
            ctx.fillText("POWER ASCENDS", canvas.width / 2, 65);
            ctx.shadowBlur = 0;

            lootCards.forEach((card, idx) => {
                let isHovered = (idx === hoveredCardIndex);
                let isEvolved = !!card.lootData._evolvedFromId;
                let isLegendary = !!card.lootData._legendaryFromId;
                let isUltraRare = !!card.lootData.isUltraRare;
                let isCursed = !!card.lootData.isCursed;

                ctx.save();
                if (isHovered) {
                    ctx.translate(card.x - 5, card.y - 5);
                    ctx.scale(1.04, 1.04);
                    ctx.shadowColor = isCursed ? '#a020f0' : (isUltraRare ? '#ffffff' : (isLegendary ? '#ffd700' : (isEvolved ? '#b44dff' : (card.lootData.isRare ? '#9b59b6' : card.lootData.iconColor))));
                    ctx.shadowBlur = isUltraRare ? 40 : (isCursed ? 32 : (isLegendary ? 30 : 20));
                } else {
                    ctx.translate(card.x, card.y);
                    ctx.shadowColor = '#000';
                    ctx.shadowBlur = 10;
                }

                if (isCursed) {
                    ctx.fillStyle = '#1a0526';
                } else if (isUltraRare) {
                    ctx.fillStyle = '#0a0010';
                } else if (isLegendary) {
                    ctx.fillStyle = '#110a00';
                } else if (isEvolved) {
                    ctx.fillStyle = '#0f071a';
                } else if (card.lootData.isRare) {
                    ctx.fillStyle = '#160f22';
                } else {
                    ctx.fillStyle = '#12171a';
                }
                ctx.fillRect(0, 0, card.w, card.h);

                if (isCursed) {
                    // Pulsing purple border with a sickly glow + CURSED banner
                    let cp = 0.5 + 0.5 * Math.sin(globalAnimateClock * 4);
                    let pr = Math.floor(140 + 60 * cp);
                    let pb = Math.floor(180 + 60 * cp);
                    ctx.strokeStyle = `rgb(${pr},30,${pb})`;
                    ctx.lineWidth = isHovered ? 6 : 4;
                    ctx.shadowColor = '#a020f0';
                    ctx.shadowBlur = isHovered ? 18 : 10;
                    ctx.strokeRect(0, 0, card.w, card.h);
                    ctx.shadowBlur = 0;
                    let cgrad = ctx.createLinearGradient(0, 0, card.w, 0);
                    cgrad.addColorStop(0, '#4a0e5c');
                    cgrad.addColorStop(0.5, '#8e2de2');
                    cgrad.addColorStop(1, '#4a0e5c');
                    ctx.fillStyle = cgrad;
                    ctx.fillRect(0, 0, card.w, 26);
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 13px "Courier New"';
                    ctx.textAlign = 'center';
                    ctx.fillText('\u2620 CURSED \u2620', card.w / 2, 17);
                } else if (isUltraRare) {
                    // Pulsing rainbow border animation
                    let t = globalAnimateClock * 5;
                    let r = Math.floor(127 + 128 * Math.sin(t));
                    let gv = Math.floor(127 + 128 * Math.sin(t + 2.1));
                    let bv = Math.floor(127 + 128 * Math.sin(t + 4.2));
                    ctx.strokeStyle = `rgb(${r},${gv},${bv})`;
                    ctx.lineWidth = isHovered ? 7 : 5;
                    ctx.shadowColor = `rgb(${r},${gv},${bv})`;
                    ctx.shadowBlur = isHovered ? 20 : 12;
                    ctx.strokeRect(0, 0, card.w, card.h);
                    ctx.shadowBlur = 0;
                    // Rainbow banner
                    let grad = ctx.createLinearGradient(0, 0, card.w, 0);
                    grad.addColorStop(0, `rgb(${r},${gv},${bv})`);
                    grad.addColorStop(0.5, `rgb(${gv},${bv},${r})`);
                    grad.addColorStop(1, `rgb(${bv},${r},${gv})`);
                    ctx.fillStyle = grad;
                    ctx.fillRect(0, 0, card.w, 26);
                    ctx.fillStyle = '#000';
                    ctx.font = 'bold 13px "Courier New"';
                    ctx.textAlign = 'center';
                    ctx.fillText('★ ULTRA RARE ★', card.w / 2, 17);
                } else if (isLegendary) {
                    let t = globalAnimateClock * 3;
                    let r = Math.floor(200 + 55 * Math.sin(t));
                    let g = Math.floor(160 + 60 * Math.sin(t + 2.1));
                    let b = Math.floor(0 + 40 * Math.sin(t + 4.2));
                    ctx.strokeStyle = `rgb(${r},${g},${b})`;
                    ctx.lineWidth = isHovered ? 6 : 4;
                } else if (isEvolved) {
                    let shimmer = 0.5 + 0.5 * Math.sin(globalAnimateClock * 4);
                    let r = Math.floor(180 + 75 * shimmer),
                        g = Math.floor(50 + 50 * shimmer),
                        b = Math.floor(220 + 35 * shimmer);
                    ctx.strokeStyle = `rgb(${r},${g},${b})`;
                    ctx.lineWidth = isHovered ? 5 : 3;
                } else {
                    ctx.strokeStyle = isHovered ? card.lootData.iconColor : (card.lootData.isRare ? '#8e44ad' : '#34495e');
                    ctx.lineWidth = isHovered ? 4 : 2;
                }
                if (!isUltraRare && !isCursed) ctx.strokeRect(0, 0, card.w, card.h);

                if (isLegendary) {
                    let grad = ctx.createLinearGradient(0, 0, card.w, 0);
                    grad.addColorStop(0, '#7b4f00');
                    grad.addColorStop(0.5, '#ffd700');
                    grad.addColorStop(1, '#7b4f00');
                    ctx.fillStyle = grad;
                    ctx.fillRect(0, 0, card.w, 24);
                    ctx.fillStyle = '#1a1200';
                    ctx.font = 'bold 13px "Courier New"';
                    ctx.textAlign = 'center';
                    ctx.fillText('★ LEGENDARY ★', card.w / 2, 16);
                } else if (isEvolved) {
                    ctx.fillStyle = '#7d3cff';
                    ctx.fillRect(0, 0, card.w, 24);
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 12px "Courier New"';
                    ctx.textAlign = 'center';
                    ctx.fillText('✨ EVOLVED ✨', card.w / 2, 16);
                }

                let iconStr = card.lootData.title.split(' ')[0];
                let cleanTitle = card.lootData.title.substring(iconStr.length).trim();

                let breathe = 1 + 0.04 * Math.sin(globalAnimateClock * 3 + idx);
                ctx.save();
                ctx.translate(card.w / 2, (isLegendary || isEvolved || isUltraRare || isCursed) ? 80 : 70);
                ctx.scale(breathe, breathe);

                ctx.shadowColor = card.lootData.iconColor;
                ctx.shadowBlur = isUltraRare ?
                    (20 + 15 * Math.sin(globalAnimateClock * 6 + idx)) :
                    (15 + 10 * Math.sin(globalAnimateClock * 5 + idx));
                if (isUltraRare) {
                    let t = globalAnimateClock * 5;
                    ctx.shadowColor = `rgb(${Math.floor(127+128*Math.sin(t))},${Math.floor(127+128*Math.sin(t+2))},${Math.floor(127+128*Math.sin(t+4))})`;
                }
                ctx.fillStyle = '#0a0a0a';
                ctx.fillRect(-35, -35, 70, 70);

                ctx.strokeStyle = card.lootData.iconColor;
                ctx.lineWidth = 2;
                ctx.strokeRect(-35, -35, 70, 70);

                ctx.fillStyle = card.lootData.iconColor;
                ctx.fillRect(-37, -37, 8, 2);
                ctx.fillRect(-37, -37, 2, 8);
                ctx.fillRect(29, -37, 8, 2);
                ctx.fillRect(35, -37, 2, 8);
                ctx.fillRect(-37, 35, 8, 2);
                ctx.fillRect(-37, 29, 2, 8);
                ctx.fillRect(29, 35, 8, 2);
                ctx.fillRect(35, 29, 2, 8);

                ctx.shadowBlur = 0;
                ctx.font = '40px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(iconStr, 0, 5);

                let titleY = (isLegendary || isEvolved || isUltraRare || isCursed) ? 145 : 135;

                ctx.textAlign = 'center';
                ctx.fillText(cleanTitle, card.w / 2, titleY);

                let statY = titleY + 20;
                ctx.fillStyle = 'rgba(255, 255, 255, 0.05)';
                ctx.fillRect(15, statY, card.w - 30, 30);
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)';
                ctx.lineWidth = 1;
                ctx.strokeRect(15, statY, card.w - 30, 30);

                ctx.fillStyle = '#00e5ff';
                ctx.font = 'bold 12px "Courier New"';
                ctx.fillText(card.lootData.stats || "UPGRADE", card.w / 2, statY + 19);

                let descY = statY + 45;
                ctx.fillStyle = '#b2bec3';
                ctx.font = '13px "Courier New"';
                let words = card.lootData.desc.split(' '),
                    line = '',
                    y = descY;
                for (let n = 0; n < words.length; n++) {
                    let testLine = line + words[n] + ' ';
                    if (ctx.measureText(testLine).width > card.w - 24 && n > 0) {
                        ctx.fillText(line, card.w / 2, y);
                        line = words[n] + ' ';
                        y += 18;
                    } else {
                        line = testLine;
                    }
                }
                ctx.fillText(line, card.w / 2, y);

                // --- PIP COUNTER FIXED TO 12 ---
                if (!isLegendary) {
                    let baseId = card.lootData._evolvedFromId || card.lootData.id;
                    let evId = card.lootData._evolvedFromId ? card.lootData.id : null;
                    let maxCount = 12;
                    let totalCount = isEvolved ? 4 + (evolvedCounts[evId] || 0) : (lootCounts[baseId] || 0);

                    if (totalCount > 0 || isEvolved) {
                        ctx.font = '12px "Courier New"';
                        ctx.textAlign = 'center';
                        ctx.fillStyle = totalCount >= 4 ? (isEvolved ? '#b44dff' : '#f1c40f') : '#7f8c8d';
                        let dots = '';
                        for (let d = 0; d < maxCount; d++) {
                            dots += d < totalCount ? '●' : '○';
                        }
                        let label = totalCount >= 12 ? 'MAXED' : (totalCount === 4 && !isEvolved ? 'READY TO EVOLVE' : `LVL ${totalCount + 1}`);
                        ctx.fillText(`${dots}`, card.w / 2, card.h - 22);
                        ctx.fillText(`${label}`, card.w / 2, card.h - 8);
                    }
                } else {
                    ctx.fillStyle = '#ffd700';
                    ctx.font = 'bold 12px "Courier New"';
                    ctx.textAlign = 'center';
                    let dots = '●●●●●●●●●●●●';
                    ctx.fillText(`${dots}`, card.w / 2, card.h - 22);
                    ctx.fillText('MAXIMUM POWER', card.w / 2, card.h - 8);
                }

                ctx.restore();
            });

            let rerollBtn = {
                x: canvas.width / 2 - 90,
                y: 530,
                w: 180,
                h: 45
            };
            let hoverReroll = hoveredCardIndex === 99;

            ctx.fillStyle = player.rerolls > 0 ? (hoverReroll ? '#2980b9' : '#3498db') : '#1a1a1a';
            ctx.fillRect(rerollBtn.x, rerollBtn.y, rerollBtn.w, rerollBtn.h);

            ctx.strokeStyle = player.rerolls > 0 ? '#ecf0f1' : '#333';
            ctx.lineWidth = 2;
            ctx.strokeRect(rerollBtn.x, rerollBtn.y, rerollBtn.w, rerollBtn.h);

            ctx.fillStyle = player.rerolls > 0 ? '#fff' : '#777';
            ctx.font = 'bold 18px "Courier New"';
            ctx.textAlign = 'center';
            ctx.fillText(`REROLL (🎲 ${player.rerolls})`, canvas.width / 2, rerollBtn.y + 28);
        }

        function drawIntroSequence() {
            let elapsed = Date.now() - introStartTime;
            ctx.fillStyle = '#050a06'; // Match your game's background color
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (elapsed < 3500) {
                // Phase 1: 3D Text Animation
                ctx.save();
                ctx.translate(canvas.width / 2, canvas.height / 2);

                // Zoom-in and wobble effect
                let scale = Math.min(1.2, elapsed / 1000);
                let wobble = Math.sin(elapsed * 0.008) * 0.05;
                ctx.scale(scale + wobble, scale + wobble);

                let text = "LXLOWARE";
                ctx.font = 'bold 70px "Courier New", Courier, monospace';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';

                // 3D Extrusion (Capcom 90s Style: Blue depth, Yellow/Orange face)
                let depth = 12;
                let letterSpacing = 55;

                for (let i = depth; i >= 0; i--) {
                    ctx.fillStyle = i === 0 ? '#f39c12' : '#2980b9';

                    for (let j = 0; j < text.length; j++) {
                        let charX = (j - text.length / 2 + 0.5) * letterSpacing;
                        // Wavy individual letter motion
                        let yOffset = Math.sin((elapsed * 0.005) + j * 0.5) * 15;

                        // Draw 3D shadow/extrusion
                        ctx.fillText(text[j], charX - i * 2.5, yOffset + i * 2.5);

                        // Add black outline to the extrusion for pixelated arcade contrast
                        if (i > 0) {
                            ctx.strokeStyle = '#000';
                            ctx.lineWidth = 2;
                            ctx.strokeText(text[j], charX - i * 2.5, yOffset + i * 2.5);
                        }
                    }
                }
                ctx.restore();
            } else if (elapsed < 4500) {
                // Phase 2: Fade Out
                let alpha = (elapsed - 3500) / 1000;
                ctx.fillStyle = `rgba(5, 10, 6, ${alpha})`;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            } else if (elapsed < 5500) {
                // Phase 3: Timeout (Pure Black/Background screen)
                ctx.fillStyle = '#050a06';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            } else {
                // Phase 4: Transition to Main Menu
                gameState = 'START';

            }
        }

        function gameLoop() {
            // Intercept the game loop if we are in the intro sequence
            if (gameState === 'INTRO_CREDITS') {
                drawIntroSequence();
                requestAnimationFrame(gameLoop);
                return;
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // Perf: when the screen is busy, drop expensive shadowBlur glows to keep FPS up.
            lowFx = (enemies.length + bullets.length + enemyProjectiles.length) > 35;
            drawLevelBackground();

            if (gameState === 'PLAYING' || gameState === 'LEVEL_INTRO' || gameState === 'GAMEOVER' || gameState === 'PAUSED') {
                if (currentLevel === 4) {
                    drawArenaObstacles();
                    drawBarrels();
                }
                coins.forEach(drawCoinAsset);
                chickens.forEach(drawChicken);
                friendlySkeletons.forEach(drawFriendlySkeleton);
                enemies.forEach(drawEnemyAnatomy);
                javelins.forEach(drawJavelinAsset);
                enemyProjectiles.forEach(drawProjectileProjectile);
                // Projectile motion trails (subtle, drawn under the projectiles)
                bullets.forEach(b => {
                    if (!b.isHero) return;
                    let tcol = b.projectileType === 'blue_fireball' ? 'rgba(90,170,255,0.18)'
                        : b.projectileType === 'holy_bolt' ? 'rgba(255,235,150,0.18)'
                        : b.projectileType === 'blood_spike' ? 'rgba(192,57,43,0.18)'
                        : b.projectileType === 'class_arrow' ? 'rgba(160,200,160,0.15)'
                        : 'rgba(220,220,230,0.12)';
                    let sx = b.x - camera.x, sy = b.y - camera.y;
                    ctx.save();
                    for (let t = 1; t <= 3; t++) {
                        ctx.globalAlpha = (4 - t) * 0.12;
                        ctx.fillStyle = tcol;
                        ctx.beginPath();
                        ctx.arc(sx - b.vx * t * 1.4, sy - b.vy * t * 1.4, (b.radius || 5) * (1 - t * 0.18), 0, Math.PI * 2);
                        ctx.fill();
                    }
                    ctx.restore();
                });
                bullets.forEach(b => drawFlyingWeapon(b.x, b.y, b.angle, b.isHero, b.projectileType));
                firebolts.forEach(drawFirebolt);
                iceBolts.forEach(drawIceBolt);
                // Draw arcane bullets (bandolier / arcane gun)
                arcaneBullets.forEach(ab => {
                    let sx = ab.x - camera.x,
                        sy = ab.y - camera.y;
                    let t = Date.now() * 0.01;
                    let rv = Math.floor(180 + 75 * Math.sin(t)),
                        gv = Math.floor(50 + 50 * Math.sin(t + 2)),
                        bv = Math.floor(220 + 35 * Math.sin(t + 4));
                    ctx.save();
                    ctx.beginPath();
                    ctx.arc(sx, sy, ab.radius, 0, Math.PI * 2);
                    ctx.fillStyle = `rgb(${rv},${gv},${bv})`;
                    ctx.shadowColor = `rgb(${rv},${gv},${bv})`;
                    ctx.shadowBlur = 14;
                    ctx.fill();
                    // inner bright core
                    ctx.beginPath();
                    ctx.arc(sx, sy, ab.radius * 0.4, 0, Math.PI * 2);
                    ctx.fillStyle = '#ffffff';
                    ctx.fill();
                    ctx.restore();
                });
                if (player.hp > 0) {
                    if (player.whirlwindLevel > 0) drawWhirlwindShield(player.x, player.y, player.whirlwindLevel);
                    if (player.ballChainLevel > 0) drawBallAndChain(player.x, player.y);
                    drawKnightCharacter(player.x, player.y, player.radius, player.isMoving);
                    let pStatus = getPlayerStatus();
                    if (pStatus) {
                        ctx.save();
                        ctx.translate(player.x - camera.x, player.y - camera.y - player.radius);
                        drawStatusIcon(pStatus);
                        ctx.restore();
                    }
                }
                drawStaticSceneryAssets();
                drawWorldBorders();
                drawParticles();
            }

            if (gameState === 'SHOP' || gameState === 'SHOP_LVL2' || gameState === 'SHOP_LVL3') {
                drawShopInterface();
            }
            if (lootSelectionActive) {
                drawLootMenu();
            }
            if (hitFlashAlpha > 0) {
                ctx.fillStyle = `rgba(231, 76, 60, ${hitFlashAlpha})`;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                hitFlashAlpha -= 0.05;
            }

            // PAUSE MENU RENDERING
            if (gameState === 'PAUSED') {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#f1c40f';
                ctx.font = 'bold 40px "Courier New"';
                ctx.textAlign = 'center';
                ctx.fillText("PAUSED", canvas.width / 2, 200);
                ctx.fillStyle = '#fff';
                ctx.font = '20px "Courier New"';
                ctx.fillText("MASTER VOLUME", canvas.width / 2, 280);
                ctx.fillStyle = '#e74c3c';
                ctx.fillRect(canvas.width / 2 - 80, 310, 40, 40);
                ctx.fillStyle = '#2ecc71';
                ctx.fillRect(canvas.width / 2 + 40, 310, 40, 40);
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 24px "Courier New"';
                ctx.fillText("-", canvas.width / 2 - 60, 338);
                ctx.fillText("+", canvas.width / 2 + 60, 338);
                ctx.fillText(Math.round(masterVolume * 100) + "%", canvas.width / 2, 338);

                // Resume Button
                ctx.fillStyle = '#14321e';
                ctx.fillRect(canvas.width / 2 - 100, 385, 200, 40);
                ctx.strokeStyle = '#2ecc71';
                ctx.lineWidth = 2;
                ctx.strokeRect(canvas.width / 2 - 100, 385, 200, 40);
                ctx.fillStyle = '#2ecc71';
                ctx.font = 'bold 18px "Courier New"';
                ctx.fillText("RESUME", canvas.width / 2, 411);

                // New Save Button
                ctx.fillStyle = '#2c3e50';
                ctx.fillRect(canvas.width / 2 - 100, 440, 200, 40);
                ctx.strokeStyle = '#f1c40f';
                ctx.lineWidth = 2;
                ctx.strokeRect(canvas.width / 2 - 100, 440, 200, 40);
                ctx.fillStyle = '#f1c40f';
                ctx.font = 'bold 18px "Courier New"';
                ctx.fillText("SAVE GAME", canvas.width / 2, 466);

                // Quit-to-menu button
                ctx.fillStyle = '#3a1414';
                ctx.fillRect(canvas.width / 2 - 100, 495, 200, 40);
                ctx.strokeStyle = '#e74c3c';
                ctx.lineWidth = 2;
                ctx.strokeRect(canvas.width / 2 - 100, 495, 200, 40);
                ctx.fillStyle = '#e74c3c';
                ctx.font = 'bold 18px "Courier New"';
                ctx.fillText("QUIT TO MENU", canvas.width / 2, 521);

                ctx.fillStyle = '#7f8c8d';
                ctx.font = '16px "Courier New"';
                ctx.fillText("Press 'Z' to Resume", canvas.width / 2, 565);
            }

            // NEW SAVE AND LOAD MENUS
            if (gameState === 'SAVE_MENU' || gameState === 'LOAD_MENU') {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.9)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#f1c40f';
                ctx.font = 'bold 36px "Courier New"';
                ctx.textAlign = 'center';
                ctx.fillText(gameState === 'SAVE_MENU' ? "SAVE GAME" : "LOAD GAME", canvas.width / 2, 80);

                let midX = canvas.width / 2;
                if (saveState === 'SELECT_SLOT') {
                    for (let i = 0; i < 3; i++) {
                        let sy = 150 + i * 110;
                        ctx.fillStyle = '#1c2833';
                        ctx.fillRect(midX - 200, sy, 400, 90);
                        ctx.strokeStyle = '#34495e';
                        ctx.lineWidth = 2;
                        ctx.strokeRect(midX - 200, sy, 400, 90);
                        ctx.fillStyle = '#fff';
                        ctx.font = 'bold 20px "Courier New"';
                        ctx.textAlign = 'left';
                        ctx.fillText(`FILE ${i + 1}`, midX - 180, sy + 30);

                        if (saveSlots[i]) {
                            let s = saveSlots[i];
                            let timeStr = `${Math.floor(s.totalSeconds / 60).toString().padStart(2, '0')}:${(s.totalSeconds % 60).toString().padStart(2, '0')}`;
                            ctx.fillStyle = '#2ecc71';
                            ctx.font = '14px "Courier New"';
                            ctx.fillText(`STAGE: ${s.currentLevel} | LVL: ${s.player.level} | COINS: ${s.player.coinsCollected}`, midX - 180, sy + 55);
                            ctx.fillStyle = '#bdc3c7';
                            ctx.fillText(`SCORE: ${s.score} | TIME: ${timeStr}`, midX - 180, sy + 75);
                        } else {
                            ctx.fillStyle = '#7f8c8d';
                            ctx.font = 'italic 16px "Courier New"';
                            ctx.fillText("EMPTY DATA", midX - 180, sy + 60);

                    }
                    ctx.fillStyle = '#e74c3c';
                    ctx.fillRect(midX - 100, 520, 200, 40);
                    ctx.fillStyle = '#fff';
                    ctx.textAlign = 'center';
                    ctx.fillText("BACK", midX, 546);
                } else if (saveState === 'CONFIRM_SAVE') {
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 24px "Courier New"';
                    ctx.textAlign = 'center';
                    ctx.fillText(`ARE YOU SURE YOU WANT TO ${gameState === 'SAVE_MENU' ? 'OVERWRITE' : 'LOAD'} FILE ${selectedSlot + 1}?`, midX, 280);
                    ctx.fillStyle = '#2ecc71';
                    ctx.fillRect(midX - 120, 350, 100, 50);
                    ctx.fillStyle = '#000';
                    ctx.fillText("YES", midX - 70, 382);
                    ctx.fillStyle = '#e74c3c';
                    ctx.fillRect(midX + 20, 350, 100, 50);
                    ctx.fillStyle = '#fff';
                    ctx.fillText("NO", midX + 70, 382);
                } else if (saveState === 'SAVING') {
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 24px "Courier New"';
                    ctx.textAlign = 'center';
                    ctx.fillText("SAVING...", midX, 280);
                    ctx.fillStyle = '#e74c3c';
                    ctx.font = 'bold 18px "Courier New"';
                    let flicker = Math.sin(Date.now() * 0.01) > 0 ? "DO NOT TURN OFF POWER!" : "";
                    ctx.fillText(flicker, midX, 420);

                    // Spinning Memory Card Sprite Animation
                    ctx.save();
                    ctx.translate(midX, 350);
                    ctx.scale(Math.sin(Date.now() * 0.005), 1);
                    ctx.fillStyle = '#7f8c8d';
                    ctx.fillRect(-20, -25, 40, 50);
                    ctx.fillStyle = '#bdc3c7';
                    ctx.fillRect(-15, -10, 30, 30);
                    ctx.fillStyle = '#f1c40f';
                    ctx.fillRect(-15, -25, 5, 10);
                    ctx.fillRect(-5, -25, 5, 10);
                    ctx.fillRect(5, -25, 5, 10);
                    ctx.restore();

                    if (Date.now() - savingTimer > 2000) {
                        saveGame(selectedSlot);
                        saveState = 'SELECT_SLOT';
                    }
                }
            }

            if (gameState === 'GAMEOVER') {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#e74c3c';
                ctx.font = 'bold 48px "Courier New"';
                ctx.textAlign = 'center';
                ctx.fillText("YOU DIED", canvas.width / 2, canvas.height / 2 - 40);
                ctx.fillStyle = '#fff';
                ctx.font = '24px "Courier New"';
                ctx.fillText(`FINAL SCORE: ${score}`, canvas.width / 2, canvas.height / 2 + 20);

                    ctx.fillText(`NEW HIGH SCORE!`, canvas.width / 2, canvas.height / 2 + 60);
                }
                ctx.fillStyle = '#7f8c8d';
                ctx.font = '16px "Courier New"';

            if (gameState === 'VICTORY') {

                // Triumphant golden glow behind the title
                let vg = ctx.createRadialGradient(canvas.width / 2, canvas.height / 2 - 30, 30, canvas.width / 2, canvas.height / 2 - 30, 360);
                vg.addColorStop(0, 'rgba(241, 196, 15, 0.18)');

                drawGothicTitle("VICTORY!", canvas.width / 2, canvas.height / 2 - 50, 56);

                ctx.textAlign = 'center';
                ctx.fillText("The Nagalord is vanquished. You survived.", canvas.width / 2, canvas.height / 2 + 15);
                ctx.fillStyle = '#f1c40f';
                ctx.font = 'bold 24px "Courier New"';
                ctx.fillText(`FINAL SCORE: ${score}`, canvas.width / 2, canvas.height / 2 + 55);
                if (isNewHighScore) {
                    ctx.fillStyle = '#2ecc71';
                    ctx.font = '20px "Courier New"';
                    ctx.fillText("NEW HIGH SCORE!", canvas.width / 2, canvas.height / 2 + 88);
                }
                ctx.fillStyle = '#7f8c8d';
                ctx.font = '16px "Courier New"';
                ctx.fillText("Click anywhere to play again", canvas.width / 2, canvas.height / 2 + 120);

            if (gameState === 'PRE_START') {
                // Call the procedural background generator
                drawProceduralMenuBG(ctx, canvas, Date.now());

                // Vignette overlay so text pops against the background
                ctx.fillStyle = 'rgba(0, 0, 0, 0.45)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                drawGothicTitle("GOTHIC SURVIVORS", canvas.width / 2, canvas.height / 2 - 50, 46);

                drawGothicPanel(canvas.width / 2 - 220, canvas.height / 2 + 10, 440, 56, {
                    glowColor: '#f1c40f',
                    borderColor: '#f1c40f'
                });
                let prePulse = 0.6 + 0.4 * Math.sin(Date.now() * 0.004);
                ctx.save();
                ctx.fillStyle = `rgba(241, 196, 15, ${prePulse})`;
                ctx.font = '17px "Courier New"';
                ctx.textAlign = 'center';
                ctx.fillText("Click anywhere to initialize Audio System", canvas.width / 2, canvas.height / 2 + 38);
                ctx.restore();
            } else if (gameState === 'START') {
                // Call the procedural background generator
                drawProceduralMenuBG(ctx, canvas, Date.now());

                // Darker vignette so main menu text and panels are highly readable
                ctx.fillStyle = 'rgba(0, 0, 0, 0.55)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                drawGothicTitle("GOTHIC SURVIVORS", canvas.width / 2, canvas.height / 2 - 110, 50);

                // Subtitle panel (controls reminder)
                drawGothicPanel(canvas.width / 2 - 230, canvas.height / 2 - 58, 460, 38, {
                    glowColor: '#7f8c8d',
                    borderColor: '#5c6b73',
                    fillTop: 'rgba(15, 15, 18, 0.85)',
                    fillBottom: 'rgba(5, 5, 6, 0.9)',
                    glowAmount: 4
                });
                ctx.save();
                ctx.fillStyle = '#dfe6e9';
                ctx.font = '16px "Courier New"';
                ctx.textAlign = 'center';
                ctx.fillText("WASD / Arrows to Move  —  Auto-attack", canvas.width / 2, canvas.height / 2 - 34);
                ctx.restore();

                // "Click to begin" panel with pulsing emerald glow
                let pulse = 0.5 + 0.5 * Math.sin(Date.now() * 0.005);

                    glowColor: `rgba(46, 204, 113, ${0.5 + pulse * 0.5})`,

                    fillTop: 'rgba(8, 24, 14, 0.85)',
                    fillBottom: 'rgba(3, 10, 6, 0.92)',
                    glowAmount: 8 + pulse * 10
                });
                ctx.save();
                ctx.fillStyle = `rgba(120, 255, 170, ${pulse})`;
                ctx.font = 'bold 21px "Courier New"';
                ctx.textAlign = 'center';
                ctx.fillText("CLICK TO BEGIN RUN", canvas.width / 2, canvas.height / 2 + 23);
                ctx.restore();

                // Load Game button — hitbox stays at x:center±100, y:360-400 (matches click handler)
                drawGothicPanel(canvas.width / 2 - 100, 360, 200, 40, {
                    glowColor: '#ecf0f1',
                    borderColor: '#bdc3c7',
                    fillTop: 'rgba(44, 62, 80, 0.92)',

                let cardW = 240,
                    cardH = 340,
                    gap = 40;

                let startX = canvas.width / 2 - totalW / 2;
                let cardY = 170;
                let classIds = ['warrior', 'mage', 'archer'];
                let mx = mouseX || 0,
                    my = mouseY || 0;

                for (let i = 0; i < 3; i++) {
                    let cls = HERO_CLASSES[classIds[i]];
                    let cx = startX + i * (cardW + gap);
                    let hovered = (mx >= cx && mx <= cx + cardW && my >= cardY && my <= cardY + cardH);
                    drawGothicPanel(cx, cardY, cardW, cardH, {
                        glowColor: cls.accent,

                    ctx.fillStyle = cls.accent;
                    ctx.font = 'bold 24px "Courier New"';
                    ctx.fillText(cls.name, cx + cardW / 2, cardY + 40);

                    // Portrait
                    drawHeroPortrait(classIds[i], cx + cardW / 2, cardY + 110, 2.6);

                    // Stat bars
                    let statY = cardY + 180;
                    let stats = [
                        ['HP', cls.baseHp / 120],
                        ['SPD', cls.baseSpeed / 3.2],
                        ['DMG', cls.dmgMult / 1.5],
                        ['RATE', 1 - (cls.shotCooldown - 400) / 600]
                    ];
                    ctx.font = '12px "Courier New"';
                    ctx.textAlign = 'left';
                    for (let s = 0; s < stats.length; s++) {
                        let sy = statY + s * 24;
                        ctx.fillStyle = '#9aa4ad';
                        ctx.fillText(stats[s][0], cx + 22, sy + 9);
                        ctx.fillStyle = 'rgba(255,255,255,0.12)';
                        ctx.fillRect(cx + 70, sy, 140, 10);
                        ctx.fillStyle = cls.accent;
                        ctx.fillRect(cx + 70, sy, 140 * Math.max(0.08, Math.min(1, stats[s][1])), 10);
                    }

                    // Blurb
                    ctx.fillStyle = '#c7ced4';
                    ctx.font = '11px "Courier New"';
                    ctx.textAlign = 'center';
                    wrapText(ctx, cls.blurb, cx + cardW / 2, cardY + 290, cardW - 36, 15);

                    if (hovered) {
                        ctx.fillStyle = cls.accent;
                        ctx.font = 'bold 13px "Courier New"';
                        ctx.fillText('▶ SELECT', cx + cardW / 2, cardY + cardH - 14);
                    }
                    ctx.restore();
                }

                // Back button
                drawGothicPanel(canvas.width / 2 - 80, cardY + cardH + 30, 160, 36, {
                    glowColor: '#7f8c8d',
                    borderColor: '#5c6b73',
                    fillTop: 'rgba(15,15,18,0.9)',
                    fillBottom: 'rgba(5,5,6,0.92)',
                    glowAmount: 4,
                    cornerSize: 8
                });
                ctx.save();
                ctx.fillStyle = '#dfe6e9';
                ctx.font = 'bold 15px "Courier New"';
                ctx.textAlign = 'center';
                ctx.fillText('◀ BACK', canvas.width / 2, cardY + cardH + 53);
                ctx.restore();
            }

            update();
            requestAnimationFrame(gameLoop);
        }

        requestAnimationFrame(gameLoop);
    </script>
</body>

</html>
